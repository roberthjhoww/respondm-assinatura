/* ─────────────────────────────────────────────
   Camada de persistência — Firebase Firestore
   Estrutura no Firestore:
     - coleção "assinantes": 1 documento por @ (id = username)
     - documento "config/grupos", "config/metas", "config/financeiro": 1 cada
   localStorage continua como cache local de leitura rápida.

const fbDB=window.fbDB, fbAuth=window.fbAuth;

// Firestore rejeita `undefined`, `NaN` e `Infinity` — limpa recursivamente antes de salvar.
// (NaN/Infinity num único campo derrubam o batch inteiro silenciosamente.)
function stripUndefined(v){
  if(Array.isArray(v))return v.map(stripUndefined);
  if(v&&typeof v==="object"){
    const o={};
    for(const k in v){if(v[k]!==undefined)o[k]=stripUndefined(v[k]);}
    return o;
  }
  if(typeof v==="number"&&!isFinite(v))return null; // NaN/Infinity → null (aceito pelo Firestore)
  return v;
}

// Salva a lista inteira de assinantes (um doc por assinante, em lote)
async function fbSaveSubs(subs){
  if(!fbDB)return;
  const col=fbDB.collection("assinantes");
  // Saneia: ignora docs com username inválido como ID do Firestore (vazio, com "/", "."/"..").
  const valid=[],skipped=[];
  for(const s of subs){
    const u=(s.username||"").trim();
    if(!u||u==="."||u===".."||u.includes("/")){skipped.push(s.username);continue;}
    valid.push(s);
  }
  if(skipped.length)console.warn("[fbSaveSubs] usernames inválidos ignorados:",skipped);
  // Firestore limita 500 ops por batch
  const chunks=[];for(let i=0;i<valid.length;i+=450)chunks.push(valid.slice(i,i+450));
  const falhas=[];
  for(const chunk of chunks){
    try{
      const batch=fbDB.batch();
      chunk.forEach(s=>batch.set(col.doc(s.username),stripUndefined(s)));
      await batch.commit();
    }catch(e){
      // Se o batch falhar (1 doc ruim derruba todos), salva um a um p/ isolar o culpado.
      console.error("[fbSaveSubs] batch falhou, salvando individual:",e&&e.message);
      for(const s of chunk){
        try{await col.doc(s.username).set(stripUndefined(s));}
        catch(e2){falhas.push(s.username);console.error("[fbSaveSubs] FALHOU @"+s.username+":",e2&&e2.message);}
      }
    }
  }
  if(falhas.length)throw new Error("Não sincronizou: "+falhas.join(", "));
}
// Salva SÓ o que mudou entre `prev` e `next` (economiza cota do Firestore).
// Grava apenas docs novos/alterados e apaga os removidos. Retorna quantos foram escritos.
async function fbSaveSubsDiff(prev,next){
  if(!fbDB)return 0;
  const col=fbDB.collection("assinantes");
  const prevMap={};(prev||[]).forEach(s=>{if(s&&s.username)prevMap[s.username]=JSON.stringify(stripUndefined(s));});
  const nextMap={};(next||[]).forEach(s=>{if(s&&s.username)nextMap[s.username]=s;});
  const changed=[],removed=[],falhas=[];
  // novos ou alterados
  for(const u in nextMap){
    const s=nextMap[u];const u2=(u||"").trim();
    if(!u2||u2==="."||u2===".."||u2.includes("/")){console.warn("[diff] username inválido ignorado:",u);continue;}
    if(prevMap[u]!==JSON.stringify(stripUndefined(s)))changed.push(s);
  }
  // removidos (estavam em prev, não estão em next)
  for(const u in prevMap){if(!(u in nextMap))removed.push(u);}
  // grava alterados, um a um (isola falhas e não estoura batch)
  for(const s of changed){
    try{await col.doc(s.username).set(stripUndefined(s));}
    catch(e){falhas.push(s.username);console.error("[diff] FALHOU @"+s.username+":",e&&e.message);}
  }
  for(const u of removed){try{await col.doc(u).delete();}catch(e){console.error("[diff] del falhou @"+u,e&&e.message);}}
  if(falhas.length)throw new Error("Não sincronizou: "+falhas.join(", "));
  return changed.length+removed.length;
}
// Salva/atualiza um único assinante (rápido — uso no dia a dia)
async function fbSaveSub(sub){
  if(!fbDB)return;
  await fbDB.collection("assinantes").doc(sub.username).set(stripUndefined(sub));
}
async function fbDeleteSub(username){
  if(!fbDB)return;
  await fbDB.collection("assinantes").doc(username).delete();
}
async function fbLoadSubs(){
  if(!fbDB)return null;
  const snap=await fbDB.collection("assinantes").get();
  return snap.docs.map(d=>d.data());
}

}

// Motivos de saída — registrados em 1 clique para entender o churn real
const MOTIVOS_CHURN=["Esqueceu de pagar","Achou caro","Não usou / não viu valor","Trocou de ferramenta","Fechou o negócio","Problema técnico","Outro"];

/* utils */
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

// Feriados nacionais brasileiros (mês 0-indexed)
const BR_HOLIDAYS=[
  "01-01","04-21","05-01","09-07","10-12","11-02","11-15","11-20","12-25"
];
function isBRHoliday(d){const m=String(d.getMonth()+1).padStart(2,"0");const day=String(d.getDate()).padStart(2,"0");return BR_HOLIDAYS.includes(`${m}-${day}`);}
function isWeekend(d){return d.getDay()===0||d.getDay()===6;}
function nextBusinessDay(d){const r=new Date(d);while(isWeekend(r)||isBRHoliday(r))r.setDate(r.getDate()+1);return r;}
function addBusinessDays(d,n){let r=new Date(d);let count=0;while(count<n){r.setDate(r.getDate()+1);if(!isWeekend(r)&&!isBRHoliday(r))count++;}return r;}
function payoutDate(pmtDate,method,international){
  const d=parseLocal(pmtDate);
  if(!d)return null;
  if(method==="CARTÃO USD"){return nextBusinessDay(addBusinessDays(d,5));}
  if(method==="CARTÃO BRL"&&international){return nextBusinessDay(addBusinessDays(d,5));}
  if(method==="CARTÃO BRL"){return nextBusinessDay(addDays(d,30));}
  return d; // PIX: imediato
}
function subDays(d,n){return addDays(d,-n);}
function parseLocal(s){if(!s)return null;const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
function daysUntil(s){if(!s)return null;const d=parseLocal(s);d.setHours(0,0,0,0);return Math.round((d-today0())/86400000);}
function todayStr(){return new Date().toISOString().split("T")[0];}
function fmtDate(s){if(!s)return"—";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;}
function fmtBRL(v){return"R$ "+parseFloat(v||0).toFixed(2).replace(".",",");}
function fmtUSD(v){return"$ "+parseFloat(v||0).toFixed(2);}
function parseBRL(s){if(!s)return 0;const str=String(s).trim();// Handle Brazilian format: 1.354,61 → 1354.61
if(str.includes(","))return parseFloat(str.replace(/\./g,"").replace(",","."))||0;// Already dot decimal: 1354.61
return parseFloat(str.replace(/[^0-9.]/g,""))||0;}
function dateToISO(s){if(!s)return null;const p=s.split(" ")[0];if(p.includes("-"))return p.substring(0,10);const[d,m,y]=p.split("/");if(!d||!m||!y)return null;return`${y.padStart(4,"0")}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;}
function guessPlan(v){const n=parseFloat(v||0);if(Math.abs(n-39.90)<.05)return"Start";if(Math.abs(n-59.90)<.05)return"Creator";if(Math.abs(n-89.90)<.05)return"Pro";if(Math.abs(n-119.90)<.05)return"Viral";return"Personalizado";}
function getMethod(id){return METHODS.find(m=>m.id===id)||METHODS[0];}
function calcNet(a,id){return parseFloat((a-calcFee(a,id)).toFixed(2));}
function pmtBRL(p){return parseFloat(p.value_brl||p.value||0);}
function pmtDiscount(p){return parseFloat(p.discount||0);}
function pmtDiscounted(p){return Math.max(0,pmtBRL(p)-pmtDiscount(p));}
function pmtFee(p){return calcFee(pmtDiscounted(p),p.method);}
function pmtNet(p){return calcNet(pmtDiscounted(p),p.method);}

/* ── Cobrança / WhatsApp ── */
// só dígitos; assume Brasil (55) se faltar código do país
function normalizePhone(raw){
  if(!raw)return"";
  let d=String(raw).replace(/\D/g,"");
  if(!d)return"";
  if(d.length<=11&&!d.startsWith("55"))d="55"+d;
  return d;
}

  const dFora=daysCancelled(sub);
  const fora=dFora!==null?(dFora===0?"hoje":dFora===1?"1 dia":dFora+" dias"):"alguns dias";
  return(tpl||"")
    .replace(/\{\{nome\}\}/g,"@"+sub.username)

    .replace(/\{\{vencimento\}\}/g,nd?fmtDate(nd):"—")
    .replace(/\{\{dias_atraso\}\}/g,atraso||"alguns dias")
    .replace(/\{\{dias_fora\}\}/g,fora);
}

// Quantos dias antes do vencimento ainda contam como "pagou o vencimento daquele mês"
const PAGAMENTO_ADIANTADO_DIAS=7;
function getNextDue(sub){
  const pmts=sub.payments||[];if(!pmts.length)return null;
  const last=pmts.reduce((a,b)=>a.date>b.date?a:b);
  const lastDate=parseLocal(last.date);if(!lastDate)return null;
  if(sub.due_day){
    const day=parseInt(sub.due_day);
    // Caso 1: o último pagamento foi uma REATIVAÇÃO (cliente saiu do PRO e voltou).
    // Nesse caso o due_day já foi atualizado para o dia do pagamento → próximo
    // vencimento é simplesmente o due_day no mês seguinte ao pagamento.
    if(last.is_reactivation){
      const c=new Date(lastDate.getFullYear(),lastDate.getMonth()+1,day);
      return c.toISOString().split("T")[0];
    }
    // Caso 2: pagamento normal (adiantado, no dia ou dentro da tolerância).
    // vencimento candidato: o due_day no mesmo mês do pagamento
    const venceNoMes=new Date(lastDate.getFullYear(),lastDate.getMonth(),day);
    const diasAntes=Math.round((venceNoMes-lastDate)/86400000); // >0 = pagou antes do vencimento do mês
    // pagou no dia, depois, ou até 7 dias antes → quitou ESTE mês → próximo é o mês seguinte
    // pagou muito antes (>7 dias) → quitou o mês anterior → próximo é ESTE mês
    let c;
    if(diasAntes<=PAGAMENTO_ADIANTADO_DIAS){
      c=new Date(lastDate.getFullYear(),lastDate.getMonth()+1,day);
    } else {
      c=venceNoMes;
    }
    return c.toISOString().split("T")[0];
  }
  return addDays(lastDate,30).toISOString().split("T")[0];
}
/* Data/hora exata em que a conta perde o PRO.
   Regra real: a fila roda às 9h. Vencimento dia X → conta sai do PRO
   no dia X+3 às 9h (fica no PRO até 8:59 desse dia). 3 dias corridos. */
function getProExpiry(sub){
  const nd=getNextDue(sub);if(!nd)return null;
  const[dy,dm,dd]=nd.split("-").map(Number);
  const cb=addDays(new Date(dy,dm-1,dd),3);
  return new Date(cb.getFullYear(),cb.getMonth(),cb.getDate(),9,0,0);
}
function computeStatus(sub){
  const pmts=sub.payments||[];if(!pmts.length)return"SEM PAG.";
  const nd=getNextDue(sub);if(!nd)return"SEM PAG.";
  const[dy,dm,dd]=nd.split("-").map(Number);
  const dueAt9=new Date(dy,dm-1,dd,9,0,0);
  const cancelAt9=getProExpiry(sub);
  const now=new Date();
  if(now<dueAt9)return"ATIVO";
  if(now<cancelAt9)return"AGUARDANDO PAGAMENTO";
  const daysPast=Math.floor((now-cancelAt9)/86400000);
  if(daysPast<=7)return"CANCELADO 7 DIAS";
  if(daysPast<=30)return"CANCELADO 30 DIAS";
  if(daysPast<=60)return"CANCELADO 60 DIAS";
  return"CANCELADO 100+";
}
function daysCancelled(sub){
  const pmts=sub.payments||[];if(!pmts.length)return null;
  const last=pmts.reduce((a,b)=>a.date>b.date?a:b);
  const cancelAt=addDays(parseLocal(last.date),33);
  cancelAt.setHours(12,0,0,0);
  const now=new Date();
  if(now<cancelAt)return null;
  return Math.floor((now-cancelAt)/86400000);
}

/* Fase de recuperação a partir dos dias fora do PRO.
   Quente 1-7d · Morno 8-30d · Frio 31-60d · Perdido 60+ */
const CHURN_PHASES=[
  {id:"quente", label:"Quente",  emoji:"🟠", max:7,        tpl:"rec_quente",  color:"var(--orange)",  bg:"var(--orange-bg)",  nota:"acabou de sair — provável esquecimento, recupere rápido"},
  {id:"morno",  label:"Morno",   emoji:"🟡", max:30,       tpl:"rec_morno",   color:"var(--amber)",   bg:"var(--amber-bg)",   nota:"esfriando — entenda o motivo e mostre valor"},
  {id:"frio",   label:"Frio",    emoji:"🔴", max:60,       tpl:"rec_frio",    color:"var(--red)",     bg:"var(--red-bg)",     nota:"última janela boa — vale uma condição especial"},
  {id:"perdido",label:"Perdido", emoji:"⚫", max:Infinity, tpl:"rec_perdido", color:"var(--text3)",   bg:"var(--surface2)",   nota:"baixa prioridade — reengajamento esporádico"}
];
function getChurnPhase(sub){
  const d=daysCancelled(sub);
  if(d===null)return null; // ainda não saiu do PRO
  return CHURN_PHASES.find(p=>d<=p.max)||CHURN_PHASES[CHURN_PHASES.length-1];
}
function CancelTag({sub}){
  const days=daysCancelled(sub);
  if(days===null)return null;
  const color=days<=7?"var(--orange)":days<=30?"var(--amber)":days<=60?"var(--red)":"var(--text3)";
  const bg=days<=7?"var(--orange-bg)":days<=30?"var(--amber-bg)":days<=60?"var(--red-bg)":"var(--surface2)";
  const label=days===0?"cancelado hoje":`${days}d cancelado`;
  return<span style={{fontSize:10,fontWeight:700,background:bg,color,borderRadius:20,padding:"2px 8px",whiteSpace:"nowrap",border:`1px solid ${color}`,opacity:.9}}>{label}</span>;
}
function daysAsSubscriber(sub){
  const pmts=sub.payments||[];if(!pmts.length)return null;
  const first=pmts.reduce((a,b)=>a.date<b.date?a:b);
  return Math.floor((today0()-parseLocal(first.date))/86400000);
}
function filterByRange(pmts,filter,from,to){
  if(filter==="all")return pmts;
  const t0=today0();let f,t=new Date();
  if(filter==="hoje"){f=t0;}
  else if(filter==="ontem"){f=addDays(t0,-1);t=new Date(t0);}
  else if(filter==="7d"){f=addDays(t0,-7);}
  else if(filter==="30d"){f=addDays(t0,-30);}
  else if(filter==="mes"){const n=new Date();f=new Date(n.getFullYear(),n.getMonth(),1);t=new Date(n.getFullYear(),n.getMonth()+1,1);}
  else if(filter==="custom"&&from&&to){f=parseLocal(from);t=addDays(parseLocal(to),1);}
  else return pmts;
  return pmts.filter(p=>{if(!p.date)return false;const d=parseLocal(p.date);return d>=f&&d<t;});
}

/* month metrics for comparativo */
function getMonthMetrics(subs,year,month,fromDay,toDay){
  const fd=parseInt(fromDay)||1;const td=parseInt(toDay)||31;
  const periodPmts=subs.flatMap(s=>(s.payments||[]).map(p=>({...p,_sub:s}))).filter(p=>{
    if(!p.date)return false;
    const[y,m2,d]=p.date.split("-").map(Number);
    return y===year&&m2-1===month&&d>=fd&&d<=td;
  });
  const bruto=periodPmts.reduce((a,p)=>a+pmtBRL(p),0);
  const liquido=periodPmts.reduce((a,p)=>a+pmtNet(p),0);
  const taxas=bruto-liquido;
  const qtdPag=periodPmts.length;
  const ticketMedio=qtdPag>0?bruto/qtdPag:0;
  let newSubs=0;
  subs.forEach(s=>{
    const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));
    if(!sorted.length)return;
    const[fy,fm,fd2]=sorted[0].date.split("-").map(Number);
    if(fy===year&&fm-1===month&&fd2>=fd&&fd2<=td)newSubs++;
  });
  const reativacoes=periodPmts.filter(p=>p.is_reactivation).length;
  let cancelamentos=0;
  subs.forEach(s=>{
    const pmts=s.payments||[];if(!pmts.length)return;
    const last=pmts.reduce((a,b)=>a.date>b.date?a:b);
    const cancelDate=addDays(parseLocal(last.date),33);
    const iso=cancelDate.toISOString().split("T")[0];
    const[cy,cm,cd]=iso.split("-").map(Number);
    if(cy===year&&cm-1===month&&cd>=fd&&cd<=td)cancelamentos++;
  });
  return{bruto,liquido,taxas,qtdPag,ticketMedio,newSubs,reativacoes,cancelamentos};
}

/* CSV */
function csvRow(line){const row=[];let cur="",inQ=false;for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){row.push(cur.trim());cur="";}else cur+=ch;}row.push(cur.trim());return row;}
function parseOriginalCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());const users=[];
  for(let i=2;i<lines.length;i++){
    const row=csvRow(lines[i]);const username=row[0]?.trim();if(!username)continue;
    const lastStr=row[2]?.trim();const planValStr=row[7]?.trim();
    const rawM=(row[9]?.trim()||"PIX").toUpperCase();
    const method=rawM==="CRÉDITO"||rawM==="CREDITO"?"CARTÃO BRL":rawM==="PIX"?"PIX":"CARTÃO BRL";
    const planValue=parseBRL(planValStr);const lastISO=dateToISO(lastStr);
    if(!lastISO||!username)continue;
    const pmtVals=[];for(let c=10;c<=19;c++){const v=parseBRL(row[c]);if(v>0)pmtVals.push(v);}
    const payments=pmtVals.map((v,k)=>{const d=subDays(parseLocal(lastISO),(pmtVals.length-1-k)*30);return{date:d.toISOString().split("T")[0],value_brl:String(v.toFixed(2)),method};});
    users.push({username,plan_name:guessPlan(planValue),plan_value:String(planValue.toFixed(2)),currency:"BRL",due_day:"",notes:"",cancel_reason:"",status_history:[],payments});
  }
  return users;
}
function parsePaymentsCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());if(lines.length<2)return[];
  const hi={};csvRow(lines[0]).forEach((h,i)=>{const k=h.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"");if(k.includes("usuario")||k.includes("user"))hi.user=i;else if(k.includes("data")||k.includes("date"))hi.date=i;else if(k.includes("cambio")||k.includes("exchange"))hi.cambio=i;else if(k.includes("internacional")||k.includes("intl")||k.includes("international"))hi.intl=i;else if(k.includes("forma")||k.includes("metodo")||k.includes("pgt")||k.includes("pag"))hi.method=i;else if(k.includes("valor")||k.includes("value"))hi.value=i;else if(k.includes("plano")||k.includes("plan"))hi.plan=i;});
  if(hi.date===undefined&&hi.user===undefined){hi.date=0;hi.user=1;hi.method=2;hi.value=3;hi.plan=4;}
  return lines.slice(1).map(l=>{const row=csvRow(l);const rawDate=row[hi.date??0]?.trim();const username=row[hi.user??1]?.trim().replace(/^@/,"");const rawM=(row[hi.method??2]?.trim()||"PIX").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");const method=rawM.includes("CREDITO")||rawM.includes("CARTAO BRL")?"CARTÃO BRL":rawM.includes("USD")?"CARTÃO USD":"PIX";const plan=row[hi.plan??4]?.trim()||"";if(!rawDate||!username)return null;const iso=dateToISO(rawDate);if(!iso)return null;
    const rawValue=parseBRL(row[hi.value??3]);
    const cambio=hi.cambio!==undefined?parseBRL(row[hi.cambio]):0;
    const intl=hi.intl!==undefined&&["sim","s","true","1","x","yes"].includes((row[hi.intl]||"").toString().trim().toLowerCase());
    const out={date:iso,username,method,plan};
    if(method==="CARTÃO USD"){
      const usd=rawValue;const rate=cambio>0?cambio:0;
      if(usd<=0)return null;
      out.value_usd=String(usd.toFixed(2));
      out.exchange_rate=String(rate.toFixed(4));
      out.value_brl=String((rate>0?usd*rate:usd).toFixed(2));
    } else {
      if(rawValue<=0)return null;
      out.value_brl=String(rawValue.toFixed(2));
      if(method==="CARTÃO BRL"&&intl)out.international=true;
    }
    return out;}).filter(Boolean);
}

/* Sugere a data do pagamento a partir do due_day:
   pega o dia de vencimento mais recente que já passou (ou hoje). */
function suggestPayDate(sub){
  if(!sub.due_day)return todayStr();
  const day=parseInt(sub.due_day);
  if(!day||day<1||day>31)return todayStr();
  const t=today0();
  let c=new Date(t.getFullYear(),t.getMonth(),day);
  if(c>t)c=new Date(t.getFullYear(),t.getMonth()-1,day); // ainda não chegou esse dia no mês → mês passado
  return c.toISOString().split("T")[0];
}

/* ── Modal Linha do Tempo ── */
function ModalTimeline({sub,onClose}){
  if(!sub)return null;
  const pmts=[...(sub.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));
  if(!pmts.length)return(<ModalWrap onClose={onClose}><MTitle>Linha do tempo — @{sub.username}</MTitle><div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)"}}>Nenhum pagamento registrado.</div><Btn variant="secondary" onClick={onClose}>Fechar</Btn></ModalWrap>);
  const first=parseLocal(pmts[0].date);
  const last=parseLocal(pmts[pmts.length-1].date);
  // Build month range from first to today
  const months=[];
  let cy=first.getFullYear(),cm=first.getMonth();
  const ey=new Date().getFullYear(),em=new Date().getMonth();
  while(cy<ey||(cy===ey&&cm<=em)){months.push({y:cy,m:cm});cm++;if(cm>11){cm=0;cy++;}}
  return(
    <ModalWrap onClose={onClose} wide>
      <MTitle>Linha do tempo — @{sub.username}</MTitle>
      <div style={{fontSize:12,color:"var(--text2)",marginTop:-12,marginBottom:16,display:"flex",gap:10,flexWrap:"wrap"}}>
        <Pill status={computeStatus(sub)}/><PlanBadge plan={sub.plan_name}/>
        <span style={{color:"var(--text3)"}}>desde {fmtDate(pmts[0].date)} · {pmts.length} pagamentos</span>
      </div>
      <div style={{overflowX:"auto",paddingBottom:8}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:0,minWidth:Math.max(600,months.length*64),position:"relative"}}>
          {/* Linha base */}
          <div style={{position:"absolute",top:28,left:24,right:24,height:2,background:"var(--border)",zIndex:0}}/>
          {months.map(({y,m},i)=>{
            const key=`${y}-${String(m+1).padStart(2,"0")}`;
            const monthPmts=pmts.filter(p=>p.date&&p.date.startsWith(key));
            const isFirst=i===0;const isLast=i===months.length-1;
            const isCurrent=y===new Date().getFullYear()&&m===new Date().getMonth();
            const hasPmt=monthPmts.length>0;
            const isReact=monthPmts.some(p=>p.is_reactivation);
            const dotColor=!hasPmt?"var(--border)":isReact?"var(--green)":"var(--purple)";
            const dotSize=hasPmt?16:8;
            const bruto=monthPmts.reduce((a,p)=>a+pmtBRL(p),0);
            return(
              <div key={key} style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1,minWidth:56,position:"relative",zIndex:1}}>
                {/* Dot */}
                <div style={{width:dotSize,height:dotSize,borderRadius:"50%",background:dotColor,border:`2px solid ${hasPmt?dotColor:"var(--border2)"}`,marginTop:28-dotSize/2,boxShadow:hasPmt?"0 0 0 3px var(--purple-light)":undefined,flexShrink:0}}/>
                {/* Payment info */}
                {hasPmt&&(
                  <div style={{marginTop:8,textAlign:"center"}}>
                    <div style={{fontSize:9,fontWeight:700,color:"var(--purple)",background:"var(--purple-light)",borderRadius:6,padding:"2px 5px",whiteSpace:"nowrap"}}>{fmtBRL(bruto)}</div>
                    {isReact&&<div style={{fontSize:9,fontWeight:700,color:"var(--green)",marginTop:2}}>↻</div>}
                    {monthPmts.length>1&&<div style={{fontSize:9,color:"var(--text3)"}}>×{monthPmts.length}</div>}
                  </div>
                )}
                {/* Month label */}
                <div style={{marginTop:hasPmt?4:16,fontSize:9,color:isCurrent?"var(--purple)":"var(--text3)",fontWeight:isCurrent?700:400,textAlign:"center",whiteSpace:"nowrap"}}>{MONTHS_PT[m]}<br/>{String(y).slice(2)}</div>
                {isCurrent&&<div style={{width:4,height:4,borderRadius:"50%",background:"var(--purple)",marginTop:2}}/>}
              </div>
            );
          })}
        </div>
      </div>
      {/* Legend */}
      <div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
        {[["var(--purple)","Pagamento"],["var(--green)","Reativação"],["var(--border)","Sem pagamento"]].map(([col,lbl])=>(
          <div key={lbl} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--text3)"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:col,display:"inline-block"}}/>
            {lbl}
          </div>
        ))}
      </div>
      <div style={{marginTop:14}}><Btn variant="secondary" onClick={onClose}>Fechar</Btn></div>
    </ModalWrap>
  );
}

/* Modal Import Original */
function ModalImportOriginal({subs,onImport,onClose}){
  const [preview,setPreview]=useState(null);const [error,setError]=useState("");const [mode,setMode]=useState("merge");const fileRef=useRef();
  function handleFile(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const p=parseOriginalCSV(ev.target.result);if(!p.length){setError("Nenhum usuário encontrado.");return;}setPreview(p);setError("");}catch(err){setError("Erro: "+err.message);}};r.readAsText(file,"UTF-8");}
  function handleImport(){if(!preview)return;let result;if(mode==="replace"){result=preview;}else{const map={};subs.forEach(s=>{map[s.username]={...s,payments:[...(s.payments||[])]};});preview.forEach(p=>{if(map[p.username]){const keys=new Set(map[p.username].payments.map(x=>x.date+"_"+(x.value_brl||x.value)));p.payments.forEach(pm=>{if(!keys.has(pm.date+"_"+(pm.value_brl||pm.value)))map[p.username].payments.push(pm);});map[p.username].payments.sort((a,b)=>a.date.localeCompare(b.date));}else{map[p.username]=p;}});result=Object.values(map);}onImport(result);}
  const newCount=preview?preview.filter(p=>!subs.find(s=>s.username===p.username)).length:0;
  const totalPmts=preview?preview.reduce((a,p)=>a+p.payments.length,0):0;
  return(
    <ModalWrap onClose={onClose} wide>
      <MTitle>Importar planilha original</MTitle>
      <div style={{background:"var(--purple-light)",borderRadius:12,padding:"12px 16px",marginBottom:18,fontSize:13,color:"#4330A8",lineHeight:1.6}}>Selecione o CSV original (ASSINATURAS_RESPONDM).</div>
      <div style={{border:"2px dashed var(--border2)",borderRadius:14,padding:"24px",textAlign:"center",marginBottom:18,cursor:"pointer",background:"var(--surface2)"}} onClick={()=>fileRef.current.click()}>
        <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/>
        <div style={{fontSize:28,marginBottom:8}}>📂</div><div style={{fontSize:13,fontWeight:600}}>Clique para selecionar</div>
      </div>
      {error&&<div style={{background:"var(--red-bg)",border:"1px solid var(--red)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"var(--red)",marginBottom:14}}>{error}</div>}
      {preview&&(<>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>{[{label:"Usuários",val:preview.length,c:"var(--purple)"},{label:"Pagamentos",val:totalPmts,c:"var(--green)"},{label:"Novos",val:newCount,c:"var(--amber)"}].map(k=><div key={k.label} style={{background:"var(--surface2)",borderRadius:12,padding:"12px 14px",border:"1px solid var(--border)"}}><div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.val}</div><div style={{fontSize:10,fontWeight:600,color:"var(--text3)",marginTop:4,textTransform:"uppercase",letterSpacing:".05em"}}>{k.label}</div></div>)}</div>
        {[{val:"merge",label:"Mesclar",desc:`Mantém dados existentes, adiciona ${newCount} novos.`},{val:"replace",label:"Substituir tudo",desc:"Apaga tudo e importa o CSV."}].map(o=><label key={o.val} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 14px",border:"1.5px solid "+(mode===o.val?"var(--purple)":"var(--border)"),borderRadius:11,cursor:"pointer",background:mode===o.val?"var(--purple-light)":"var(--surface)",marginBottom:8}}><input type="radio" name="imode" value={o.val} checked={mode===o.val} onChange={()=>setMode(o.val)} style={{marginTop:2,accentColor:"var(--purple)"}}/><div><div style={{fontSize:13,fontWeight:600,color:mode===o.val?"#4330A8":"var(--text)"}}>{o.label}</div><div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{o.desc}</div></div></label>)}
        <div style={{marginTop:12,display:"flex",gap:8}}><Btn variant="success" onClick={handleImport}>✓ Confirmar</Btn><Btn variant="secondary" onClick={onClose}>Cancelar</Btn></div>
      </>)}
      {!preview&&<Btn variant="secondary" onClick={onClose}>Cancelar</Btn>}
    </ModalWrap>
  );
}

/* Modal Import Payments */
function ModalImportPayments({subs,onImport,onClose}){
  const [preview,setPreview]=useState(null);const [error,setError]=useState("");const [formFilter,setFormFilter]=useState("TODOS");const fileRef=useRef();
  // Cada linha vira editável: detecta plano pelo valor; valor "quebrado" (pró-rata) fica marcado p/ ajuste.
  function buildRows(parsed){
    return parsed.map((p,i)=>{
      const guessed=p.plan&&PLANS.find(x=>x.name===p.plan)?p.plan:guessPlan(p.value_brl);
      const proRata=guessed==="Personalizado"; // valor não bate com nenhum plano → upgrade/pró-rata
      return {...p,_id:i,plan:guessed,_proRata:proRata,international:p.international||false};
    });
  }
  // recalcula value_brl de uma linha USD quando muda valor USD ou câmbio
  function recalcUSD(r){
    if(r.method!=="CARTÃO USD")return r;
    const usd=parseBRL(r.value_usd);const rate=parseBRL(r.exchange_rate);
    return {...r,value_brl:String((rate>0?usd*rate:usd).toFixed(2))};
  }
  function handleFile(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const p=parsePaymentsCSV(ev.target.result);if(!p.length){setError("Nenhum pagamento encontrado.");return;}setPreview(buildRows(p));setError("");}catch(err){setError("Erro: "+err.message);}};r.readAsText(file,"UTF-8");}
  function setCell(id,key,val){setPreview(rows=>rows.map(r=>{if(r._id!==id)return r;let nr={...r,[key]:val};if(key==="plan")nr._proRata=false;if(key==="method"&&val!=="CARTÃO USD"){nr.value_usd=undefined;nr.exchange_rate=undefined;}if(key==="value_usd"||key==="exchange_rate"||key==="method")nr=recalcUSD(nr);return nr;}));}
  function removeRow(id){setPreview(rows=>rows.filter(r=>r._id!==id));}
  const unkUsers=preview?[...new Set(preview.filter(p=>!subs.find(s=>s.username===p.username)).map(p=>p.username))]:[];
  const pendentes=preview?preview.filter(r=>r._proRata).length:0;
  // contadores por forma de pagamento
  const counts=preview?preview.reduce((a,r)=>{a[r.method]=(a[r.method]||0)+1;return a;},{}):{};
  const formFilters=[{id:"TODOS",label:"Todos"},{id:"PIX",label:"PIX"},{id:"CARTÃO BRL",label:"Cartão BRL"},{id:"CARTÃO USD",label:"Cartão USD"}];
  const visiblePreview=preview?(formFilter==="TODOS"?preview:preview.filter(r=>r.method===formFilter)):[];
  const cell={padding:"6px 8px",borderBottom:"1px solid var(--border)",fontSize:12};
  const inp={padding:"5px 7px",borderRadius:7,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:12,fontFamily:"inherit",width:"100%"};
  return(
    <ModalWrap onClose={onClose} wide>
      <MTitle>Importar pagamentos</MTitle>
      {!preview&&<>
        <div style={{background:"var(--surface2)",border:"1.5px solid var(--border)",borderRadius:12,padding:"14px 16px",marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:10}}>Formato (qualquer ordem de colunas)</div>
          <table style={{borderCollapse:"collapse",fontSize:12,width:"100%"}}><thead><tr style={{background:"var(--purple-light)"}}>{["DATA","USUARIO","METODO","VALOR","PLANO"].map(h=><th key={h} style={{padding:"6px 12px",textAlign:"left",fontWeight:700,color:"#4330A8",borderBottom:"1px solid var(--border2)"}}>{h}</th>)}</tr></thead><tbody><tr>{["05/01/2025","debora.profe","PIX","39.90","Start"].map((v,i)=><td key={i} style={{padding:"6px 12px",color:"var(--text2)"}}>{v}</td>)}</tr></tbody></table>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:8,lineHeight:1.6}}>Métodos: PIX · CARTÃO BRL · CARTÃO USD<br/>Colunas opcionais: <strong>cambio</strong> (p/ USD — valor da coluna VALOR vai em dólar) · <strong>internacional</strong> (sim/não — cartão BRL intl, liquida D+5). Tudo isso também é editável na prévia.</div>
        </div>
        <div style={{border:"2px dashed var(--border2)",borderRadius:14,padding:"24px",textAlign:"center",marginBottom:18,cursor:"pointer",background:"var(--surface2)"}} onClick={()=>fileRef.current.click()}>
          <input ref={fileRef} type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/>
          <div style={{fontSize:28,marginBottom:8}}>📂</div><div style={{fontSize:13,fontWeight:600}}>Clique para selecionar</div>
        </div>
      </>}
      {error&&<div style={{background:"var(--red-bg)",border:"1px solid var(--red)",borderRadius:10,padding:"10px 14px",fontSize:13,color:"var(--red)",marginBottom:14}}>{error}</div>}
      {preview&&(<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>{[{label:"Pagamentos",val:preview.length,c:"var(--purple)"},{label:"Usuários novos",val:unkUsers.length,c:unkUsers.length>0?"var(--amber)":"var(--green)"},{label:"Planos a revisar",val:pendentes,c:pendentes>0?"var(--orange)":"var(--green)"}].map(k=><div key={k.label} style={{background:"var(--surface2)",borderRadius:12,padding:"12px 14px",border:"1px solid var(--border)"}}><div style={{fontSize:20,fontWeight:800,color:k.c}}>{k.val}</div><div style={{fontSize:10,fontWeight:600,color:"var(--text3)",marginTop:4,textTransform:"uppercase",letterSpacing:".05em"}}>{k.label}</div></div>)}</div>
        {pendentes>0&&<div style={{background:"var(--orange-bg)",border:"1px solid var(--orange-dot)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"var(--orange)",marginBottom:12}}>⚠ {pendentes} pagamento(s) com valor quebrado (pró-rata de upgrade). O plano não foi detectado — escolha o plano certo nas linhas destacadas em laranja. O valor pago é mantido como está.</div>}
        {unkUsers.length>0&&<div style={{background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:10,padding:"10px 14px",fontSize:12,color:"var(--amber)",marginBottom:12}}>Serão criados: <strong>{unkUsers.join(", ")}</strong></div>}
        <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
          {formFilters.map(f=>{const c=f.id==="TODOS"?preview.length:(counts[f.id]||0);const active=formFilter===f.id;return(
            <button key={f.id} onClick={()=>setFormFilter(f.id)} style={{border:"1.5px solid "+(active?"var(--purple)":"var(--border)"),background:active?"var(--purple)":"var(--surface)",color:active?"#fff":"var(--text2)",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{f.label} ({c})</button>
          );})}
        </div>
        <div style={{overflowX:"auto",border:"1px solid var(--border)",borderRadius:12,marginBottom:14,maxHeight:380,overflowY:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:820}}>
            <thead><tr style={{background:"var(--surface2)",position:"sticky",top:0}}>{["@ USUÁRIO","DATA","FORMA","USD / CÂMBIO","VALOR (R$)","INTL","PLANO",""].map(h=><th key={h} style={{padding:"8px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".05em",borderBottom:"1.5px solid var(--border)"}}>{h}</th>)}</tr></thead>
            <tbody>{visiblePreview.map(r=>{
              const isUSD=r.method==="CARTÃO USD";const isCardBRL=r.method==="CARTÃO BRL";
              return(
              <tr key={r._id} style={{background:r._proRata?"var(--orange-bg)":"transparent"}}>
                <td style={{...cell,fontWeight:600}}>@{r.username}</td>
                <td style={cell}><input type="date" style={inp} value={r.date} onChange={e=>setCell(r._id,"date",e.target.value)}/></td>
                <td style={cell}><select style={inp} value={r.method} onChange={e=>setCell(r._id,"method",e.target.value)}><option>PIX</option><option>CARTÃO BRL</option><option>CARTÃO USD</option></select></td>
                <td style={cell}>{isUSD?<div style={{display:"flex",gap:4}}><input style={{...inp,width:64}} placeholder="USD" value={r.value_usd||""} onChange={e=>setCell(r._id,"value_usd",e.target.value.replace(",","."))}/><input style={{...inp,width:64}} placeholder="câmbio" value={r.exchange_rate||""} onChange={e=>setCell(r._id,"exchange_rate",e.target.value.replace(",","."))}/></div>:<span style={{color:"var(--text3)",fontSize:11}}>—</span>}</td>
                <td style={cell}><input style={{...inp,...(isUSD?{background:"var(--surface2)",color:"var(--text3)"}:{})}} value={r.value_brl} readOnly={isUSD} title={isUSD?"Calculado: USD × câmbio":""} onChange={e=>!isUSD&&setCell(r._id,"value_brl",e.target.value.replace(",","."))}/></td>
                <td style={{...cell,textAlign:"center"}}>{isCardBRL?<input type="checkbox" checked={!!r.international} onChange={e=>setCell(r._id,"international",e.target.checked)} title="Cartão internacional pagando em BRL (D+5)" style={{accentColor:"var(--purple)",width:15,height:15,cursor:"pointer"}}/>:<span style={{color:"var(--text3)",fontSize:11}}>—</span>}</td>
                <td style={cell}><select style={{...inp,borderColor:r._proRata?"var(--orange-dot)":"var(--border)",fontWeight:r._proRata?700:400}} value={r.plan} onChange={e=>setCell(r._id,"plan",e.target.value)}>{PLANS.map(p=><option key={p.name}>{p.name}</option>)}</select></td>
                <td style={cell}><button onClick={()=>removeRow(r._id)} title="Remover esta linha" style={{border:"none",background:"none",cursor:"pointer",color:"var(--text3)",fontSize:16,lineHeight:1}}>×</button></td>
              </tr>);})}</tbody>
          </table>
          {visiblePreview.length===0&&<div style={{textAlign:"center",padding:"24px 0",color:"var(--text3)",fontSize:12}}>Nenhum pagamento com forma "{formFilter}".</div>}
        </div>
        {formFilter!=="TODOS"&&<div style={{fontSize:11,color:"var(--text3)",marginTop:-8,marginBottom:12}}>Mostrando {visiblePreview.length} de {preview.length} · o botão importa todos.</div>}
        <div style={{display:"flex",gap:10}}>
          <Btn variant="success" onClick={()=>onImport(preview)}>✓ Importar {preview.length} pagamentos</Btn>
          <Btn variant="ghost" onClick={()=>{setPreview(null);setError("");}}>Trocar arquivo</Btn>
        </div>
      </>)}
      {!preview&&<Btn variant="secondary" onClick={onClose}>Cancelar</Btn>}
    </ModalWrap>
  );
}

/* ── Botões de cobrança (copiar mensagem, WhatsApp, DM Instagram) ── */
function CobrancaButtons({sub,msgTpl,onShowToast,onMarkReminded,size="sm"}){
  const st=computeStatus(sub);
  const tpl=st==="AGUARDANDO PAGAMENTO"||st.startsWith("CANCELADO")?msgTpl.atrasado:msgTpl.vencendo;
  const msg=buildCobrancaMsg(tpl,sub);
  const wa=waLink(sub.whatsapp,msg);
  function copyMsg(){
    navigator.clipboard.writeText(msg).then(
      ()=>{onShowToast&&onShowToast("✓ Mensagem copiada — cole no WhatsApp ou DM");onMarkReminded&&onMarkReminded(sub);},
      ()=>onShowToast&&onShowToast("Não consegui copiar a mensagem","error")
    );
  }
  const reminded=sub.last_reminded_at?daysUntil(sub.last_reminded_at):null;
  return(
    <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
      {reminded!==null&&reminded>=-2&&<span title={"Cobrado em "+fmtDate(sub.last_reminded_at)} style={{fontSize:10,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",padding:"2px 7px",borderRadius:8,whiteSpace:"nowrap"}}>🔔 {reminded===0?"cobrado hoje":Math.abs(reminded)+"d"}</span>}
      <Btn size={size} variant="secondary" onClick={copyMsg} title="Copiar mensagem de cobrança">📋 Copiar</Btn>
      {wa
        ? <a href={wa} target="_blank" rel="noopener" onClick={()=>onMarkReminded&&onMarkReminded(sub)} style={{textDecoration:"none"}}><Btn size={size} variant="success" title="Abrir conversa no WhatsApp" style={{pointerEvents:"none"}}>💬 WhatsApp</Btn></a>
        : <Btn size={size} variant="ghost" title="Sem número de WhatsApp cadastrado" style={{opacity:.5}} onClick={()=>onShowToast&&onShowToast("Cadastre o WhatsApp deste assinante (botão Editar)","error")}>💬 WhatsApp</Btn>}
      <a href={instagramDMLink(sub.username)} target="_blank" rel="noopener" style={{textDecoration:"none"}}><Btn size={size} variant="ghost" title="Abrir DM do Instagram" style={{pointerEvents:"none",border:"1.5px solid var(--border)"}}>📷 DM</Btn></a>
    </div>
  );
}

/* ── Tab Pendências (home operacional) ── */
function TabPendencias({subs,msgTpl,onAddPay,onShowToast,onMarkReminded,onGoTab,onFillDueDay,onEditMsg}){
  const aguardando=subs.map(s=>({s,st:computeStatus(s),nd:getNextDue(s)})).filter(x=>x.st==="AGUARDANDO PAGAMENTO");
  const venceHoje=subs.map(s=>({s,st:computeStatus(s),nd:getNextDue(s)})).filter(x=>x.st==="ATIVO"&&x.nd&&daysUntil(x.nd)===0);
  const vence3d=subs.map(s=>({s,st:computeStatus(s),nd:getNextDue(s)})).filter(x=>x.st==="ATIVO"&&x.nd&&daysUntil(x.nd)>=1&&daysUntil(x.nd)<=3);
  const semDueDay=subs.filter(s=>["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s))&&!s.due_day);
  const totalPend=aguardando.length+venceHoje.length+vence3d.length;

  function Linha({x,accent}){
    const s=x.s;const d=x.nd?daysUntil(x.nd):null;
    const proExp=getProExpiry(s);
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"var(--surface)",border:"1.5px solid "+(x.st==="AGUARDANDO PAGAMENTO"?"var(--orange-dot)":"var(--border)"),borderRadius:13,boxShadow:"var(--shadow-sm)",flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:180}}>
          <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:700}}>@{s.username}</span>
            <Pill status={x.st}/>
            <PlanBadge plan={s.plan_name}/>
          </div>
          <div style={{fontSize:11,color:"var(--text2)",marginTop:4}}>
            {fmtBRL(s.plan_value)} · Vence {x.nd?fmtDate(x.nd):"—"} {d!==null&&<span style={{color:accent,fontWeight:600}}>{d<0?`(${Math.abs(d)}d atrasado)`:d===0?"(hoje)":`(${d}d)`}</span>}
            {x.st==="AGUARDANDO PAGAMENTO"&&proExp&&<span style={{color:"var(--orange)",fontWeight:600}}> · sai do PRO {fmtDate(proExp.toISOString().split("T")[0])} às 9h</span>}
          </div>
        </div>
        <CobrancaButtons sub={s} msgTpl={msgTpl} onShowToast={onShowToast} onMarkReminded={onMarkReminded}/>
        <Btn size="sm" onClick={()=>onAddPay(s)}>+ Pag.</Btn>
      </div>
    );
  }
  function Secao({titulo,itens,accent,nota}){
    if(!itens.length)return null;
    return(
      <div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
          <span style={{fontSize:11,fontWeight:700,color:accent,letterSpacing:".06em",textTransform:"uppercase"}}>{titulo} · {itens.length}</span>
          {nota&&<span style={{fontSize:11,color:accent,opacity:.7}}>{nota}</span>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:7}}>{itens.map((x,i)=><Linha key={x.s.username+i} x={x} accent={accent}/>)}</div>
      </div>
    );
  }
  return(
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:13,color:"var(--text2)",fontWeight:600}}>{totalPend>0?`${totalPend} pendência${totalPend>1?"s":""} para hoje`:"Sem pendências"}</div>
        <Btn variant="ghost" size="sm" style={{border:"1.5px solid var(--border)"}} onClick={onEditMsg}>✏ Editar mensagens de cobrança</Btn>
      </div>
      {totalPend===0&&semDueDay.length===0&&(
        <div style={{textAlign:"center",padding:"60px 0",color:"var(--text3)"}}>
          <div style={{fontSize:40,marginBottom:10}}>✓</div>
          <div style={{fontSize:15,fontWeight:700,color:"var(--green)"}}>Tudo em dia!</div>
          <div style={{fontSize:13,marginTop:4}}>Nenhuma cobrança ou pendência para hoje.</div>
        </div>
      )}
      {semDueDay.length>0&&(
        <div style={{background:"var(--amber-bg)",border:"1.5px solid var(--amber-border)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{fontSize:12,color:"var(--amber)"}}><strong>{semDueDay.length} assinante(s) ativo(s) sem dia de vencimento.</strong> Isso afeta o cálculo de status.</div>
          <Btn variant="warning" size="sm" onClick={onFillDueDay}>↑ Corrigir automaticamente</Btn>
        </div>
      )}
      <Secao titulo="Aguardando pagamento" itens={aguardando} accent="var(--orange)" nota="período de graça — cobre já"/>
      <Secao titulo="Vence hoje" itens={venceHoje} accent="var(--red)"/>
      <Secao titulo="Vence nos próximos 3 dias" itens={vence3d} accent="var(--amber)"/>
      <div style={{fontSize:11,color:"var(--text3)",textAlign:"center",paddingTop:6}}>
        Quer ver liquidações do Stripe esperadas? <button onClick={()=>onGoTab("financeiro")} style={{border:"none",background:"none",color:"var(--purple)",fontWeight:700,cursor:"pointer",textDecoration:"underline",fontFamily:"inherit",fontSize:11}}>Abrir Financeiro →</button>
      </div>
    </div>
  );
}

/* ── Modal: registrar motivo de saída (1 clique) ── */
function ModalMotivo({sub,onSave,onClose}){
  const [motivo,setMotivo]=useState(sub.cancel_reason||"");
  const [obs,setObs]=useState(sub.cancel_note||"");
  return(
    <ModalWrap onClose={onClose}>
      <MTitle>Por que @{sub.username} saiu?</MTitle>
      <div style={{fontSize:12,color:"var(--text2)",marginTop:-12,marginBottom:16}}>Registrar o motivo ajuda a entender o churn real e agir na causa.</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:14}}>
        {MOTIVOS_CHURN.map(m=>(
          <button key={m} onClick={()=>setMotivo(m)} style={{border:"1.5px solid "+(motivo===m?"var(--purple)":"var(--border)"),background:motivo===m?"var(--purple)":"var(--surface)",color:motivo===m?"#fff":"var(--text2)",borderRadius:20,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{m}</button>
        ))}
      </div>

}

      {/* Perdidos: escondidos por padrão (baixa prioridade) */}

      {/* Motivos do churn */}
      {motivosTotal>0&&(

/* Tab Dashboard */
/* ── Gráfico de Evolução ── */
function GraficoEvolucao({subs}){
  const now=new Date();
  const [periodo,setPeriodo]=useState("6m");
  const [customFrom,setCustomFrom]=useState(()=>{const d=new Date(now.getFullYear(),now.getMonth()-5,1);return d.toISOString().split("T")[0];});
  const [customTo,setCustomTo]=useState(todayStr());
  const [granularidade,setGranularidade]=useState("mes"); // mes | dia
  const [ativos_on,setAtivos]=useState(true);
  const [bruto_on,setBruto]=useState(true);
  const [liquido_on,setLiquido]=useState(false);
  const [novos_on,setNovos]=useState(true);
  const [cancelamentos_on,setCancelamentos]=useState(true);
  const [reativacoes_on,setReativacoes]=useState(false);
  const [ticket_on,setTicket]=useState(false);
  const [tooltip,setTooltip]=useState(null);
  const [replayIdx,setReplayIdx]=useState(null); // null=off, number=current frame
  const [replayPlaying,setReplayPlaying]=useState(false);
  const replayRef=useRef(null);
  const svgRef=useRef();

  // Build period bounds
  const bounds=useMemo(()=>{
    const end=new Date(now.getFullYear(),now.getMonth()+1,0); // last day of current month
    let start;
    if(periodo==="mes"){start=new Date(now.getFullYear(),now.getMonth(),1);}else if(periodo==="3m")start=new Date(now.getFullYear(),now.getMonth()-2,1);
    else if(periodo==="6m")start=new Date(now.getFullYear(),now.getMonth()-5,1);
    else if(periodo==="12m")start=new Date(now.getFullYear(),now.getMonth()-11,1);
    else if(periodo==="all"){
      const allDates=subs.flatMap(s=>(s.payments||[]).map(p=>p.date)).filter(Boolean).sort();
      start=allDates.length?parseLocal(allDates[0]):new Date(now.getFullYear(),now.getMonth(),1);
      start=new Date(start.getFullYear(),start.getMonth(),1);
    } else { // custom
      start=parseLocal(customFrom)||new Date(now.getFullYear(),now.getMonth(),1);
    }
    return{start,end};
  },[periodo,customFrom,customTo,subs]);

  // Determine if day granularity is possible (≤31 days range)
  const dayRange=Math.round((bounds.end-bounds.start)/86400000);
  const canShowDays=dayRange<=31;
  const useDay=granularidade==="dia"&&canShowDays;

  // Build data points
  const points=useMemo(()=>{
    const pts=[];
    if(useDay){
      // iterate day by day
      let cur=new Date(bounds.start);
      while(cur<=bounds.end&&cur<=now){
        const iso=cur.toISOString().split("T")[0];
        const dayPmts=subs.flatMap(s=>(s.payments||[]).map(p=>({...p,_sub:s}))).filter(p=>p.date===iso);
        const bruto=dayPmts.reduce((a,p)=>a+pmtBRL(p),0);
        const liquido=dayPmts.reduce((a,p)=>a+pmtNet(p),0);
        const novos=subs.filter(s=>{const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));return sorted.length&&sorted[0].date===iso;}).length;
        const reativacoes=dayPmts.filter(p=>p.is_reactivation).length;
        const CANC_ST=["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"];const cancelamentos=subs.filter(s=>{if(!CANC_ST.includes(computeStatus(s)))return false;const pmts=s.payments||[];if(!pmts.length)return false;const last=pmts.reduce((a,b)=>a.date>b.date?a:b);const cd=addDays(parseLocal(last.date),33);return cd.toISOString().split("T")[0]===iso;}).length;
        const ativosCount=new Set(dayPmts.map(p=>p._sub.username)).size;
        const ticket=dayPmts.length>0?bruto/dayPmts.length:0;
        const[,, d]=iso.split("-");
        pts.push({label:`${parseInt(d)}/${parseInt(iso.split("-")[1])}`,bruto,liquido,novos,cancelamentos,reativacoes,ativos:ativosCount,ticket});
        cur=addDays(cur,1);
      }
    } else {
      // iterate month by month
      let cy=bounds.start.getFullYear(),cm=bounds.start.getMonth();
      const ey=bounds.end.getFullYear(),em=bounds.end.getMonth();
      while(cy<ey||(cy===ey&&cm<=em)){
        const monthPmts=subs.flatMap(s=>(s.payments||[]).map(p=>({...p,_sub:s}))).filter(p=>{if(!p.date)return false;const[y,m]=p.date.split("-").map(Number);return y===cy&&m-1===cm;});
        const bruto=monthPmts.reduce((a,p)=>a+pmtBRL(p),0);
        const liquido=monthPmts.reduce((a,p)=>a+pmtNet(p),0);
        const novos=subs.filter(s=>{const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));if(!sorted.length)return false;const[y,m]=sorted[0].date.split("-").map(Number);return y===cy&&m-1===cm;}).length;
        const reativacoes=monthPmts.filter(p=>p.is_reactivation).length;
        const CANC_ST=["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"];const cancelamentos=subs.filter(s=>{if(!CANC_ST.includes(computeStatus(s)))return false;const pmts=s.payments||[];if(!pmts.length)return false;const last=pmts.reduce((a,b)=>a.date>b.date?a:b);const cd=addDays(parseLocal(last.date),33);return cd.getFullYear()===cy&&cd.getMonth()===cm;}).length;
        // ativos = usuários únicos que pagaram no mês
        const ativosCount=new Set(monthPmts.map(p=>p._sub.username)).size;
        const ticket=monthPmts.length>0?bruto/monthPmts.length:0;
        pts.push({label:`${MONTHS_PT[cm]}/${cy}`,bruto,liquido,novos,cancelamentos,reativacoes,ativos:ativosCount,ticket});
        cm++;if(cm>11){cm=0;cy++;}
      }
    }
    return pts;
  },[subs,bounds,useDay]);

  if(!points.length)return null;

  const W=700,H=220,PL=52,PR=16,PT=16,PB=36;
  const IW=W-PL-PR,IH=H-PT-PB;

  const SERIES=[
    {key:"bruto",label:"Bruto",color:"#7447E1",on:bruto_on,set:setBruto,fmt:fmtBRL},
    {key:"liquido",label:"Líquido",color:"#1B8B5E",on:liquido_on,set:setLiquido,fmt:fmtBRL},
    {key:"ativos",label:"Ativos",color:"#1853A8",on:ativos_on,set:setAtivos,fmt:v=>v},
    {key:"novos",label:"Novos",color:"#E07020",on:novos_on,set:setNovos,fmt:v=>v},
    {key:"cancelamentos",label:"Cancelam.",color:"#B82828",on:cancelamentos_on,set:setCancelamentos,fmt:v=>v},
    {key:"reativacoes",label:"Reat.",color:"#9B6208",on:reativacoes_on,set:setReativacoes,fmt:v=>v},
    {key:"ticket",label:"Ticket",color:"#A49EC4",on:ticket_on,set:setTicket,fmt:fmtBRL},
  ];
  const activeSeries=SERIES.filter(s=>s.on);

  // Normalize each active series independently (dual axis: monetary vs count)
  function getMax(key){return Math.max(...points.map(p=>p[key]||0),1);}
  function norm(val,key){return val/(getMax(key));}

  function pathD(key){
    return points.map((p,i)=>{
      const x=PL+i*(IW/(points.length-1||1));
      const y=PT+IH-(norm(p[key]||0,key)*IH);
      return`${i===0?"M":"L"}${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(" ");
  }

  // Replay logic
  function startReplay(){
    if(!points.length)return;
    setReplayIdx(0);setReplayPlaying(true);
  }
  function stopReplay(){
    setReplayPlaying(false);setReplayIdx(null);
    if(replayRef.current)clearTimeout(replayRef.current);
  }
  useEffect(()=>{
    if(!replayPlaying||replayIdx===null)return;
    if(replayIdx>=points.length-1){setReplayPlaying(false);setReplayIdx(null);return;}
    replayRef.current=setTimeout(()=>setReplayIdx(i=>i+1),2000);
    return()=>clearTimeout(replayRef.current);
  },[replayPlaying,replayIdx]);

  const replayPoints=replayIdx!==null?points.slice(0,replayIdx+1):points;
  const periodoOpts=[{id:"mes",label:"Este mês"},{id:"3m",label:"3M"},{id:"6m",label:"6M"},{id:"12m",label:"12M"},{id:"all",label:"Tudo"},{id:"custom",label:"Personalizado"}];

  function handleSvgMouseMove(e){
    if(!svgRef.current)return;
    const rect=svgRef.current.getBoundingClientRect();
    const scaleX=W/rect.width;
    const mx=(e.clientX-rect.left)*scaleX;
    const idx=Math.round((mx-PL)/((IW)/(points.length-1||1)));
    if(idx>=0&&idx<points.length)setTooltip({idx,x:(PL+idx*(IW/(points.length-1||1))),pt:points[idx]});
  }

  return(
    <Card>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
        <SLabel style={{margin:0}}>Evolução</SLabel>
        <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
          {!replayPlaying&&replayIdx===null&&<button onClick={startReplay} title="Assistir replay" style={{border:"1.5px solid var(--purple)",background:"var(--purple-light)",color:"var(--purple)",borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>▶ Replay</button>}
          {replayPlaying&&<button onClick={stopReplay} style={{border:"1.5px solid var(--red)",background:"var(--red-bg)",color:"var(--red)",borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>⏹ Parar</button>}
          {replayIdx!==null&&!replayPlaying&&<button onClick={startReplay} style={{border:"1.5px solid var(--purple)",background:"var(--purple-light)",color:"var(--purple)",borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>↺ Rever</button>}
          {replayIdx!==null&&<div style={{fontSize:11,color:"var(--purple)",fontWeight:700,background:"var(--purple-light)",borderRadius:8,padding:"4px 10px"}}>{replayPoints[replayPoints.length-1]?.label}</div>}
          {periodoOpts.map(o=>(
            <button key={o.id} onClick={()=>setPeriodo(o.id)} style={{border:"1.5px solid "+(periodo===o.id?"var(--purple)":"var(--border)"),background:periodo===o.id?"var(--purple)":"var(--surface)",color:periodo===o.id?"#fff":"var(--text2)",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{o.label}</button>
          ))}
          {canShowDays&&(
            <div style={{display:"flex",gap:4,marginLeft:4}}>
              {["mes","dia"].map(g=>(
                <button key={g} onClick={()=>setGranularidade(g)} style={{border:"1.5px solid "+(granularidade===g?"var(--purple)":"var(--border)"),background:granularidade===g?"var(--purple-light)":"var(--surface)",color:granularidade===g?"var(--purple)":"var(--text2)",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{g==="mes"?"Por mês":"Por dia"}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      {periodo==="custom"&&(
