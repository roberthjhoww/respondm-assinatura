            <div style={{background:"var(--purple-light)",borderRadius:10,padding:"6px 18px",fontWeight:800,fontSize:14,color:"var(--purple)",minWidth:130,textAlign:"center"}}>{MONTHS_PT[selMonth]}/{selYear}</div>
            <button onClick={nextMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:9,width:32,height:32,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>›</button>
            <select value={selYear} onChange={e=>setSelYear(parseInt(e.target.value))} style={{padding:"6px 10px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text2)",fontSize:12,fontFamily:"inherit",fontWeight:600}}>{years.map(y=><option key={y}>{y}</option>)}</select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <FSelect style={{width:180}} value={compareA} onChange={e=>setCompareA(e.target.value)}>
              <option value="">— Grupo A —</option>
              {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </FSelect>
            <span style={{color:"var(--text3)",fontWeight:700,fontSize:16}}>⇄</span>
            <FSelect style={{width:180}} value={compareB} onChange={e=>setCompareB(e.target.value)}>
              <option value="">— Grupo B —</option>
              {groups.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
            </FSelect>
          </div>
        </div>
      </Card>

      {compareA&&compareB&&compareA!==compareB&&(()=>{
        const gA=groups.find(g=>g.id===compareA);const gB=groups.find(g=>g.id===compareB);
        if(!gA||!gB)return null;
        const mA=getGroupMetrics(gA,subs,selYear,selMonth);const mB=getGroupMetrics(gB,subs,selYear,selMonth);
        return(
          <Card style={{padding:0,overflow:"hidden"}}>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
                <thead>
                  <tr style={{background:"var(--surface2)",borderBottom:"1.5px solid var(--border)"}}>
                    <th style={{padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".07em",textTransform:"uppercase",minWidth:140}}>Métrica</th>
                    <th style={{padding:"12px 16px",textAlign:"right",fontSize:13,fontWeight:800,color:"var(--purple)",background:"var(--purple-light)",minWidth:160}}>
                      <div>{gA.name}</div><div style={{marginTop:3}}><GroupTypeBadge type={gA.type}/></div>
                    </th>
                    <th style={{padding:"12px 16px",textAlign:"right",fontSize:13,fontWeight:800,color:"var(--blue)",background:"var(--blue-bg)",minWidth:160}}>
                      <div>{gB.name}</div><div style={{marginTop:3}}><GroupTypeBadge type={gB.type}/></div>
                    </th>
                    <th style={{padding:"12px 16px",textAlign:"right",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".07em",textTransform:"uppercase"}}>Diferença</th>
                  </tr>
                </thead>
                <tbody>
                  {METRIC_DEFS.map((m,i)=>{
                    const va=mA[m.key]||0;const vb=mB[m.key]||0;
                    const diff=va-vb;const pct=vb!==0?((va-vb)/vb*100):null;
                    const diffFmt=m.fmt===fmtBRL?fmtBRL(Math.abs(diff)):`${Math.abs(diff)}`;
                    const sign=diff>0?"+":diff<0?"-":"";
                    const diffColor=diff>0?"var(--green)":diff<0?"var(--red)":"var(--text3)";
                    return(
                      <tr key={m.key} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"var(--surface)":"var(--surface2)"}}>
                        <td style={{padding:"11px 16px"}}>
                          <div style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{m.label}</div>
                          <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{m.desc}</div>
                        </td>
                        <td style={{padding:"11px 16px",textAlign:"right",fontSize:14,fontWeight:700,color:"var(--purple)",background:"rgba(116,71,225,.04)"}}>{m.fmt(va)}</td>
                        <td style={{padding:"11px 16px",textAlign:"right",fontSize:14,fontWeight:700,color:"var(--blue)",background:"rgba(24,83,168,.04)"}}>{m.fmt(vb)}</td>
                        <td style={{padding:"11px 16px",textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:700,color:diffColor}}>{sign}{diffFmt}</div>
                          {pct!==null&&<div style={{fontSize:11,color:diffColor,opacity:.8}}>{sign}{Math.abs(pct).toFixed(1)}%</div>}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:"10px 16px",fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border)"}}>Diferença = {gA.name} − {gB.name} · positivo = {gA.name} maior</div>
          </Card>
        );
      })()}

      {(!compareA||!compareB||compareA===compareB)&&(
        <div style={{textAlign:"center",padding:"40px 0",color:"var(--text3)",fontSize:13}}>Selecione dois grupos diferentes para comparar.</div>
      )}
    </div>
  );

  return null;
}

/* ── Tab Metas ── */
function TabMetas({subs,metas,onSaveMetas}){
  const now=new Date();
  const [selY,setSelY]=useState(now.getFullYear());
  const [selM,setSelM]=useState(now.getMonth());
  const isCurrentMonth=selY===now.getFullYear()&&selM===now.getMonth();
  const curY=selY,curM=selM;
  const monthKey=`${curY}-${String(curM+1).padStart(2,"0")}`;
  const def={mrr:0,novos:0,churnMax:5,enabled:{mrr:false,novos:false,churn:false}};
  const raw=metas?.[monthKey]||{};
  const m={...def,...raw,enabled:{...def.enabled,...(raw.enabled||{})}};
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({mrr:String(m.mrr||""),novos:String(m.novos||""),churnMax:String(m.churnMax||"5"),enabled:{mrr:m.enabled.mrr,novos:m.enabled.novos,churn:m.enabled.churn}});
  // Reset form when month changes
  useEffect(()=>{const r=metas?.[monthKey]||{};const mm={...def,...r,enabled:{...def.enabled,...(r.enabled||{})}};setForm({mrr:String(mm.mrr||""),novos:String(mm.novos||""),churnMax:String(mm.churnMax||"5"),enabled:{mrr:mm.enabled.mrr,novos:mm.enabled.novos,churn:mm.enabled.churn}});},[monthKey]);
  function setF(k,v){setForm(f=>({...f,[k]:v}));}
  function setEn(k,v){setForm(f=>({...f,enabled:{...f.enabled,[k]:v}}));}
  function saveMetas(){onSaveMetas(monthKey,{mrr:parseFloat(form.mrr)||0,novos:parseInt(form.novos)||0,churnMax:parseFloat(form.churnMax)||5,enabled:form.enabled});setEditing(false);}

  // Métricas do mês atual
  const brutoPmts=subs.flatMap(s=>(s.payments||[]).map(p=>({...p}))).filter(p=>{if(!p.date)return false;const[y,mo]=p.date.split("-").map(Number);return y===curY&&mo-1===curM;});const brutoAtual=brutoPmts.reduce((a,p)=>a+pmtBRL(p),0);
  const novosAtual=subs.filter(s=>{const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));if(!sorted.length)return false;const[fy,fm]=sorted[0].date.split("-").map(Number);return fy===curY&&fm-1===curM;}).length;
  const firstOfMonth=new Date(curY,curM,1);
  const prevStart=new Date(curY,curM-1,1);const prevEnd=new Date(curY,curM,0,23,59,59);
  const CANC=["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"];
  const inR=(date,s,e)=>{if(!date)return false;const d=parseLocal(date);return d>=s&&d<=e;};
  const paidPrev=subs.filter(s=>(s.payments||[]).some(p=>inR(p.date,prevStart,prevEnd)));
  const churnedN=paidPrev.filter(s=>CANC.includes(computeStatus(s))&&!(s.payments||[]).some(p=>inR(p.date,firstOfMonth,now))).length;
  const churnAtual=paidPrev.length>0?parseFloat(((churnedN/paidPrev.length)*100).toFixed(1)):0;

  // Pace (ritmo) — só aplica no mês atual
  const diasNoMes=new Date(curY,curM+1,0).getDate();
  const diasPassados=isCurrentMonth?now.getDate():diasNoMes;
  const pace=diasPassados/diasNoMes;
  const novosProj=isCurrentMonth&&pace>0?Math.round(novosAtual/pace):novosAtual;

  // Histórico 6 meses
  const hist=useMemo(()=>{
    const rows=[];
    for(let i=5;i>=0;i--){
      let mo=curM-i,yr=curY;while(mo<0){mo+=12;yr--;}
      const label=`${MONTHS_PT[mo]}/${yr}`;
      // MRR histórico: para mês atual usa snapshot atual, para meses passados calcula pelo último dia
      const lastDayOfMonth=new Date(yr,mo+1,0,23,59,59);
      // Receita bruta do mês
      const mrrSnap=subs.flatMap(s=>(s.payments||[])).filter(p=>{if(!p.date)return false;const[py,pm]=p.date.split("-").map(Number);return py===yr&&pm-1===mo;}).reduce((a,p)=>a+pmtBRL(p),0);
      const novosM=subs.filter(s=>{const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));if(!sorted.length)return false;const[fy,fm]=sorted[0].date.split("-").map(Number);return fy===yr&&fm-1===mo;}).length;
      const pS=new Date(yr,mo-1,1);const pE=new Date(yr,mo,0,23,59,59);const cS=new Date(yr,mo,1);const cE=new Date(yr,mo+1,0,23,59,59);
      const pp=subs.filter(s=>(s.payments||[]).some(p=>inR(p.date,pS,pE)));
      const ch=pp.filter(s=>CANC.includes(computeStatus(s))&&!(s.payments||[]).some(p=>inR(p.date,cS,cE))).length;
      const chPct=pp.length>0?parseFloat(((ch/pp.length)*100).toFixed(1)):0;
      const isCurrent=yr===curY&&mo===curM;
      rows.push({label,yr,mo,mrrSnap,novosM,chPct,isCurrent});
    }
    return rows;
  },[subs]);

  function MetaBlock({title,enabled,onToggle,meta,atual,proj,unit,isBad,info}){
    const pct=meta>0?Math.min(100,Math.round(atual/meta*100)):0;
    const projPct=meta>0?Math.min(150,Math.round(proj/meta*100)):0;
    const onTrack=isBad?(proj<=meta):(proj>=meta);
    const color=!enabled?"var(--text3)":isBad?(atual<=meta?"var(--green)":"var(--red)"):(pct>=100?"var(--green)":pct>=70?"var(--amber)":"var(--red)");
    return(
      <Card style={{padding:"16px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
              <input type="checkbox" checked={enabled} onChange={e=>onToggle(e.target.checked)} style={{accentColor:"var(--purple)",width:14,height:14}}/>
              <span style={{fontSize:11,fontWeight:700,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>{title}</span>
            </label>
            {info&&<InfoTip text={info}/>}
          </div>
          {enabled&&<span style={{fontSize:11,fontWeight:700,color:onTrack?"var(--green)":"var(--red)"}}>{onTrack?"✓ No ritmo":"⚠ Abaixo do ritmo"}</span>}
        </div>
        {!enabled?<div style={{fontSize:12,color:"var(--text3)"}}>Meta desativada. Ative o toggle para configurar.</div>:(
          <>
            <div style={{display:"flex",alignItems:"flex-end",gap:16,marginBottom:10}}>
              <div><div style={{fontSize:28,fontWeight:800,color,lineHeight:1}}>{unit==="R$"?fmtBRL(atual):`${atual}`}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>atual</div></div>
              <div style={{fontSize:20,color:"var(--text3)"}}>→</div>
              <div><div style={{fontSize:22,fontWeight:700,color:"var(--text2)",lineHeight:1}}>{unit==="R$"?fmtBRL(meta):`${meta}${unit}`}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>meta</div></div>
              <div style={{marginLeft:"auto",textAlign:"right"}}>
                <div style={{fontSize:13,fontWeight:700,color:"var(--blue)"}}>{unit==="R$"?fmtBRL(proj):`${proj}${unit}`}</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>projeção</div>
              </div>
            </div>
            <div style={{height:8,background:"var(--surface2)",borderRadius:4,overflow:"hidden",marginBottom:6}}>
              <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:4,transition:"width .5s"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text3)"}}>
              <span>{pct}% da meta{isCurrentMonth?" · dia "+diasPassados+"/"+diasNoMes:" · mês completo"}</span>
              <span style={{color:onTrack?"var(--green)":"var(--red)",fontWeight:600}}>{onTrack?`Projeção: ${projPct}% da meta`:`Ritmo atual: ${projPct}% no fim do mês`}</span>
            </div>
          </>
        )}
      </Card>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={()=>{let m=selM-1,y=selY;if(m<0){m=11;y--;}setSelM(m);setSelY(y);}} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>‹</button>
          <div style={{fontSize:13,fontWeight:700,color:"var(--purple)",minWidth:100,textAlign:"center"}}>{MONTHS_PT[curM]}/{curY}{isCurrentMonth?" (atual)":""}</div>
          <button onClick={()=>{let m=selM+1,y=selY;if(m>11){m=0;y++;}if(y>now.getFullYear()||(y===now.getFullYear()&&m>now.getMonth()))return;setSelM(m);setSelY(y);}} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>›</button>
          {!isCurrentMonth&&<div style={{fontSize:11,color:"var(--text3)"}}>{diasPassados}/{diasNoMes} dias</div>}
          {isCurrentMonth&&<div style={{fontSize:11,color:"var(--text3)"}}>dia {diasPassados} de {diasNoMes}</div>}
        </div>
        <Btn variant={editing?"primary":"secondary"} size="sm" onClick={()=>editing?saveMetas():setEditing(v=>!v)}>{editing?"Salvar metas":"✏ Editar metas"}</Btn>
      </div>

      {editing&&(
        <Card style={{padding:"16px 18px"}}>
          <SLabel>Configurar metas</SLabel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
            <div>
              <label style={{display:"flex",alignItems:"center",gap:6,marginBottom:7,cursor:"pointer"}}>
                <input type="checkbox" checked={form.enabled.mrr} onChange={e=>setEn("mrr",e.target.checked)} style={{accentColor:"var(--purple)",width:14,height:14}}/>
                <span style={{fontSize:11,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Meta receita bruta (R$)</span>
              </label>
              <input type="number" value={form.mrr} onChange={e=>setF("mrr",e.target.value)} disabled={!form.enabled.mrr} placeholder="ex: 5000" style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:13,width:"100%",fontFamily:"inherit",opacity:form.enabled.mrr?1:.5}}/>
            </div>
            <div>
              <label style={{display:"flex",alignItems:"center",gap:6,marginBottom:7,cursor:"pointer"}}>
                <input type="checkbox" checked={form.enabled.novos} onChange={e=>setEn("novos",e.target.checked)} style={{accentColor:"var(--purple)",width:14,height:14}}/>
                <span style={{fontSize:11,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Meta novos</span>
              </label>
              <input type="number" value={form.novos} onChange={e=>setF("novos",e.target.value)} disabled={!form.enabled.novos} placeholder="ex: 20" style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:13,width:"100%",fontFamily:"inherit",opacity:form.enabled.novos?1:.5}}/>
            </div>
            <div>
              <label style={{display:"flex",alignItems:"center",gap:6,marginBottom:7,cursor:"pointer"}}>
                <input type="checkbox" checked={form.enabled.churn} onChange={e=>setEn("churn",e.target.checked)} style={{accentColor:"var(--purple)",width:14,height:14}}/>
                <span style={{fontSize:11,fontWeight:600,color:"var(--text2)",textTransform:"uppercase",letterSpacing:".05em"}}>Churn máximo (%)</span>
              </label>
              <input type="number" value={form.churnMax} onChange={e=>setF("churnMax",e.target.value)} disabled={!form.enabled.churn} placeholder="ex: 3" step="0.1" style={{padding:"8px 11px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:13,width:"100%",fontFamily:"inherit",opacity:form.enabled.churn?1:.5}}/>
            </div>
          </div>
          <div style={{marginTop:12,display:"flex",gap:8}}> 
            <Btn onClick={saveMetas}>Salvar</Btn>
            <Btn variant="secondary" onClick={()=>setEditing(false)}>Cancelar</Btn>
          </div>
        </Card>
      )}

      <MetaBlock title="Receita bruta" enabled={m.enabled.mrr} onToggle={v=>onSaveMetas(monthKey,{...m,enabled:{...m.enabled,mrr:v}})} meta={m.mrr} atual={brutoAtual} proj={isCurrentMonth&&pace>0?Math.round(brutoAtual/pace):brutoAtual} unit="R$" isBad={false} info={"Meta de receita bruta: soma de todos os pagamentos do mês. A projeção estima o valor total baseado no ritmo atual."}/>
      <MetaBlock title="Novos assinantes" enabled={m.enabled.novos} onToggle={v=>onSaveMetas(monthKey,{...m,enabled:{...m.enabled,novos:v}})} meta={m.novos} atual={novosAtual} proj={novosProj} unit="" isBad={false} info={"Meta de novos assinantes no mês. A projeção é calculada pelo ritmo atual: (novos até hoje ÷ dias passados) × dias totais do mês."}/>
      <MetaBlock title="Churn máximo" enabled={m.enabled.churn} onToggle={v=>onSaveMetas(monthKey,{...m,enabled:{...m.enabled,churn:v}})} meta={m.churnMax} atual={churnAtual} proj={churnAtual} unit="%" isBad={true} info={"Meta de churn máximo aceitável. Verde = abaixo da meta. A lógica é Opção A: quem pagou no mês anterior, não pagou neste mês e está cancelado hoje."}/>

      {/* Histórico */}
      <Card style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"14px 18px 10px",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".08em",textTransform:"uppercase"}}>Histórico de metas (6 meses)</div>
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}>
            <thead>
              <tr style={{background:"var(--surface2)",borderBottom:"1.5px solid var(--border)"}}>
                <th style={{padding:"10px 16px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".06em",textTransform:"uppercase"}}>Mês</th>
                {m.enabled.mrr&&<th style={{padding:"10px 14px",textAlign:"center",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".06em",textTransform:"uppercase"}}>Bruto vs meta</th>}
                {m.enabled.novos&&<th style={{padding:"10px 14px",textAlign:"center",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".06em",textTransform:"uppercase"}}>Novos vs meta</th>}
                {m.enabled.churn&&<th style={{padding:"10px 14px",textAlign:"center",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".06em",textTransform:"uppercase"}}>Churn vs meta</th>}
              </tr>
            </thead>
            <tbody>
              {hist.map((row,i)=>(
                <tr key={i} style={{borderBottom:"1px solid var(--border)",background:row.isCurrent?"var(--purple-light)":i%2===0?"var(--surface)":"var(--surface2)"}}>
                  <td style={{padding:"11px 16px",fontSize:13,fontWeight:row.isCurrent?700:500,color:row.isCurrent?"var(--purple)":"var(--text)"}}>{row.label}{row.isCurrent&&<span style={{fontSize:10,color:"var(--purple)",marginLeft:6}}>← atual</span>}</td>
                  {m.enabled.mrr&&(()=>{const ok=row.mrrSnap>=m.mrr;return<td style={{padding:"11px 14px",textAlign:"center"}}><span style={{fontSize:12,fontWeight:700,color:ok?"var(--green)":"var(--red)"}}>{ok?"✓":"✗"}</span><span style={{fontSize:11,color:"var(--text3)",marginLeft:6}}>{fmtBRL(row.mrrSnap)}</span></td>})()}
                  {m.enabled.novos&&(()=>{const ok=row.novosM>=m.novos;return<td style={{padding:"11px 14px",textAlign:"center"}}><span style={{fontSize:12,fontWeight:700,color:ok?"var(--green)":"var(--red)"}}>{ok?"✓":"✗"}</span><span style={{fontSize:11,color:"var(--text3)",marginLeft:6}}>{row.novosM}</span></td>})()}
                  {m.enabled.churn&&(()=>{const ok=row.chPct<=m.churnMax;return<td style={{padding:"11px 14px",textAlign:"center"}}><span style={{fontSize:12,fontWeight:700,color:ok?"var(--green)":"var(--red)"}}>{ok?"✓":"✗"}</span><span style={{fontSize:11,color:"var(--text3)",marginLeft:6}}>{row.chPct}%</span></td>})()}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        {!m.enabled.mrr&&!m.enabled.novos&&!m.enabled.churn&&<div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>Nenhuma meta ativa. Clique em "Editar metas" para configurar.</div>}
      </Card>
    </div>
  );
}

/* ── Tab Financeiro ── */
const DEFAULT_CATS=["Ferramentas/SaaS","Tráfego pago","Comissões/Afiliados","Funcionários/Freelancers","Outros"];
const CUSTO_RECORR=["Mensal","Pontual"];
function makeFinId(){return"f_"+Math.random().toString(36).substring(2,10);}

function ModalLiquidar({pmt,onSave,onClose}){
  const prev=payoutDate(pmt.date,pmt.method,pmt.international);
  const [date,setDate]=useState(prev?prev.toISOString().split("T")[0]:todayStr());
  const [taxaExtra,setTaxaExtra]=useState("");
  const prazoLabel=pmt.method==="CARTÃO USD"||(pmt.method==="CARTÃO BRL"&&pmt.international)?"D+5 dias úteis":"D+30 dias corridos (próximo dia útil)";
  const taxaVal=parseBRL(taxaExtra)||0;
  const liquidoFinal=pmtNet(pmt)-taxaVal;
  return(
    <ModalWrap onClose={onClose}>
      <MTitle>Liquidar pagamento</MTitle>
      <div style={{background:"var(--surface2)",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13}}>
        <div style={{fontWeight:700}}>@{pmt.username}</div>
        <div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>{fmtDate(pmt.date)} · <MethodBadge method={pmt.method}/> · <span style={{fontWeight:700,color:"var(--green)"}}>{fmtBRL(pmtNet(pmt))}</span> líquido</div>
        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Prazo: {prazoLabel} → previsão {prev?fmtDate(prev.toISOString().split("T")[0]):"—"}</div>
      </div>
      <FInput label="Data de liquidação" type="date" value={date} onChange={e=>setDate(e.target.value)}/>
      <div style={{marginTop:12,padding:"12px 14px",background:"var(--amber-bg)",border:"1px solid var(--amber-border)",borderRadius:10}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--amber)",textTransform:"uppercase",letterSpacing:".05em",marginBottom:8}}>Imposto Stripe (opcional)</div>
        <FInput label="Valor cobrado (Fees billing adjustment)" value={taxaExtra} onChange={e=>setTaxaExtra(e.target.value)} placeholder="ex: 2,60"/>
        {taxaVal>0&&<div style={{fontSize:12,color:"var(--amber)",marginTop:6}}>Líquido final: <strong>{fmtBRL(liquidoFinal)}</strong> ({fmtBRL(pmtNet(pmt))} − {fmtBRL(taxaVal)})</div>}
        <div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>PIS/COFINS/ISS sobre taxas da Stripe. Aparece no DRE como "Imposto Stripe".</div>
      </div>
      <div style={{fontSize:11,color:"var(--text3)",marginTop:10,marginBottom:14}}>Será registrado no fluxo de caixa na data de liquidação.</div>
      <div style={{display:"flex",gap:8}}><Btn onClick={()=>onSave(date,taxaVal>0?taxaVal:null)}>✓ Confirmar liquidação</Btn><Btn variant="secondary" onClick={onClose}>Cancelar</Btn></div>
    </ModalWrap>
  );
}

function TabFinanceiro({subs,fin,onSaveFin}){
  const now=new Date();
  const [view,setView]=useState("pendentes");
  const [modalLiq,setModalLiq]=useState(null);
  const [modalCusto,setModalCusto]=useState(null);
  const [modalExtra,setModalExtra]=useState(null);
  const [modalRet,setModalRet]=useState(null);
  const [modalPixLote,setModalPixLote]=useState(false);

  function handleSavePixLote(lote){onSaveFin({...fin,pixLotes:[...pixLotes,lote]});setModalPixLote(false);}
  function deletePixLote(id){onSaveFin({...fin,pixLotes:pixLotes.filter(l=>l.id!==id)});}
  const [selY,setSelY]=useState(now.getFullYear());
  const [selM,setSelM]=useState(now.getMonth());
  const [searchPend,setSearchPend]=useState("");
  const [selectedPmts,setSelectedPmts]=useState({});
  const [modalLote,setModalLote]=useState(false);
  const [expandEntradas,setExpandEntradas]=useState(false);
  const [expandSaidas,setExpandSaidas]=useState(false);
  const [newCat,setNewCat]=useState("");

  const custos=fin.custos||[];
  const extras=fin.extras||[];
  const liquidacoes=fin.liquidacoes||{};
  const retiradas=fin.retiradas||[];
  const saldoInicial=fin.saldoInicial||{}; // keyed by "YYYY-MM"
  const pixLotes=fin.pixLotes||[];         // [{id,date,valor,real,imposto,pmts:[{username,valor}]}]
  const custoCats=fin.cats||DEFAULT_CATS;

  // All card payments not yet liquidated
  const allCardPmts=useMemo(()=>{
    const result=[];
    subs.forEach(s=>{
      (s.payments||[]).forEach((p,idx)=>{
        if(p.method==="CARTÃO BRL"||p.method==="CARTÃO USD"){
          const key=`${s.username}_${idx}_${p.date}`;
          if(!liquidacoes[key]){
            const prev=payoutDate(p.date,p.method,p.international);
            result.push({...p,username:s.username,_key:key,_prevDate:prev?prev.toISOString().split("T")[0]:p.date});
          }
        }
      });
    });
    return result.sort((a,b)=>a._prevDate.localeCompare(b._prevDate));
  },[subs,liquidacoes]);

  const filteredPend=allCardPmts.filter(p=>!searchPend||p.username.toLowerCase().includes(searchPend.toLowerCase()));

  function getLiquidatedForMonth(y,m){
    const result=[];
    subs.forEach(s=>{
      (s.payments||[]).forEach((p,idx)=>{
        const key=`${s.username}_${idx}_${p.date}`;
        const liq=liquidacoes[key];
        if(liq){const[ly,lm]=liq.liquidadoEm.split("-").map(Number);if(ly===y&&lm-1===m)result.push({...p,username:s.username,liquidadoEm:liq.liquidadoEm,impostoStripe:liq.impostoStripe||0});}
        else if(p.method==="PIX"){const[py,pm]=p.date.split("-").map(Number);if(py===y&&pm-1===m)result.push({...p,username:s.username,liquidadoEm:p.date,impostoStripe:0});}
      });
    });
    return result;
  }

  function handleLiquidar(pmt,dateStr,impostoStripe){const entry={liquidadoEm:dateStr};if(impostoStripe)entry.impostoStripe=impostoStripe;onSaveFin({...fin,liquidacoes:{...liquidacoes,[pmt._key]:entry}});setModalLiq(null);}
  function handleLoteLiquidar(dateStr,valorRecebido,impostoStripe){
    const loteId=`lote_${Date.now()}`;
    const newLiq={...liquidacoes};
    const pmtsLote=allCardPmts.filter(p=>selectedPmts[p._key]);
    const totalEsperado=pmtsLote.reduce((a,p)=>a+pmtNet(p),0);
    // distribute imposto proportionally
    pmtsLote.forEach((p,i)=>{
      const pct=pmtNet(p)/totalEsperado;
      const impostoShare=impostoStripe?parseFloat((impostoStripe*pct).toFixed(2)):0;
      newLiq[p._key]={liquidadoEm:dateStr,loteId,impostoStripe:impostoShare||undefined};
    });
    onSaveFin({...fin,liquidacoes:newLiq});
    setSelectedPmts({});
    setModalLote(false);
  }
  function handleEstornar(key){if(!window.confirm("Estornar liquidação?"))return;const l={...liquidacoes};delete l[key];onSaveFin({...fin,liquidacoes:l});}
  function handleSaveCusto(custo){
    if(custo===null){onSaveFin({...fin,custos:custos.filter(x=>x.id!==modalCusto.id)});}
    else{const existing=custos.find(x=>x.id===custo.id);onSaveFin({...fin,custos:existing?custos.map(x=>x.id===custo.id?custo:x):[...custos,custo]});}
    setModalCusto(null);
  }
  function handleSaveExtra(extra){
    if(extra===null){onSaveFin({...fin,extras:extras.filter(x=>x.id!==modalExtra.id)});}
    else{const existing=extras.find(x=>x.id===extra.id);onSaveFin({...fin,extras:existing?extras.map(x=>x.id===extra.id?extra:x):[...extras,extra]});}
    setModalExtra(null);
  }
  function handleSaveRetirada(ret){
    if(ret===null){onSaveFin({...fin,retiradas:retiradas.filter(x=>x.id!==modalRet.id)});}
    else{const ex=retiradas.find(x=>x.id===ret.id);onSaveFin({...fin,retiradas:ex?retiradas.map(x=>x.id===ret.id?ret:x):[...retiradas,ret]});}
    setModalRet(null);
  }
  function addCat(){const t=newCat.trim();if(!t||custoCats.includes(t))return;onSaveFin({...fin,cats:[...custoCats,t]});setNewCat("");}
  function removeCat(cat){if(!window.confirm(`Remover categoria "${cat}"?`))return;onSaveFin({...fin,cats:custoCats.filter(x=>x!==cat)});}

  // Fluxo
  const liqMes=getLiquidatedForMonth(selY,selM);
  const liqPIX=liqMes.filter(p=>p.method==="PIX");
  const liqCartBRL=liqMes.filter(p=>p.method==="CARTÃO BRL");
  const liqCartUSD=liqMes.filter(p=>p.method==="CARTÃO USD");
  const receitaLiqMes=liqMes.reduce((a,p)=>a+pmtNet(p),0);
  const impostoStripeMes=liqMes.reduce((a,p)=>a+(p.impostoStripe||0),0);
  const extrasMesArr=extras.filter(e=>{if(!e.data)return false;const[y,m]=e.data.split("-").map(Number);return y===selY&&m-1===selM;});
  const extrasMes=extrasMesArr.reduce((a,e)=>a+e.valor,0);
  const totalEntradas=receitaLiqMes+extrasMes-impostoStripeMes;

  function getCustosMesDetailed(y,m){
    return custos.filter(c=>c.ativo).filter(c=>{
      if(c.recorrencia==="Mensal"){const s=parseLocal(c.dataInicio);return!(s.getFullYear()>y||(s.getFullYear()===y&&s.getMonth()>m));}
      else{const[cy,cm]=c.dataInicio.split("-").map(Number);return cy===y&&cm-1===m;}
    });
  }
  const custosMesArr=getCustosMesDetailed(selY,selM);
  const custosMes=custosMesArr.reduce((a,c)=>a+c.valor,0);
  const retiradaMesArr=retiradas.filter(r=>{if(!r.data)return false;const[y,m]=r.data.split("-").map(Number);return y===selY&&m-1===selM;});
  const retiradaMes=retiradaMesArr.reduce((a,r)=>a+r.valor,0);
  const saldoMes=totalEntradas-custosMes-retiradaMes;

  // DRE
  function getDREMes(y,m){
    const pmts=subs.flatMap(s=>(s.payments||[]).map(p=>({...p,user:s.username}))).filter(p=>{if(!p.date)return false;const[py,pm]=p.date.split("-").map(Number);return py===y&&pm-1===m;});
    const pix=pmts.filter(p=>p.method==="PIX");
    const cartBRL=pmts.filter(p=>p.method==="CARTÃO BRL");
    const cartUSD=pmts.filter(p=>p.method==="CARTÃO USD");
    return{
      brutoTotal:pmts.reduce((a,p)=>a+pmtBRL(p),0),
      brutoPIX:pix.reduce((a,p)=>a+pmtBRL(p),0),
      brutoCartBRL:cartBRL.reduce((a,p)=>a+pmtBRL(p),0),
      brutoCartUSD:cartUSD.reduce((a,p)=>a+pmtBRL(p),0),
      taxasPIX:pix.reduce((a,p)=>a+pmtFee(p),0),
      taxasCartBRL:cartBRL.reduce((a,p)=>a+pmtFee(p),0),
      taxasCartUSD:cartUSD.reduce((a,p)=>a+pmtFee(p),0),
      liquido:pmts.reduce((a,p)=>a+pmtNet(p),0),
      qtd:pmts.length,qtdPix:pix.length,qtdBRL:cartBRL.length,qtdUSD:cartUSD.length,
    };
  }
  const dreMes=getDREMes(selY,selM);
  const dreExtras=extrasMesArr.reduce((a,e)=>a+e.valor,0);
  const dreReceita=dreMes.liquido+dreExtras;
  const dreCustosPorCat=custoCats.map(cat=>{const items=custosMesArr.filter(c=>c.categoria===cat);return{cat,items,total:items.reduce((a,c)=>a+c.valor,0)};}).filter(x=>x.total>0);
  const dreCustos=custosMes;
  const dreImpostoStripe=impostoStripeMes;
  const dreLucro=dreReceita-dreCustos-dreImpostoStripe;
  const dreMargemPct=dreReceita>0?((dreLucro/dreReceita)*100).toFixed(1):0;

  function prevMonth(){if(selM===0){setSelM(11);setSelY(y=>y-1);}else setSelM(m=>m-1);}
  function nextMonth(){if(selM===11){setSelM(0);setSelY(y=>y+1);}else setSelM(m=>m+1);}

  const VIEWS=[{id:"pendentes",label:"⏳ Pendentes"},{id:"fluxo",label:"💵 Fluxo de caixa"},{id:"dre",label:"📊 DRE"},{id:"custos",label:"📋 Custos"},{id:"extrato",label:"📄 Extrato"}];

  function DRELine({label,val,sub,color,bold,indent}){
    return(
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:bold?"12px 10px":"8px 10px",background:bold?"var(--purple-light)":"transparent",borderRadius:bold?8:0,margin:bold?"4px 0":"0",borderBottom:!bold?"1px solid var(--border)":"none"}}>
        <div style={{paddingLeft:indent?20:0}}>
          <div style={{fontSize:indent?12:13,fontWeight:bold?700:500,color:"var(--text)"}}>{label}</div>
          {sub&&<div style={{fontSize:10,color:"var(--text3)",marginTop:1}}>{sub}</div>}
        </div>
        <div style={{fontSize:bold?16:13,fontWeight:bold?800:600,color:color||"var(--text)",whiteSpace:"nowrap"}}>{val}</div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {modalLiq&&<ModalLiquidar pmt={modalLiq} onSave={(date,imposto)=>handleLiquidar(modalLiq,date,imposto)} onClose={()=>setModalLiq(null)}/>}
      {modalLote&&<ModalLoteLiquidar pmts={allCardPmts.filter(p=>selectedPmts[p._key])} onSave={handleLoteLiquidar} onClose={()=>setModalLote(false)}/>}
      {modalCusto!==null&&<ModalCusto data={modalCusto===true?null:modalCusto} cats={custoCats} onSave={handleSaveCusto} onClose={()=>setModalCusto(null)}/>}
      {modalExtra!==null&&<ModalEntradaExtra data={modalExtra===true?null:modalExtra} onSave={handleSaveExtra} onClose={()=>setModalExtra(null)}/>}
      {modalRet!==null&&<ModalRetirada data={modalRet===true?null:modalRet} onSave={handleSaveRetirada} onClose={()=>setModalRet(null)}/>}
      {modalPixLote&&<ModalPixLote subs={subs} pixLotes={pixLotes} date={todayStr()} onSave={handleSavePixLote} onClose={()=>setModalPixLote(false)}/>}

      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {VIEWS.map(v=><button key={v.id} onClick={()=>setView(v.id)} style={{border:"1.5px solid "+(view===v.id?"var(--purple)":"var(--border)"),background:view===v.id?"var(--purple)":"var(--surface)",color:view===v.id?"#fff":"var(--text2)",borderRadius:9,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{v.label}</button>)}
      </div>

      {(view==="fluxo"||view==="dre")&&(
        <Card style={{padding:"12px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={prevMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>‹</button>
            <div style={{background:"var(--purple-light)",borderRadius:10,padding:"6px 20px",fontWeight:800,fontSize:14,color:"var(--purple)",minWidth:130,textAlign:"center"}}>{MONTHS_PT[selM]}/{selY}</div>
            <button onClick={nextMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>›</button>
          </div>
        </Card>
      )}

      {/* ── PENDENTES ── */}
      {view==="pendentes"&&(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <Card style={{padding:"14px 18px"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:8}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <SLabel style={{margin:0}}>Aguardando liquidação</SLabel>
                <InfoTip text={"Pagamentos via cartão pendentes. Selecione vários para liquidar em lote (repasse Stripe). Use 'PIX em lote' para agrupar PIX que o MP enviou num único repasse."}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                {Object.keys(selectedPmts).filter(k=>selectedPmts[k]).length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:"var(--purple)",fontWeight:600}}>{Object.keys(selectedPmts).filter(k=>selectedPmts[k]).length} selecionados · {fmtBRL(allCardPmts.filter(p=>selectedPmts[p._key]).reduce((a,p)=>a+pmtNet(p),0))}</span>
                    <Btn size="sm" onClick={()=>setModalLote(true)}>⚡ Liquidar em lote</Btn>
                    <button onClick={()=>setSelectedPmts({})} style={{fontSize:11,color:"var(--text3)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>Limpar</button>
                  </div>
                )}
                <Btn size="sm" variant="secondary" onClick={()=>setModalPixLote(true)}>💚 PIX em lote</Btn>
                <div style={{fontSize:12,color:"var(--text2)"}}>{allCardPmts.length} pendente{allCardPmts.length!==1?"s":""} · <strong style={{color:"var(--green)"}}>{fmtBRL(allCardPmts.reduce((a,p)=>a+pmtNet(p),0))}</strong></div>
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <FInput value={searchPend} onChange={e=>setSearchPend(e.target.value)} placeholder="Buscar @usuário..." style={{flex:1,maxWidth:280}}/>
              {filteredPend.length>0&&<button onClick={()=>{const all={};filteredPend.forEach(p=>{all[p._key]=true;});setSelectedPmts(all);}} style={{fontSize:11,color:"var(--purple)",background:"var(--purple-light)",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:600,whiteSpace:"nowrap"}}>Selecionar todos</button>}
            </div>
          </Card>
          {filteredPend.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"var(--text3)",fontSize:13}}>{allCardPmts.length===0?"✓ Nenhum pagamento de cartão pendente":"Nenhum resultado para essa busca."}</div>}
          {filteredPend.map(p=>(
            <Card key={p._key} style={{padding:"12px 16px",border:selectedPmts[p._key]?"1.5px solid var(--purple)":"1.5px solid var(--border)",background:selectedPmts[p._key]?"var(--purple-light)":"var(--surface)"}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <input type="checkbox" checked={!!selectedPmts[p._key]} onChange={e=>setSelectedPmts(s=>({...s,[p._key]:e.target.checked}))} style={{accentColor:"var(--purple)",width:16,height:16,flexShrink:0,cursor:"pointer"}}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontSize:13,fontWeight:700}}>@{p.username}</span>
                    <MethodBadge method={p.method}/>{p.international&&<span style={{fontSize:10,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",padding:"2px 7px",borderRadius:8}}>Intl</span>}
                    <span style={{fontSize:11,color:"var(--text3)"}}>pago em {fmtDate(p.date)}</span>
                  </div>
                  <div style={{fontSize:12,color:"var(--text2)",marginTop:4}}>
                    Bruto: {fmtBRL(pmtBRL(p))} · Líquido: <strong style={{color:"var(--green)"}}>{fmtBRL(pmtNet(p))}</strong>
                    <span style={{marginLeft:10,color:"var(--purple)",fontWeight:600}}>Previsão: {fmtDate(p._prevDate)} {(p.method==="CARTÃO USD"||(p.method==="CARTÃO BRL"&&p.international))?"(D+5 úteis)":"(D+30)"}</span>
                  </div>
                </div>
                <Btn variant="success" size="sm" onClick={()=>setModalLiq(p)}>Liquidar</Btn>
              </div>
            </Card>
          ))}
          {Object.keys(liquidacoes).length>0&&(
            <Card style={{padding:"14px 18px",marginTop:6}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <SLabel style={{margin:0}}>Liquidados</SLabel>
                  <InfoTip text={"Pagamentos de cartão já liquidados. Clique em 'Estornar' para desfazer."}/>
                  <span style={{fontSize:11,color:"var(--text3)"}}>({Object.keys(liquidacoes).length} total)</span>
                </div>
                <FInput value={searchPend} onChange={e=>setSearchPend(e.target.value)} placeholder="Buscar @usuário..." style={{maxWidth:220}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:400,overflowY:"auto"}}>
                {Object.entries(liquidacoes)
                  .filter(([key])=>!searchPend||key.toLowerCase().includes(searchPend.toLowerCase()))
                  .sort((a,b)=>b[1].liquidadoEm.localeCompare(a[1].liquidadoEm))
                  .map(([key,liq])=>{
                    const _parts=key.split("_");const pmtDate=_parts[_parts.length-1];const username=_parts.slice(0,_parts.length-2).join("_");
                    return(
                      <div key={key} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"var(--surface2)",borderRadius:9,border:"1px solid var(--border)"}}>
                        <div style={{flex:1,fontSize:12}}><span style={{fontWeight:700}}>@{username}</span><span style={{color:"var(--text3)",marginLeft:8}}>pago {fmtDate(pmtDate)} → liquidado {fmtDate(liq.liquidadoEm)}</span>{liq.impostoStripe>0&&<span style={{fontSize:10,fontWeight:700,color:"var(--amber)",marginLeft:6}}>Imposto Stripe: -{fmtBRL(liq.impostoStripe)}</span>}</div>
                        <button onClick={()=>handleEstornar(key)} style={{fontSize:11,color:"var(--red)",background:"var(--red-bg)",border:"1px solid var(--red-bg)",borderRadius:7,padding:"3px 8px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Estornar</button>
                      </div>
                    );
                  })
                }
                {Object.entries(liquidacoes).filter(([key])=>!searchPend||key.toLowerCase().includes(searchPend.toLowerCase())).length===0&&<div style={{textAlign:"center",padding:"16px 0",color:"var(--text3)",fontSize:12}}>Nenhum resultado para essa busca.</div>}
              </div>
            </Card>
          )}
        </div>
      )}

      {/* ── FLUXO DE CAIXA ── */}
      {view==="fluxo"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            {[
              {label:"Total entradas",val:fmtBRL(totalEntradas),sub:`Assin.: ${fmtBRL(receitaLiqMes)}${extrasMes>0?" · Extras: "+fmtBRL(extrasMes):""}${impostoStripeMes>0?" · Imposto Stripe: -"+fmtBRL(impostoStripeMes):""}`,color:"var(--green)",info:"Soma de tudo que entrou no caixa: assinaturas liquidadas (PIX imediato, cartão na data de liquidação) + entradas extras manuais."},
              {label:"Custos operacionais",val:fmtBRL(custosMes),sub:`${custosMesArr.length} custo${custosMesArr.length!==1?"s":""}`,color:"var(--red)",info:"Soma de todos os custos do mês: fixos mensais ativos + pontuais com data neste mês."},
              {label:"Retiradas",val:fmtBRL(retiradaMes),sub:`${retiradaMesArr.length} retirada${retiradaMesArr.length!==1?"s":""}`,color:"var(--orange)",info:"Valores retirados da conta no mês. Separado dos custos operacionais para facilitar a conferência do saldo real."},
              {label:"Saldo do mês",val:fmtBRL(saldoMes),sub:`entradas − custos − retiradas`,color:saldoMes>=0?"var(--purple)":"var(--red)",info:"Saldo = entradas − custos operacionais − retiradas. Compare com o saldo real da sua conta no final do mês."},
            ].map(k=>(
              <Card key={k.label} style={{padding:"14px 16px"}}>
                <div style={{fontSize:20,fontWeight:800,color:k.color,lineHeight:1}}>{k.val}</div>
                <div style={{fontSize:10,fontWeight:600,color:"var(--text2)",marginTop:6,textTransform:"uppercase",letterSpacing:".04em",display:"flex",alignItems:"center"}}>{k.label}<InfoTip text={k.info}/></div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>{k.sub}</div>
              </Card>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {/* Entradas */}
            <Card>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}><SLabel style={{margin:0}}>Entradas</SLabel><InfoTip text={"PIX liquidado automaticamente na data do pagamento. Cartões liquidados manualmente. Extras registrados manualmente."}/></div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setExpandEntradas(v=>!v)} style={{fontSize:11,color:"var(--purple)",background:"var(--purple-light)",border:"none",borderRadius:7,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>{expandEntradas?"▲ Recolher":"▼ Ver tudo"}</button>
                  <Btn size="sm" variant="secondary" onClick={()=>setModalExtra(true)}>+ Extra</Btn>
                </div>
              </div>
              {/* Summary rows */}
              {[
                {label:`PIX (${liqPIX.length})`,val:liqPIX.reduce((a,p)=>a+pmtNet(p),0),color:"var(--green)"},
                {label:`Cartão BRL (${liqCartBRL.length})`,val:liqCartBRL.reduce((a,p)=>a+pmtNet(p),0),color:"var(--purple)"},
                {label:`Cartão USD (${liqCartUSD.length})`,val:liqCartUSD.reduce((a,p)=>a+pmtNet(p),0),color:"var(--blue)"},
                {label:`Extras (${extrasMesArr.length})`,val:extrasMes,color:"var(--orange)"},
              ].map(r=><div key={r.label} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:"1px solid var(--border)"}}><span style={{color:"var(--text2)"}}>{r.label}</span><span style={{fontWeight:700,color:r.color}}>{fmtBRL(r.val)}</span></div>)}
              {/* Expanded list */}
              {expandEntradas&&(
                <div style={{marginTop:10,maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                  {liqMes.map((p,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 0",borderBottom:"1px solid var(--border)"}}>
                      <span style={{color:"var(--text2)"}}>@{p.username} · {p.method}</span>
                      <span style={{fontWeight:600,color:"var(--green)"}}>{fmtBRL(pmtNet(p))}</span>
                    </div>
                  ))}
                  {extrasMesArr.map(e=>(
                    <div key={e.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 0",borderBottom:"1px solid var(--border)"}}>
                      <span style={{color:"var(--orange)",cursor:"pointer"}} onClick={()=>setModalExtra(e)}>↕ {e.descricao}</span>
                      <span style={{fontWeight:600,color:"var(--orange)"}}>{fmtBRL(e.valor)}</span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
            {/* Saídas */}
            <Card>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:4}}><SLabel style={{margin:0}}>Saídas</SLabel><InfoTip text={"Custos fixos mensais e pontuais que incidem neste mês, agrupados por categoria."}/></div>
                <button onClick={()=>setExpandSaidas(v=>!v)} style={{fontSize:11,color:"var(--red)",background:"var(--red-bg)",border:"none",borderRadius:7,padding:"3px 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>{expandSaidas?"▲ Recolher":"▼ Ver tudo"}</button>
              </div>
              {custosMesArr.length===0&&<div style={{fontSize:12,color:"var(--text3)"}}>Nenhum custo neste mês.</div>}
              {/* Summary by category */}
              {dreCustosPorCat.map(r=><div key={r.cat} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:"1px solid var(--border)"}}><span style={{color:"var(--text2)"}}>{r.cat} ({r.items.length})</span><span style={{fontWeight:700,color:"var(--red)"}}>{fmtBRL(r.total)}</span></div>)}
              {/* Expanded */}
              {expandSaidas&&(
                <div style={{marginTop:10,maxHeight:300,overflowY:"auto",display:"flex",flexDirection:"column",gap:4}}>
                  {custosMesArr.map(c=>(
                    <div key={c.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"4px 0",borderBottom:"1px solid var(--border)"}}>
                      <span style={{color:"var(--text2)"}}>{c.descricao} <span style={{color:"var(--text3)"}}>({c.categoria})</span></span>
                      <span style={{fontWeight:600,color:"var(--red)"}}>{fmtBRL(c.valor)}</span>
                    </div>
                  ))}
                </div>
              )}
            </Card>
          </div>
          {/* Retiradas */}
          <Card>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <SLabel style={{margin:0}}>Retiradas</SLabel>
                <InfoTip text={"Valores retirados da conta neste mês. Registre aqui o que você sacou/transferiu para si mesmo. Separado dos custos para facilitar a conferência do saldo real no final do mês."}/>
              </div>
              <Btn size="sm" onClick={()=>setModalRet(true)}>+ Retirada</Btn>
            </div>
            {retiradaMesArr.length===0&&<div style={{fontSize:12,color:"var(--text3)"}}>Nenhuma retirada registrada neste mês.</div>}
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {retiradaMesArr.map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:"var(--surface2)",borderRadius:9,border:"1px solid var(--border)"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:600}}>{r.descricao}</div>
                    {r.obs&&<div style={{fontSize:11,color:"var(--text3)",marginTop:1}}>{r.obs}</div>}
                    <div style={{fontSize:11,color:"var(--text3)",marginTop:1}}>{fmtDate(r.data)}</div>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:"var(--orange)"}}>{fmtBRL(r.valor)}</span>
                  <Btn size="sm" variant="ghost" onClick={()=>setModalRet(r)}>✎</Btn>
                </div>
              ))}
            </div>
            {retiradaMesArr.length>0&&(
              <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--border)",display:"flex",justifyContent:"space-between",fontSize:12}}>
                <span style={{color:"var(--text3)"}}>Total retirado em {MONTHS_PT[selM]}</span>
                <span style={{fontWeight:700,color:"var(--orange)"}}>{fmtBRL(retiradaMes)}</span>
              </div>
            )}
          </Card>
        </div>
      )}
      {view==="dre"&&(
        <Card style={{padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:14}}>
            <SLabel style={{margin:0}}>DRE — {MONTHS_PT[selM]}/{selY}</SLabel>
            <InfoTip text={"DRE pelo regime de competência: usa a data do pagamento, não da liquidação. Mostra quando a receita foi gerada, independente de quando entrou no caixa."}/>
          </div>
          {/* Receita bruta detalhada */}
          <DRELine label="(+) Receita bruta" val={fmtBRL(dreMes.brutoTotal+dreExtras)} color="var(--text)"/>
          <DRELine label={`Assinaturas via PIX (${dreMes.qtdPix})`} val={fmtBRL(dreMes.brutoPIX)} color="var(--green)" indent/>
          <DRELine label={`Assinaturas Cartão BRL (${dreMes.qtdBRL})`} val={fmtBRL(dreMes.brutoCartBRL)} color="var(--purple)" indent/>
          <DRELine label={`Assinaturas Cartão USD (${dreMes.qtdUSD})`} val={fmtBRL(dreMes.brutoCartUSD)} color="var(--blue)" indent/>
          {dreExtras>0&&<DRELine label={`Extras (${extrasMesArr.length})`} val={fmtBRL(dreExtras)} color="var(--orange)" indent/>}
          {/* Taxas detalhadas */}
          <DRELine label="(−) Taxas de gateway" val={`-${fmtBRL(dreMes.taxasPIX+dreMes.taxasCartBRL+dreMes.taxasCartUSD)}`} color="var(--red)"/>
          {dreMes.taxasPIX>0&&<DRELine label="PIX 0,99%" val={`-${fmtBRL(dreMes.taxasPIX)}`} color="var(--red)" indent sub={`${dreMes.qtdPix} pag.`}/>}
          {dreMes.taxasCartBRL>0&&<DRELine label="Cartão BRL 3,985% + R$0,39/pag" val={`-${fmtBRL(dreMes.taxasCartBRL)}`} color="var(--red)" indent sub={`${dreMes.qtdBRL} pag.`}/>}
          {dreMes.taxasCartUSD>0&&<DRELine label="Cartão USD 5,985% + R$0,39/pag" val={`-${fmtBRL(dreMes.taxasCartUSD)}`} color="var(--red)" indent sub={`${dreMes.qtdUSD} pag.`}/>}
          {dreImpostoStripe>0&&<DRELine label="(−) Imposto Stripe" val={`-${fmtBRL(dreImpostoStripe)}`} color="var(--amber)" sub="PIS/COFINS/ISS sobre taxas (Fees billing adjustment)"/>}
          {/* Receita líquida */}
          <DRELine label="(=) Receita líquida" val={fmtBRL(dreReceita-dreImpostoStripe)} color="var(--green)" bold/>
          {/* Custos detalhados por categoria */}
          <DRELine label="(−) Custos operacionais" val={`-${fmtBRL(dreCustos)}`} color="var(--red)"/>
          {dreCustosPorCat.map(r=>(
            <div key={r.cat}>
              <DRELine label={r.cat} val={`-${fmtBRL(r.total)}`} color="var(--red)" indent/>
              {r.items.map(item=><DRELine key={item.id} label={item.descricao} val={`-${fmtBRL(item.valor)}`} color="var(--text3)" indent sub={item.recorrencia}/>)}
            </div>
          ))}
          {dreCustos===0&&<div style={{fontSize:12,color:"var(--text3)",padding:"6px 10px"}}>Nenhum custo cadastrado</div>}
          {/* Lucro */}
          <div style={{marginTop:8}}>
            <DRELine label="(=) Lucro operacional" val={fmtBRL(dreLucro)} color={dreLucro>=0?"var(--purple)":"var(--red)"} bold sub={`Margem: ${dreReceita>0?((dreLucro/(dreReceita-dreImpostoStripe))*100).toFixed(1):0}%`}/>
          </div>
        </Card>
      )}

      {/* ── CUSTOS ── */}
      {view==="custos"&&(
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:13,color:"var(--text2)",fontWeight:500}}>{custos.length} custo{custos.length!==1?"s":""} cadastrado{custos.length!==1?"s":""}</span><InfoTip text={"Fixos mensais: lançados automaticamente todo mês a partir da data de início. Pontuais: aparecem só no mês da data definida."}/></div>
            <Btn onClick={()=>setModalCusto(true)}>+ Novo custo</Btn>
          </div>

          {/* Gerenciar categorias */}
          <Card style={{padding:"14px 18px"}}>
            <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10}}><SLabel style={{margin:0}}>Categorias</SLabel><InfoTip text={"Crie e remova categorias para organizar seus custos. Categorias em uso não podem ser removidas sem antes mover os custos."}/></div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {custoCats.map(cat=>{
                const inUse=custos.some(c=>c.categoria===cat);
                return(
                  <div key={cat} style={{display:"flex",alignItems:"center",gap:5,background:"var(--surface2)",border:"1.5px solid var(--border)",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:600}}>
                    {cat}
                    {!inUse&&<button onClick={()=>removeCat(cat)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--red)",fontSize:14,lineHeight:1,padding:0,marginLeft:2,fontFamily:"inherit"}}>×</button>}
                    {inUse&&<span style={{fontSize:10,color:"var(--text3)",marginLeft:4}}>em uso</span>}
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",gap:8}}>
              <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat()} placeholder="Nova categoria..." style={{flex:1,padding:"7px 11px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:13,fontFamily:"inherit"}}/>
              <Btn size="sm" onClick={addCat}>Adicionar</Btn>
            </div>
          </Card>

          {custos.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"var(--text3)",fontSize:13}}>Nenhum custo cadastrado.</div>}
          {custoCats.map(cat=>{
            const items=custos.filter(c=>c.categoria===cat);
            if(!items.length)return null;
            const total=items.filter(c=>c.ativo).reduce((a,c)=>a+c.valor,0);
            return(
              <Card key={cat} style={{padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <SLabel style={{margin:0}}>{cat}</SLabel>
                  <span style={{fontSize:12,fontWeight:600,color:"var(--red)"}}>{fmtBRL(total)}/mês</span>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {items.map(c=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"var(--surface2)",borderRadius:9,border:"1px solid var(--border)",opacity:c.ativo?1:.5}}>
                      <div style={{flex:1}}>
                        <div style={{fontSize:13,fontWeight:600}}>{c.descricao}</div>
                        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{c.recorrencia==="Mensal"?`Mensal · dia ${c.dia} · desde ${fmtDate(c.dataInicio)}`:`Pontual · ${fmtDate(c.dataInicio)}`}{!c.ativo&&<span style={{color:"var(--red)"}}> · inativo</span>}</div>
                      </div>
                      <span style={{fontSize:13,fontWeight:700,color:"var(--red)",whiteSpace:"nowrap"}}>{fmtBRL(c.valor)}</span>
                      <Btn size="sm" variant="ghost" onClick={()=>setModalCusto(c)}>✎</Btn>
                    </div>
                  ))}
                </div>
              </Card>
            );
          })}
        </div>
      )}

      {/* ── EXTRATO ── */}
      {view==="extrato"&&<ExtratoView subs={subs} fin={fin} selY={selY} selM={selM} onSaveFin={onSaveFin} prevMonth={prevMonth} nextMonth={nextMonth} setModalPixLote={setModalPixLote}/>}
    </div>
  );
}


function ExtratoView({subs,fin,selY,selM,onSaveFin,prevMonth,nextMonth,setModalPixLote}){
  const monthKey=`${selY}-${String(selM+1).padStart(2,"0")}`;
  const custos=fin.custos||[]; const extras=fin.extras||[]; const liquidacoes=fin.liquidacoes||{};
  const retiradas=fin.retiradas||[]; const saldoInicial=fin.saldoInicial||{}; const pixLotes=fin.pixLotes||[];
  const saldoIni=saldoInicial[monthKey]||0;
  const [editSaldo,setEditSaldo]=useState(false);
  const [saldoForm,setSaldoForm]=useState(saldoIni.toFixed(2).replace(".",","));
  const [expandedRows,setExpandedRows]=useState({});
  const [saldoReal,setSaldoReal]=useState("");
  const [sortDesc,setSortDesc]=useState(true);

  function deletePixLote(id){onSaveFin({...fin,pixLotes:pixLotes.filter(l=>l.id!==id)});}

  const lines=useMemo(()=>{
    const ls=[];
    // 1. PIX individuais (not in a lote)
    const pixLoteUserDates=new Set(pixLotes.flatMap(l=>l.pmts.map(p=>p.username+"_"+l.date)));
    subs.forEach(s=>{(s.payments||[]).forEach(p=>{
      if(p.method!=="PIX"||!p.date)return;
      const[py,pm]=p.date.split("-").map(Number);
      if(py!==selY||pm-1!==selM)return;
      if(!pixLoteUserDates.has(s.username+"_"+p.date))
        ls.push({date:p.date,type:"pix",label:`PIX · @${s.username}`,valor:pmtNet(p),details:null});
    });});
    // 2. PIX lotes
    pixLotes.filter(l=>{const[y,m]=l.date.split("-").map(Number);return y===selY&&m-1===selM;}).forEach(l=>{
      ls.push({date:l.date,type:"pixlote",label:`PIX lote · ${l.pmts.length} pagamentos`,valor:l.valor,details:l.pmts,loteId:l.id});
    });
    // 3. Cartões liquidados agrupados por loteId
    const loteMap={};
    Object.entries(liquidacoes).forEach(([key,liq])=>{
      if(!liq.liquidadoEm)return;
      const[ly,lm]=liq.liquidadoEm.split("-").map(Number);
      if(ly!==selY||lm-1!==selM)return;
      const parts=key.split("_");const pmtDate=parts[parts.length-1];const username=parts.slice(0,parts.length-2).join("_");
      const sub=subs.find(s=>s.username===username);if(!sub)return;
      const pmtIdx=parseInt(parts[parts.length-2]);const pmt=(sub.payments||[])[pmtIdx];if(!pmt)return;
      const net=parseFloat((pmtNet(pmt)-(liq.impostoStripe||0)).toFixed(2));
      if(liq.loteId){
        if(!loteMap[liq.loteId])loteMap[liq.loteId]={date:liq.liquidadoEm,pmts:[],totalNet:0,loteId:liq.loteId};
        loteMap[liq.loteId].pmts.push({username,valor:net});
        loteMap[liq.loteId].totalNet=parseFloat((loteMap[liq.loteId].totalNet+net).toFixed(2));
      } else {
        ls.push({date:liq.liquidadoEm,type:"card",label:`Cartão · @${username}`,valor:net,details:null});
      }
    });
    Object.values(loteMap).forEach(l=>{ls.push({date:l.date,type:"cardlote",label:`Repasse Stripe · ${l.pmts.length} pagamentos`,valor:l.totalNet,details:l.pmts,loteId:l.loteId});});
    // 4. Extras
    extras.filter(e=>{if(!e.data)return false;const[y,m]=e.data.split("-").map(Number);return y===selY&&m-1===selM;}).forEach(e=>{ls.push({date:e.data,type:"extra",label:`↕ ${e.descricao}`,valor:e.valor,details:null});});
    // 5. Retiradas
    retiradas.filter(r=>{if(!r.data)return false;const[y,m]=r.data.split("-").map(Number);return y===selY&&m-1===selM;}).forEach(r=>{ls.push({date:r.data,type:"retirada",label:r.descricao,valor:-r.valor,details:null});});
    // 6. Custos pontuais
    custos.filter(c=>c.ativo&&c.recorrencia==="Pontual"&&c.dataInicio).filter(c=>{const[y,m]=c.dataInicio.split("-").map(Number);return y===selY&&m-1===selM;}).forEach(c=>{ls.push({date:c.dataInicio,type:"custo",label:c.descricao,valor:-c.valor,details:null});});
    const sorted=ls.sort((a,b)=>a.date.localeCompare(b.date)||(a.valor>0?-1:1));
    return sortDesc?[...sorted].reverse():sorted;
  },[subs,fin,selY,selM,sortDesc]);

  const totalMes=lines.reduce((a,l)=>a+l.valor,0);
  const saldoFinal=saldoIni+totalMes;
  const saldoRealNum=parseBRL(saldoReal)||0;
  const diff=saldoReal?parseFloat((saldoFinal-saldoRealNum).toFixed(2)):null;
  const typeIcon={pix:"💚",pixlote:"💚",card:"💳",cardlote:"💳",extra:"↕",retirada:"💸",custo:"📋"};
  const typeColor={pix:"var(--green)",pixlote:"var(--green)",card:"var(--purple)",cardlote:"var(--purple)",extra:"var(--blue)",retirada:"var(--red)",custo:"var(--red)"};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      <Card style={{padding:"12px 18px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={prevMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>‹</button>
            <div style={{background:"var(--purple-light)",borderRadius:10,padding:"6px 20px",fontWeight:800,fontSize:14,color:"var(--purple)",minWidth:130,textAlign:"center"}}>{MONTHS_PT[selM]}/{selY}</div>
            <button onClick={nextMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>›</button>
          </div>
          <button onClick={()=>setSortDesc(v=>!v)} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:600,color:"var(--text2)",cursor:"pointer",fontFamily:"inherit"}}>{sortDesc?"↓ Mais recente":"↑ Mais antigo"}</button>
          <Btn size="sm" variant="secondary" onClick={()=>setModalPixLote(true)}>+ PIX em lote</Btn>
        </div>
      </Card>
      <Card style={{padding:"14px 18px"}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em"}}>Saldo inicial do mês</div>
        {!editSaldo
          ?<div style={{fontSize:20,fontWeight:800,color:"var(--text)",marginTop:4}}>{fmtBRL(saldoIni)} <button onClick={()=>{setSaldoForm(saldoIni.toFixed(2).replace(".",","));setEditSaldo(true);}} style={{fontSize:11,color:"var(--purple)",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>✎ editar</button></div>
          :<div style={{display:"flex",gap:8,alignItems:"center",marginTop:6}}>
            <FInput value={saldoForm} onChange={e=>setSaldoForm(e.target.value)} placeholder="0,00" style={{maxWidth:160}}/>
            <Btn size="sm" onClick={()=>{onSaveFin({...fin,saldoInicial:{...saldoInicial,[monthKey]:parseBRL(saldoForm)||0}});setEditSaldo(false);}}>Salvar</Btn>
            <Btn size="sm" variant="secondary" onClick={()=>setEditSaldo(false)}>Cancelar</Btn>
          </div>
        }
      </Card>
      <Card style={{padding:0,overflow:"hidden"}}>
        {lines.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"var(--text3)",fontSize:13}}>Nenhum lançamento neste mês. Configure o saldo inicial acima.</div>}
        {lines.map((l,i)=>{
          const isExp=!!expandedRows[i];const isNeg=l.valor<0;
          return(
            <div key={i} style={{borderBottom:"1px solid var(--border)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 16px",background:i%2===0?"var(--surface)":"var(--surface2)"}}>
                <div style={{fontSize:11,color:"var(--text3)",minWidth:52,fontWeight:500}}>{fmtDate(l.date).slice(0,5)}</div>
                <span style={{fontSize:14}}>{typeIcon[l.type]||"·"}</span>
                <div style={{flex:1,fontSize:13,fontWeight:500,color:"var(--text)"}}>{l.label}</div>
                <div style={{fontSize:13,fontWeight:700,color:isNeg?"var(--red)":typeColor[l.type],whiteSpace:"nowrap"}}>{isNeg?"":"+"}  {fmtBRL(Math.abs(l.valor))}</div>
                {l.details&&<button onClick={()=>setExpandedRows(r=>({...r,[i]:!r[i]}))} style={{fontSize:11,color:"var(--purple)",background:"var(--purple-light)",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>{isExp?"▲":"▼"}</button>}
                {l.type==="pixlote"&&<button onClick={()=>{if(window.confirm("Remover lote?"))deletePixLote(l.loteId);}} style={{fontSize:11,color:"var(--red)",background:"var(--red-bg)",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>✕</button>}
              </div>
              {isExp&&l.details&&(
                <div style={{background:"var(--surface2)",padding:"8px 16px 8px 52px",borderTop:"1px solid var(--border)"}}>
                  {l.details.map((d,di)=>(
                    <div key={di} style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"var(--text2)",padding:"3px 0",borderBottom:"1px solid var(--border)"}}>
                      <span>@{d.username}</span>
                      <span style={{color:"var(--green)",fontWeight:600}}>{fmtBRL(d.valor)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        <div style={{padding:"12px 16px",background:"var(--surface)",borderTop:"2px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:"var(--text3)"}}>Saldo inicial</span><span style={{fontWeight:600}}>{fmtBRL(saldoIni)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}><span style={{color:"var(--text3)"}}>Movimentação</span><span style={{fontWeight:600,color:totalMes>=0?"var(--green)":"var(--red)"}}>{totalMes>=0?"+":""}{fmtBRL(totalMes)}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:15,fontWeight:800,borderTop:"1px solid var(--border)",paddingTop:8,marginTop:4}}><span>Saldo calculado</span><span style={{color:"var(--purple)"}}>{fmtBRL(saldoFinal)}</span></div>
        </div>
        <div style={{padding:"12px 16px",background:"var(--surface2)",borderTop:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"var(--text2)",fontWeight:600}}>Saldo real no MP:</span>
            <div style={{position:"relative",display:"inline-flex",alignItems:"center"}}>
              <span style={{position:"absolute",left:10,fontSize:13,color:"var(--text3)",fontWeight:600,pointerEvents:"none",zIndex:1}}>R$</span>
              <input value={saldoReal} onChange={e=>setSaldoReal(e.target.value.replace(/[^0-9.,]/g,""))} onBlur={e=>{const v=parseBRL(e.target.value);if(v>0)setSaldoReal(v.toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}));}} placeholder="0,00" style={{padding:"7px 11px 7px 30px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:13,fontFamily:"inherit",width:170}}/>
            </div>
            {diff!==null&&<span style={{fontSize:13,fontWeight:700,color:Math.abs(diff)<1?"var(--green)":Math.abs(diff)<10?"var(--amber)":"var(--red)"}}>{Math.abs(diff)<0.01?"✓ Perfeito!":diff>0?`Sistema R$${diff.toFixed(2)} a mais`:`Sistema R$${Math.abs(diff).toFixed(2)} a menos`}</span>}
          </div>
        </div>
      </Card>
    </div>
  );
}

function ModalPixLote({subs,pixLotes,date,onSave,onClose}){
  const [selDate,setSelDate]=useState(date||todayStr());
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState({});
  const [valorReal,setValorReal]=useState("");
  // PIX already registered in a lote (by username+date)
  const alreadyLoted=new Set((pixLotes||[]).flatMap(l=>l.pmts.map(p=>p.username+"_"+l.date)));
  // PIX on selDate not yet in any lote
  const candidates=subs.flatMap(s=>(s.payments||[]).map(p=>({...p,username:s.username}))).filter(p=>p.method==="PIX"&&p.date===selDate&&!alreadyLoted.has(p.username+"_"+p.date));
  const filtered=candidates.filter(p=>!search||p.username.toLowerCase().includes(search.toLowerCase()));
  const selectedList=candidates.filter(p=>selected[p.username+"_"+p.date]);
  const totalEsperado=selectedList.reduce((a,p)=>a+pmtNet(p),0);
  const realNum=parseBRL(valorReal)||totalEsperado;
  return(
    <ModalWrap onClose={onClose}>
      <MTitle>PIX em lote (MP agrupa)</MTitle>
      <FInput label="Data do repasse" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)}/>
      <div style={{margin:"12px 0 8px",fontSize:11,fontWeight:700,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em"}}>PIX nesta data ({candidates.length})</div>
      <FInput value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar @..." style={{marginBottom:8}}/>
      <div style={{maxHeight:220,overflowY:"auto",display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
        {filtered.map(p=>{
          const key=p.username+"_"+p.date;
          return(
            <label key={key} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 10px",background:selected[key]?"var(--purple-light)":"var(--surface2)",borderRadius:9,border:"1.5px solid "+(selected[key]?"var(--purple)":"var(--border)"),cursor:"pointer"}}>
              <input type="checkbox" checked={!!selected[key]} onChange={e=>setSelected(s=>({...s,[key]:e.target.checked}))} style={{accentColor:"var(--purple)",width:14,height:14}}/>
              <span style={{flex:1,fontSize:12,fontWeight:600}}>@{p.username}</span>
              <span style={{fontSize:12,color:"var(--green)",fontWeight:700}}>{fmtBRL(pmtNet(p))}</span>
            </label>
          );
        })}
        {filtered.length===0&&<div style={{fontSize:12,color:"var(--text3)",textAlign:"center",padding:"12px 0"}}>Nenhum PIX nesta data</div>}
      </div>
      {selectedList.length>0&&(
        <>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:700,padding:"8px 0",borderTop:"1.5px solid var(--border)",marginBottom:10}}>
            <span>{selectedList.length} PIX selecionados</span>
            <span style={{color:"var(--green)"}}>{fmtBRL(totalEsperado)} esperado</span>
          </div>
          <FInput label="Valor do repasse no MP (R$)" value={valorReal} onChange={e=>setValorReal(e.target.value)} placeholder={totalEsperado.toFixed(2).replace(".",",")}/>
          {Math.abs(realNum-totalEsperado)>0.01&&<div style={{fontSize:11,color:"var(--amber)",marginTop:4}}>Diferença: {fmtBRL(Math.abs(realNum-totalEsperado))}</div>}
        </>
      )}
      <div style={{display:"flex",gap:8,marginTop:14}}>
        <Btn disabled={selectedList.length===0} onClick={()=>{if(!selectedList.length)return;onSave({id:makeFinId(),date:selDate,valor:realNum||totalEsperado,esperado:totalEsperado,pmts:selectedList.map(p=>({username:p.username,valor:pmtNet(p)}))});}}>✓ Registrar lote</Btn>
        <Btn variant="secondary" onClick={onClose}>Cancelar</Btn>
      </div>
    </ModalWrap>
  );
}
