/* ── Tela de Login ── */
function LoginScreen({onLogin}){
  const [email,setEmail]=useState(()=>localStorage.getItem("rdm_last_email")||"");
  const [senha,setSenha]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  const [showEmailLogin,setShowEmailLogin]=useState(false); // email/senha como reserva
  const ERR_MAP={
    "auth/invalid-credential":"Email ou senha incorretos.",
    "auth/wrong-password":"Senha incorreta.",
    "auth/user-not-found":"Usuário não encontrado.",
    "auth/invalid-email":"Email inválido.",
    "auth/too-many-requests":"Muitas tentativas. Aguarde alguns minutos.",
    "auth/network-request-failed":"Sem conexão com a internet.",
    "auth/popup-closed-by-user":"Login cancelado.",
    "auth/popup-blocked":"O navegador bloqueou a janela de login. Permita pop-ups e tente de novo.",
    "auth/unauthorized-domain":"Este domínio não está autorizado no Firebase."
  };
  async function handleGoogleLogin(){
    setLoading(true);setErr("");
    try{
      const provider=new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({prompt:"select_account"});
      await fbAuth.signInWithPopup(provider);
      onLogin();
    }catch(e){
      setErr(ERR_MAP[e.code]||("Erro ao entrar: "+(e.message||e.code)));
      setLoading(false);
    }
  }
  async function handleEmailLogin(){
    if(!email.trim()||!senha){setErr("Preencha email e senha.");return;}
    setLoading(true);setErr("");
    try{
      await fbAuth.signInWithEmailAndPassword(email.trim(),senha);
      localStorage.setItem("rdm_last_email",email.trim());
      onLogin();
    }catch(e){
      setErr(ERR_MAP[e.code]||("Erro ao entrar: "+(e.message||e.code)));
      setLoading(false);
    }
  }
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:20,padding:32,width:"100%",maxWidth:380,boxShadow:"var(--shadow-md)"}}>
        <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.03em",marginBottom:4}}>respon<span style={{color:"var(--purple)"}}>DM</span></div>
        <div style={{fontSize:13,color:"var(--text3)",marginBottom:24}}>Controle de Assinaturas</div>
        {err&&<div style={{fontSize:12,color:"var(--red)",background:"var(--red-bg)",border:"1px solid var(--red)",borderRadius:9,padding:"8px 12px",fontWeight:600,marginBottom:14}}>{err}</div>}
        {/* Botão principal: Google */}
        <button onClick={handleGoogleLogin} disabled={loading} style={{display:"flex",alignItems:"center",justifyContent:"center",gap:10,width:"100%",padding:"11px 16px",borderRadius:11,border:"1.5px solid var(--border2)",background:"var(--surface)",color:"var(--text)",fontSize:14,fontWeight:600,cursor:loading?"default":"pointer",fontFamily:"inherit",opacity:loading?.6:1}}>
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          {loading?"Entrando...":"Entrar com Google"}
        </button>
        {/* Email/senha — reserva, escondido por padrão */}
        {showEmailLogin?(
          <div style={{display:"flex",flexDirection:"column",gap:12,marginTop:18,borderTop:"1px solid var(--border)",paddingTop:18}}>
            <FInput label="Email" type="email" value={email} onChange={e=>{setEmail(e.target.value);setErr("");}} onKeyDown={e=>{if(e.key==="Enter")handleEmailLogin();}} placeholder="seu@email.com"/>
            <FInput label="Senha" type="password" value={senha} onChange={e=>{setSenha(e.target.value);setErr("");}} onKeyDown={e=>{if(e.key==="Enter")handleEmailLogin();}} placeholder="••••••••"/>
            <Btn variant="secondary" onClick={handleEmailLogin} style={{opacity:loading?.6:1,pointerEvents:loading?"none":"auto"}}>{loading?"Entrando...":"Entrar com email e senha"}</Btn>
          </div>
        ):(
          <button onClick={()=>{setShowEmailLogin(true);setErr("");}} style={{border:"none",background:"none",cursor:"pointer",color:"var(--text3)",fontSize:11,fontWeight:600,marginTop:14,fontFamily:"inherit",textDecoration:"underline",width:"100%"}}>Entrar com email e senha</button>
        )}
        <div style={{fontSize:11,color:"var(--text3)",marginTop:18,lineHeight:1.6}}>Seus dados ficam protegidos na nuvem (Firebase). Apenas contas autorizadas têm acesso.</div>
      </div>
    </div>
  );
}

/* App */
function App(){
  const [subs,setSubs]=useState([]);const [groups,setGroups]=useState([]);const [metas,setMetas]=useState({});const [fin,setFin]=useState({custos:[],extras:[],liquidacoes:{}});const [msgTpl,setMsgTpl]=useState(DEFAULT_MSG_TPL);const [tab,setTab]=useState("pendencias");const [modal,setModal]=useState(null);const [toast,setToast]=useState(null);const [dark,setDark]=useState(()=>localStorage.getItem("rdm_dark")==="1");const [globalSearch,setGlobalSearch]=useState("");const [showGlobalSearch,setShowGlobalSearch]=useState(false);const [backupReminder,setBackupReminder]=useState(false);
  const [authReady,setAuthReady]=useState(false);  // já sabemos se há usuário logado?
  const [user,setUser]=useState(null);             // usuário Firebase logado
  const [cloudLoading,setCloudLoading]=useState(true); // carregando dados da nuvem
  const [showShortcuts,setShowShortcuts]=useState(false);
  const [denied,setDenied]=useState(false);        // logou mas email não autorizado
  const globalSearchRef=useRef();const jsonRestoreRef=useRef();const cloudJsonRef=useRef();
  const subsRef=useRef([]); // espelha o último estado de `subs` salvo, p/ o diff de sincronização
  useEffect(()=>{subsRef.current=subs;},[subs]); // mantém o ref sincronizado (carga da nuvem/cache)

  useEffect(()=>{document.body.classList.toggle("dark",dark);localStorage.setItem("rdm_dark",dark?"1":"0");},[dark]);
  useEffect(()=>{if(showGlobalSearch&&globalSearchRef.current)globalSearchRef.current.focus();},[showGlobalSearch]);
  useEffect(()=>{const BKEY="rdm_backup_reminded";function check(){const now=new Date();const todayS=now.toISOString().split("T")[0];const last=localStorage.getItem(BKEY);if(now.getHours()>=20&&last!==todayS){setBackupReminder(true);localStorage.setItem(BKEY,todayS);}}check();const iv=setInterval(check,60000);return()=>clearInterval(iv);},[]);

  // Observa o estado de login do Firebase
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(u=>{
      setAuthReady(true);
      if(u&&u.email&&!AUTHORIZED_EMAILS.includes(u.email.toLowerCase())){
        // logou com uma conta não autorizada — avisa e desloga
        setDenied(true);setUser(null);
        fbAuth.signOut();
        return;
      }
      // logout disparado pela própria trava: NÃO limpa o aviso de "denied"
      if(!u){setUser(null);return;}
      // login válido
      setDenied(false);setUser(u);
    });
    return unsub;
  },[]);

  // Carrega dados: primeiro o cache local (instantâneo), depois a nuvem (autoridade)
  useEffect(()=>{
    if(!user)return;
    // 1) cache local imediato
    try{const r=localStorage.getItem(STORAGE_KEY);if(r)setSubs(JSON.parse(r));}catch(_){}
    try{const r=localStorage.getItem(GROUPS_KEY);if(r)setGroups(JSON.parse(r));}catch(_){}
    try{const r=localStorage.getItem(METAS_KEY);if(r)setMetas(JSON.parse(r));}catch(_){}
    try{const r=localStorage.getItem(FIN_KEY);if(r)setFin(JSON.parse(r));}catch(_){}
    try{const r=localStorage.getItem(MSG_KEY);if(r)setMsgTpl({...DEFAULT_MSG_TPL,...JSON.parse(r)});}catch(_){}
    // 2) nuvem
    (async()=>{
      setCloudLoading(true);
      try{
        const[cSubs,cGroups,cMetas,cFin,cMsg]=await Promise.all([
          fbLoadSubs(),fbLoadDoc("grupos"),fbLoadDoc("metas"),fbLoadDoc("financeiro"),fbLoadDoc("mensagem")
        ]);
        if(cSubs){setSubs(cSubs);try{localStorage.setItem(STORAGE_KEY,JSON.stringify(cSubs));}catch(_){}}
        if(cGroups){setGroups(cGroups);try{localStorage.setItem(GROUPS_KEY,JSON.stringify(cGroups));}catch(_){}}
        if(cMetas){setMetas(cMetas);try{localStorage.setItem(METAS_KEY,JSON.stringify(cMetas));}catch(_){}}
        if(cFin){setFin(cFin);try{localStorage.setItem(FIN_KEY,JSON.stringify(cFin));}catch(_){}}
        if(cMsg){setMsgTpl({...DEFAULT_MSG_TPL,...cMsg});try{localStorage.setItem(MSG_KEY,JSON.stringify(cMsg));}catch(_){}}
      }catch(e){
        showToast("Erro ao carregar da nuvem — usando dados locais.","error");
      }
      setCloudLoading(false);
    })();
  },[user]);

  function showToast(msg,type="success"){setToast({msg,type});setTimeout(()=>setToast(null),3500);}
  // update salva localStorage na hora e sincroniza com a nuvem em segundo plano
  function update(next){const prev=subsRef.current;setSubs(next);subsRef.current=next;try{localStorage.setItem(STORAGE_KEY,JSON.stringify(next));}catch(_){}fbSaveSubsDiff(prev,next).catch(e=>showToast("⚠ Falha ao sincronizar: "+(e&&e.message||"erro"),"error"));}
  function updateGroups(next){setGroups(next);try{localStorage.setItem(GROUPS_KEY,JSON.stringify(next));}catch(_){}fbSaveDoc("grupos",next).catch(()=>{});}
  function saveMetas(key,val){setMetas(prev=>{const next={...prev,[key]:val};try{localStorage.setItem(METAS_KEY,JSON.stringify(next));}catch(_){}fbSaveDoc("metas",next).catch(()=>{});return next;});}
  function saveFin(next){setFin(next);try{localStorage.setItem(FIN_KEY,JSON.stringify(next));}catch(_){}fbSaveDoc("financeiro",next).catch(()=>{});}
  function saveMsgTpl(next){setMsgTpl(next);try{localStorage.setItem(MSG_KEY,JSON.stringify(next));}catch(_){}fbSaveDoc("mensagem",next).catch(()=>{});}
  function handleLogout(){if(window.confirm("Sair da conta?"))fbAuth.signOut();}
  function saveGroup(g){updateGroups(groups.find(x=>x.id===g.id)?groups.map(x=>x.id===g.id?g:x):[...groups,g]);}
  function deleteGroup(id){updateGroups(groups.filter(g=>g.id!==id));}
  function saveSub(sub,oldUsername){
    const isNew=!oldUsername&&!subs.find(s=>s.username===sub.username);
    const isRename=oldUsername&&oldUsername!==sub.username;
    if(isRename&&subs.find(s=>s.username===sub.username)){showToast("Username já existe","error");return;}
    let newSubs;
    if(isNew){
      newSubs=[...subs,{...sub,payments:[]}];
    } else if(isRename){
      // rename: update subs array and groups
      newSubs=subs.map(s=>s.username===oldUsername?{...s,...sub}:s);
      // update groups membership
      const newGroups=groups.map(g=>({...g,members:g.members.map(m=>m===oldUsername?sub.username:m)}));
      updateGroups(newGroups);
    } else {
      newSubs=subs.map(s=>s.username===sub.username?{...s,...sub}:s);
    }
    update(newSubs);
    if(isNew){setModal({type:"pay_after_new",data:sub});}
    else{setModal(null);if(isRename)showToast(`✓ @${oldUsername} renomeado para @${sub.username}`);}
  }
  function deleteSub(username){if(!window.confirm(`Excluir @${username}?`))return;update(subs.filter(s=>s.username!==username));setModal(null);}

  function savePay(sub,pmt){
    const existing=subs.find(s=>s.username===sub.username);
    const isDuplicate=(existing?.payments||[]).some(p=>
      p.date===pmt.date &&
      parseFloat(p.value_brl||p.value||0).toFixed(2)===parseFloat(pmt.value_brl||0).toFixed(2) &&
      p.method===pmt.method
    );
    if(isDuplicate){
      showToast(`⚠ Pagamento duplicado! @${sub.username} já tem um pagamento de ${fmtBRL(pmt.value_brl)} via ${pmt.method} em ${fmtDate(pmt.date)}.`,"error");
      return;
    }
    // Reativação: o pagamento foi feito DEPOIS de o cliente sair do PRO?
    // Usa a mesma regra do status: sai do PRO no vencimento + 3 dias às 9h.
    const pmtDate=parseLocal(pmt.date);
    const proExp=getProExpiry(sub);
    let wasCancelled=false;
    if(proExp){
      // o pagamento conta como reativação se foi feito a partir do dia em que saiu do PRO
      const saiuDoPro=new Date(proExp.getFullYear(),proExp.getMonth(),proExp.getDate());
      wasCancelled=pmtDate>=saiuDoPro;
    }
    const newDay=wasCancelled?String(parseInt(pmt.date.split("-")[2])):sub.due_day;
    // Mudança de plano (upgrade/downgrade): atualiza a ficha igual ao import por CSV
    const planValueOf=name=>{const p=PLANS.find(x=>x.name===name);return p&&p.value?String(p.value.toFixed(2)):null;};
    const planUpdate={};
    if(pmt.plan&&pmt.plan!==sub.plan_name){planUpdate.plan_name=pmt.plan;const tv=planValueOf(pmt.plan);if(tv)planUpdate.plan_value=tv;}
    const {plan:_dropPlan,...pmtStored}=pmt; // o plano vai pra ficha, não fica no pagamento
    const pmtFinal=wasCancelled?{...pmtStored,is_reactivation:true}:pmtStored;
    const history=[...(sub.status_history||[])];
    if(wasCancelled)history.push({status:"REATIVAÇÃO",date:pmt.date,note:"Pagamento após cancelamento"});
    history.push({status:"ATIVO",date:pmt.date,note:wasCancelled?"Reativado":(planUpdate.plan_name?`Upgrade para ${planUpdate.plan_name}`:"Pagamento registrado")});
    update(subs.map(s=>s.username!==sub.username?s:{...s,...planUpdate,due_day:newDay,status_history:history,payments:[...(s.payments||[]),pmtFinal]}));
    setModal(null);
    if(wasCancelled)showToast(`↻ @${sub.username} reativado! Dia de vencimento atualizado para ${newDay}.`);
    else if(planUpdate.plan_name)showToast(`✓ Pagamento registrado. @${sub.username} atualizado para ${planUpdate.plan_name}.`);
  }

  function deletePayFromSorted(sub,idx){
    const sorted=[...(sub.payments||[])].sort((a,b)=>b.date.localeCompare(a.date));
    const target=sorted[idx];let removed=false;
    const newPmts=(sub.payments||[]).filter(p=>{if(!removed&&p.date===target.date&&(p.value_brl||p.value)===(target.value_brl||target.value)&&p.method===target.method){removed=true;return false;}return true;});
    const us={...sub,payments:newPmts};update(subs.map(s=>s.username!==sub.username?s:us));setModal({...modal,data:us});
  }

  function handleMesEditSave(row,edited){
    const newSubs=subs.map(s=>{if(s.username===row.username){const pmts=[...(s.payments||[])];if(edited.username===row.username){pmts[row.pmtIdx]={...pmts[row.pmtIdx],date:edited.date,value_brl:edited.value_brl,method:edited.method,discount:edited.discount,international:edited.international};return{...s,payments:pmts};}else{pmts.splice(row.pmtIdx,1);return{...s,payments:pmts};}}if(edited.username!==row.username&&s.username===edited.username)return{...s,payments:[...(s.payments||[]),{date:edited.date,value_brl:edited.value_brl,method:edited.method,discount:edited.discount,international:edited.international}]};return s;});
    update(newSubs);setModal(null);showToast("Pagamento atualizado");
  }

  function handleImportOriginal(result){
    // Mescla em vez de substituir: mantém assinantes atuais (vencimento, notas, motivo)
    // e soma apenas os pagamentos que ainda não existem (compara data+valor p/ não duplicar).
    const map={};subs.forEach(s=>{map[s.username]={...s,payments:[...(s.payments||[])]};});
    let novos=0,atualizados=0,pagsAdd=0;
    result.forEach(r=>{
      const existente=map[r.username];
      if(!existente){map[r.username]={...r,payments:[...(r.payments||[])]};novos++;pagsAdd+=(r.payments||[]).length;return;}
      const keys=new Set(existente.payments.map(x=>x.date+"_"+(x.value_brl||x.value)));
      let addedHere=0;
      (r.payments||[]).forEach(p=>{const k=p.date+"_"+(p.value_brl||p.value);if(!keys.has(k)){existente.payments.push(p);keys.add(k);addedHere++;}});
      if(addedHere>0){pagsAdd+=addedHere;atualizados++;}
    });
    Object.values(map).forEach(s=>s.payments.sort((a,b)=>a.date.localeCompare(b.date)));
    update(Object.values(map));setModal(null);
    showToast(`✓ ${novos} novos · ${atualizados} atualizados · ${pagsAdd} pagamentos somados`);
  }

  // Preenche due_day de ativos sem vencimento a partir do último pagamento
  function fillAllDueDay(){
    const count=subs.filter(s=>["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s))&&!s.due_day&&(s.payments||[]).length>0).length;
    update(subs.map(s=>{if(["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s))&&!s.due_day){const pmts=s.payments||[];if(!pmts.length)return s;const last=pmts.reduce((a,b)=>a.date>b.date?a:b);const day=String(parseInt(last.date.split("-")[2]));return{...s,due_day:day};}return s;}));
    showToast(`✓ ${count} assinantes atualizados com dia de vencimento`);
  }

  function exportJSON(){const today=new Date().toISOString().split("T")[0];const blob=new Blob([JSON.stringify({subs,groups,metas,fin},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`respondm_backup_${today}.json`;a.click();localStorage.setItem("rdm_last_export",today);}
  function handleRestoreJSON(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);const subsData=Array.isArray(data)?data:data.subs;const groupsData=Array.isArray(data)?[]:data.groups||[];if(!Array.isArray(subsData))throw new Error("Formato inválido");if(window.confirm(`Restaurar ${subsData.length} assinantes e ${groupsData.length} grupos? Isso substitui os dados atuais (local e nuvem).`)){update(subsData);updateGroups(groupsData);if(!Array.isArray(data)&&data.metas){setMetas(data.metas);try{localStorage.setItem(METAS_KEY,JSON.stringify(data.metas));}catch(_){}fbSaveDoc("metas",data.metas).catch(()=>{});}if(!Array.isArray(data)&&data.fin)saveFin(data.fin);showToast(`✓ Restaurado e sincronizado com a nuvem`);}}catch(err){showToast("Erro ao restaurar: "+err.message,"error");}};r.readAsText(file,"UTF-8");e.target.value="";}
  // Importação inicial: lê o respondm_backup.json e sobe TUDO para a nuvem
  function handleImportToCloud(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const subsData=Array.isArray(data)?data:data.subs;
        const groupsData=Array.isArray(data)?[]:(data.groups||[]);
        if(!Array.isArray(subsData))throw new Error("Formato inválido — esperado um backup do ResponDM.");
        if(!window.confirm(`Enviar ${subsData.length} assinantes e ${groupsData.length} grupos para a nuvem? Isso substitui o que estiver lá.`))return;
        showToast(`↑ Enviando ${subsData.length} assinantes para a nuvem...`);
        await fbSaveSubs(subsData);
        await fbSaveDoc("grupos",groupsData);
        if(!Array.isArray(data)&&data.metas)await fbSaveDoc("metas",data.metas);
        if(!Array.isArray(data)&&data.fin)await fbSaveDoc("financeiro",data.fin);
        setSubs(subsData);setGroups(groupsData);
        if(!Array.isArray(data)&&data.metas)setMetas(data.metas);
        if(!Array.isArray(data)&&data.fin)setFin(data.fin);
        try{localStorage.setItem(STORAGE_KEY,JSON.stringify(subsData));localStorage.setItem(GROUPS_KEY,JSON.stringify(groupsData));}catch(_){}
        showToast(`✓ ${subsData.length} assinantes enviados para a nuvem!`);
      }catch(err){showToast("Erro ao importar: "+err.message,"error");}
    };
    r.readAsText(file,"UTF-8");e.target.value="";
  }
  function exportCSV(){const h=["USER","PLANO","MOEDA","DIA_VENC","VALOR","STATUS","QTD_PAG","TOTAL_BRUTO","TOTAL_LIQUIDO","ÚLTIMO_PAG","PRÓX_VENC","NOTAS","MOTIVO_CANCEL"];const rows=subs.map(s=>{const pmts=s.payments||[];const bruto=pmts.reduce((a,p)=>a+pmtBRL(p),0);const net=pmts.reduce((a,p)=>a+pmtNet(p),0);const last=pmts.length?pmts.reduce((a,b)=>a.date>b.date?a:b):null;return[s.username,s.plan_name||"",s.currency||"BRL",s.due_day||"",fmtBRL(s.plan_value),computeStatus(s),pmts.length,fmtBRL(bruto),fmtBRL(net),last?fmtDate(last.date):"",getNextDue(s)?fmtDate(getNextDue(s)):"",s.notes||"",s.cancel_reason||""].join(",");});const blob=new Blob(["\uFEFF"+[h.join(","),...rows].join("\n")],{type:"text/csv;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="assinaturas_respondm.csv";a.click();}
  function handleGlobalSearch(val){setGlobalSearch(val);if(val.trim())setTab("assinantes");}
  // marca que o assinante foi cobrado hoje (sem abrir modal)
  function markReminded(sub){
    const today=todayStr();
    if(sub.last_reminded_at===today)return;
    update(subs.map(s=>s.username===sub.username?{...s,last_reminded_at:today}:s));
  }
  // salva o motivo de saída registrado na aba Recuperação
  function saveMotivo(username,info){
    update(subs.map(s=>s.username===username?{...s,cancel_reason:info.cancel_reason,cancel_note:info.cancel_note}:s));
    setModal(null);showToast("✓ Motivo registrado");
  }

  const upcoming=subs.filter(s=>{const nd=getNextDue(s);if(!nd)return false;const d=daysUntil(nd);return["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s))&&d!==null&&d>=-3&&d<=7;});
  const churnCount=subs.filter(s=>getChurnPhase(s)).length;
  const tabs=[{id:"pendencias",label:"📥 Pendências"},{id:"recuperacao",label:"♻️ Recuperação"+(churnCount?` (${churnCount})`:"")},{id:"dashboard",label:"Dashboard"},{id:"assinantes",label:`Assinantes (${subs.length})`},{id:"vencimentos",label:"Vencimentos"+(upcoming.length?` ⚠ ${upcoming.length}`:"")},{id:"meses",label:"Pagamentos por mês"},{id:"comparativo",label:"Comparativo"},{id:"grupos",label:`Grupos (${groups.length})`},{id:"metas",label:"🎯 Metas"},{id:"financeiro",label:"💰 Financeiro"}];

  // ── Hotkeys globais ──
  useEffect(()=>{
    function onKey(e){
      // ignora se estiver digitando em campo de texto ou com modal aberto
      const tag=(e.target.tagName||"").toLowerCase();
      const typing=tag==="input"||tag==="textarea"||tag==="select"||e.target.isContentEditable;
      if(e.key==="Escape"){setShowShortcuts(false);return;}
      if(typing||e.ctrlKey||e.metaKey||e.altKey)return;
      if(modal)return; // não dispara atalho com modal aberto
      const k=e.key.toLowerCase();
      if(k==="n"){e.preventDefault();setModal({type:"sub",data:null});}
      else if(k==="p"){e.preventDefault();setTab("assinantes");setShowGlobalSearch(true);}
      else if(k==="/"){e.preventDefault();setShowGlobalSearch(true);}
      else if(k==="i"){e.preventDefault();setTab("pendencias");}
      else if(k==="d"){e.preventDefault();setTab("dashboard");}
      else if(k==="a"){e.preventDefault();setTab("assinantes");}
      else if(k==="v"){e.preventDefault();setTab("vencimentos");}
      else if(k==="m"){e.preventDefault();setTab("meses");}
      else if(k==="f"){e.preventDefault();setTab("financeiro");}
      else if(k==="r"){e.preventDefault();setTab("recuperacao");}
      else if(k==="?"){e.preventDefault();setShowShortcuts(s=>!s);}
    }
    window.addEventListener("keydown",onKey);
    return()=>window.removeEventListener("keydown",onKey);
  },[modal]);

  // ── Telas de gate: aguardando auth / login / carregando nuvem ──
  if(!authReady)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)",fontSize:14}}>Carregando…</div>);
  if(denied)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"var(--surface)",border:"1.5px solid var(--red)",borderRadius:20,padding:32,width:"100%",maxWidth:380,boxShadow:"var(--shadow-md)",textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:10}}>🔒</div>
        <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Conta sem acesso</div>
        <div style={{fontSize:13,color:"var(--text2)",lineHeight:1.6,marginBottom:18}}>Essa conta Google não tem permissão para usar o ResponDM Assinaturas. Use uma conta autorizada.</div>
        <Btn onClick={()=>setDenied(false)}>Voltar ao login</Btn>
      </div>
    </div>
  );
  if(!user)return <LoginScreen onLogin={()=>{}}/>;
  if(cloudLoading&&subs.length===0)return(<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,color:"var(--text3)",fontSize:14}}><div style={{fontSize:22,fontWeight:800}}>respon<span style={{color:"var(--purple)"}}>DM</span></div><div>Sincronizando com a nuvem…</div></div>);

  return(
    <div>
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:toast.type==="success"?"var(--green)":"var(--red)",color:"#fff",padding:"12px 22px",borderRadius:12,fontSize:13,fontWeight:600,zIndex:300,boxShadow:"0 4px 20px rgba(0,0,0,.2)",whiteSpace:"nowrap"}}>{toast.msg}</div>}
      {backupReminder&&<div style={{position:"fixed",bottom:24,right:24,background:"var(--surface)",border:"1.5px solid var(--purple)",borderRadius:16,padding:"16px 20px",zIndex:299,boxShadow:"var(--shadow-md)",maxWidth:300}}><div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}><div><div style={{fontSize:14,fontWeight:700,color:"var(--text)",marginBottom:6}}>💾 Hora do backup!</div><div style={{fontSize:12,color:"var(--text2)",lineHeight:1.5}}>São 20h — faça o backup dos seus dados para não perder nada.</div></div><button onClick={()=>setBackupReminder(false)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--text3)",fontSize:16,lineHeight:1,padding:0,fontFamily:"inherit"}}>✕</button></div><button onClick={()=>{exportJSON();setBackupReminder(false);}} style={{marginTop:12,width:"100%",background:"var(--purple)",color:"#fff",border:"none",borderRadius:9,padding:"8px 0",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>↓ Exportar backup agora</button></div>}
      <input ref={jsonRestoreRef} type="file" accept=".json" style={{display:"none"}} onChange={handleRestoreJSON}/>
      <input ref={cloudJsonRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImportToCloud}/>

      {/* Modal de atalhos */}
      {showShortcuts&&(
        <div style={{position:"fixed",inset:0,background:"rgba(26,22,48,.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,backdropFilter:"blur(3px)"}} onClick={e=>{if(e.target===e.currentTarget)setShowShortcuts(false);}}>
          <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:18,padding:24,width:"100%",maxWidth:340,margin:20,boxShadow:"var(--shadow-md)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontSize:15,fontWeight:800}}>Atalhos de teclado</div>
              <button onClick={()=>setShowShortcuts(false)} style={{border:"none",background:"none",cursor:"pointer",color:"var(--text3)",fontSize:18,fontFamily:"inherit"}}>✕</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:7}}>
              {[["N","Novo assinante"],["P","Registrar pagamento"],["/","Buscar assinante"],["I","Pendências"],["R","Recuperação"],["D","Dashboard"],["A","Assinantes"],["V","Vencimentos"],["M","Pagamentos por mês"],["F","Financeiro"],["Esc","Fechar janela"],["?","Mostrar esta tabela"]].map(([k,d])=>(
                <div key={k} style={{display:"flex",alignItems:"center",justifyContent:"space-between",fontSize:13}}>
                  <span style={{color:"var(--text2)"}}>{d}</span>
                  <kbd style={{background:"var(--surface2)",border:"1.5px solid var(--border2)",borderRadius:6,padding:"2px 9px",fontSize:12,fontWeight:700,color:"var(--text)",fontFamily:"inherit",minWidth:30,textAlign:"center"}}>{k}</kbd>
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:14,lineHeight:1.5}}>Os atalhos não funcionam enquanto você digita num campo ou com uma janela aberta.</div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 0 16px",gap:10,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:13}}>
          <div>
            <div style={{fontSize:18,fontWeight:800,color:"var(--text)",letterSpacing:"-.03em",lineHeight:1}}>
                respon<span style={{color:"var(--purple)"}}>DM</span>
                <span style={{fontSize:12,fontWeight:500,color:"var(--text3)",marginLeft:6}}>— Controle de Assinaturas</span>
              </div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:4,fontWeight:500}}>
              {subs.filter(s=>computeStatus(s)==="ATIVO").length} ativos
              {subs.filter(s=>computeStatus(s)==="AGUARDANDO PAGAMENTO").length>0&&<span style={{color:"var(--orange)",marginLeft:4}}>{(subs.filter(s=>computeStatus(s)==="AGUARDANDO PAGAMENTO").length)} aguardando</span>}
              <span style={{marginLeft:4}}>· {subs.length} total</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap"}}>
          {showGlobalSearch?(<div style={{display:"flex",alignItems:"center",gap:6}}><input ref={globalSearchRef} value={globalSearch} onChange={e=>handleGlobalSearch(e.target.value)} onBlur={()=>{if(!globalSearch)setShowGlobalSearch(false);}} placeholder="Buscar assinante..." style={{padding:"7px 12px",borderRadius:10,border:"1.5px solid var(--purple)",background:"var(--surface)",color:"var(--text)",fontSize:13,width:180,fontFamily:"inherit"}}/><button onClick={()=>{setGlobalSearch("");setShowGlobalSearch(false);}} style={{border:"none",background:"none",cursor:"pointer",color:"var(--text2)",fontSize:16,fontFamily:"inherit"}}>✕</button></div>):(<button onClick={()=>setShowGlobalSearch(true)} title="Busca global" style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:16,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>🔍</button>)}
          <button onClick={()=>setShowShortcuts(true)} title="Atalhos de teclado (?)" style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:15,fontWeight:700,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>⌨</button>
          <button onClick={()=>setDark(d=>!d)} title={dark?"Modo claro":"Modo escuro"} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>{dark?"☀️":"🌙"}</button>
          <button onClick={exportJSON} title="Exportar backup JSON" style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:10,padding:"0 12px",height:36,cursor:"pointer",fontSize:12,color:"var(--text2)",fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap"}}>↓ JSON</button>
          <button onClick={()=>jsonRestoreRef.current.click()} title="Restaurar backup JSON" style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:10,padding:"0 12px",height:36,cursor:"pointer",fontSize:12,color:"var(--text2)",fontWeight:600,fontFamily:"inherit",whiteSpace:"nowrap"}}>↑ JSON</button>
          <button onClick={()=>cloudJsonRef.current.click()} title="Importar backup JSON para a nuvem" style={{border:"1.5px solid var(--purple)",background:"var(--purple-light)",borderRadius:10,padding:"0 12px",height:36,cursor:"pointer",fontSize:12,color:"var(--purple)",fontWeight:700,fontFamily:"inherit",whiteSpace:"nowrap"}}>☁ Importar p/ nuvem</button>
          <Btn variant="ghost" style={{fontSize:12,padding:"7px 14px",border:"1.5px solid var(--border)"}} onClick={()=>setModal({type:"import"})}>↑ Planilha</Btn>
          <Btn variant="secondary" onClick={exportCSV}>↓ CSV</Btn>
          <Btn onClick={()=>setModal({type:"sub",data:null})}>+ Novo</Btn>
          <button onClick={handleLogout} title={`Sair (${user.email})`} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:10,width:36,height:36,cursor:"pointer",fontSize:15,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>⏻</button>
        </div>
      </div>

      {upcoming.length>0&&<div style={{background:"var(--amber-bg)",border:"1.5px solid var(--amber-border)",borderRadius:13,padding:"10px 16px",marginBottom:18,display:"flex",alignItems:"center",gap:10,fontSize:12}}><span style={{fontSize:15}}>⚠️</span><span style={{fontWeight:700,color:"var(--amber)"}}>{upcoming.length} vencimento{upcoming.length>1?"s":""} próximos:</span><span style={{color:"var(--amber)",opacity:.85}}>{upcoming.slice(0,4).map(s=>`@${s.username}`).join(", ")}</span></div>}

      <div style={{display:"flex",gap:0,borderBottom:"2px solid var(--border)",marginBottom:22,overflowX:"auto",scrollbarWidth:"thin",scrollbarColor:"var(--purple-mid) transparent",WebkitOverflowScrolling:"touch",msOverflowStyle:"none"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"10px 16px",fontSize:13,border:"none",background:"none",cursor:"pointer",color:tab===t.id?"var(--purple)":"var(--text2)",fontWeight:tab===t.id?700:500,borderBottom:tab===t.id?"2.5px solid var(--purple)":"2.5px solid transparent",marginBottom:-2,letterSpacing:"-.01em",transition:"color .15s",whiteSpace:"nowrap",fontFamily:"inherit"}}>{t.label}</button>)}
      </div>

      {tab==="pendencias"&&<TabPendencias subs={subs} msgTpl={msgTpl} onAddPay={s=>setModal({type:"pay",data:s})} onShowToast={showToast} onMarkReminded={markReminded} onGoTab={setTab} onFillDueDay={fillAllDueDay} onEditMsg={()=>setModal({type:"mensagem"})}/>}
      {tab==="recuperacao"&&<TabRecuperacao subs={subs} msgTpl={msgTpl} onAddPay={s=>setModal({type:"pay",data:s})} onShowToast={showToast} onMarkReminded={markReminded} onSaveMotivo={s=>setModal({type:"motivo",data:s})} onEditMsg={()=>setModal({type:"msgrec"})}/>}
      {tab==="dashboard"&&<TabDashboard subs={subs} onFillDueDay={fillAllDueDay}/>}
      {tab==="assinantes"&&<TabAssinantes subs={subs} groups={groups} onEdit={s=>setModal({type:"sub",data:s})} onAddPay={s=>setModal({type:"pay",data:s})} onViewPay={s=>setModal({type:"paylist",data:s})} onTimeline={s=>setModal({type:"timeline",data:s})} defaultSearch={globalSearch}/>}
      {tab==="vencimentos"&&<TabVencimentos subs={subs} onAddPay={s=>setModal({type:"pay",data:s})} msgTpl={msgTpl} onShowToast={showToast} onMarkReminded={markReminded}/>}
      {tab==="meses"&&<TabMeses subs={subs} onUpdateSubs={update} onShowToast={showToast} onEditPay={r=>setModal({type:"editpay",data:r})} onViewSub={s=>s&&setModal({type:"subinfo",data:s})}/>}
      {tab==="comparativo"&&<TabComparativo subs={subs}/>}
      {tab==="grupos"&&<TabGrupos subs={subs} groups={groups} onSaveGroup={saveGroup} onDeleteGroup={deleteGroup}/>}
      {tab==="metas"&&<TabMetas subs={subs} metas={metas} onSaveMetas={saveMetas}/>}
      {tab==="financeiro"&&<TabFinanceiro subs={subs} fin={fin} onSaveFin={saveFin}/>}

      {modal&&(<>
        {modal.type==="import"&&<ModalImportOriginal subs={subs} onImport={handleImportOriginal} onClose={()=>setModal(null)}/>}
        {modal.type==="sub"&&<ModalWrap onClose={()=>setModal(null)}><ModalSub data={modal.data} subs={subs} onSave={sub=>saveSub(sub,modal.data?.username)} onDelete={deleteSub} onClose={()=>setModal(null)} onGoToUser={u=>{setGlobalSearch(u);setTab("assinantes");}} onPayUser={s=>setModal({type:"pay",data:s})}/></ModalWrap>}
        {modal.type==="pay_after_new"&&<ModalWrap onClose={()=>setModal(null)}><div style={{marginBottom:14,padding:"10px 14px",background:"var(--green-bg)",border:"1px solid var(--green)",borderRadius:10,fontSize:13,color:"var(--green)",fontWeight:600}}>✓ @{modal.data.username} criado! Deseja registrar o primeiro pagamento agora?</div><ModalPay sub={modal.data} onSave={p=>savePay(modal.data,p)} onClose={()=>setModal(null)} skipLabel="Agora não"/></ModalWrap>}
        {modal.type==="pay"&&<ModalWrap onClose={()=>setModal(null)}><ModalPay sub={modal.data} onSave={p=>savePay(modal.data,p)} onClose={()=>setModal(null)}/></ModalWrap>}
        {modal.type==="paylist"&&<ModalWrap onClose={()=>setModal(null)} wide><ModalPayList sub={modal.data} onDeletePay={idx=>deletePayFromSorted(modal.data,idx)} onClose={()=>setModal(null)}/></ModalWrap>}
        {modal.type==="editpay"&&<ModalEditPagamento row={modal.data} subs={subs} onSave={edited=>handleMesEditSave(modal.data,edited)} onClose={()=>setModal(null)}/> }
        {modal.type==="mensagem"&&<ModalMensagem msgTpl={msgTpl} subs={subs} onSave={t=>{saveMsgTpl(t);setModal(null);showToast("✓ Mensagens salvas");}} onClose={()=>setModal(null)}/>}
        {modal.type==="msgrec"&&<ModalMsgRecuperacao msgTpl={msgTpl} subs={subs} onSave={t=>{saveMsgTpl({...msgTpl,...t});setModal(null);showToast("✓ Mensagens de recuperação salvas");}} onClose={()=>setModal(null)}/>}
        {modal.type==="motivo"&&<ModalMotivo sub={modal.data} onSave={info=>saveMotivo(modal.data.username,info)} onClose={()=>setModal(null)}/>}
          {modal.type==="timeline"&&<ModalTimeline sub={modal.data} onClose={()=>setModal(null)}/>}
          {modal.type==="subinfo"&&<ModalSubInfo sub={modal.data} onClose={()=>setModal(null)} onEdit={s=>setModal({type:"sub",data:s})} onAddPay={s=>setModal({type:"pay",data:s})} onViewPay={s=>setModal({type:"paylist",data:s})}/>}
      </>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
