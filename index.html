          <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} style={{padding:"6px 10px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:12,fontFamily:"inherit"}}/>
          <span style={{color:"var(--text3)",fontSize:12}}>até</span>
          <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} style={{padding:"6px 10px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:12,fontFamily:"inherit"}}/>
        </div>
      )}

      {/* Toggle metrics */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
        {SERIES.map(s=>(
          <button key={s.key} onClick={()=>s.set(v=>!v)} style={{display:"flex",alignItems:"center",gap:5,border:"1.5px solid "+(s.on?s.color:"var(--border)"),background:s.on?"transparent":"var(--surface)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,cursor:"pointer",color:s.on?s.color:"var(--text3)",fontFamily:"inherit",transition:"all .15s"}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:s.on?s.color:"var(--border)",display:"inline-block",flexShrink:0}}/>
            <span>{s.label}</span>
          </button>
        ))}
      </div>

      {/* SVG Chart */}
      <div style={{overflowX:"auto"}}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block",cursor:"crosshair"}}
          onMouseMove={handleSvgMouseMove} onMouseLeave={()=>setTooltip(null)}>
          {/* Grid lines + Y-axis labels */}
          {(()=>{
            const maxVal=activeSeries.length>0?Math.max(...activeSeries.map(s=>getMax(s.key))):100;
            const niceMax=(()=>{const mag=Math.pow(10,Math.floor(Math.log10(maxVal||1)));const norm=maxVal/mag;const nice=norm<=1?1:norm<=2?2:norm<=5?5:10;return nice*mag;})();
            const steps=5;
            return Array.from({length:steps+1},(_,i)=>{
              const t=i/steps;
              const y=PT+IH-t*IH;
              const val=Math.round(niceMax*t);
              const label=val>=10000?`${(val/1000).toFixed(0)}k`:val>=1000?`${(val/1000).toFixed(1)}k`:String(val);
              return(<g key={i}>
                <line x1={PL} x2={W-PR} y1={y} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray={i===0||i===steps?"":"4,4"}/>
                <text x={PL-4} y={y+3} textAnchor="end" fontSize="9" fill="var(--text3)" fontFamily="Inter,sans-serif">{label}</text>
              </g>);
            });
          })()}
          {/* X labels */}
          {replayPoints.map((p,i)=>{
            const x=PL+i*(IW/(replayPoints.length-1||1));
            const show=points.length<=12||(i===0||i===points.length-1||i%Math.ceil(points.length/8)===0);
            if(!show)return null;
            return <text key={i} x={x} y={H-6} textAnchor="middle" fontSize="9" fill="var(--text3)" fontFamily="Inter,sans-serif">{p.label}</text>;
          })}
          {/* Series lines */}
          {activeSeries.map(s=>(
            <polyline key={s.key} fill="none" stroke={s.color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
              points={replayPoints.map((p,i)=>{const x=PL+i*(IW/(replayPoints.length-1||1));const y=PT+IH-(norm(p[s.key]||0,s.key)*IH);return`${x.toFixed(1)},${y.toFixed(1)}`;}).join(" ")}/>
          ))}
          {/* Dots on hover */}
          {tooltip&&activeSeries.map(s=>{
            const x=PL+tooltip.idx*(IW/(replayPoints.length-1||1));
            const y=PT+IH-(norm(tooltip.pt[s.key]||0,s.key)*IH);
            return <circle key={s.key} cx={x} cy={y} r="4" fill={s.color} stroke="var(--surface)" strokeWidth="2"/>;
          })}
          {/* Tooltip vertical line */}
          {tooltip&&<line x1={tooltip.x} x2={tooltip.x} y1={PT} y2={PT+IH} stroke="var(--border2)" strokeWidth="1.5" strokeDasharray="4,3"/>}
        </svg>
      </div>

      {/* Tooltip box */}
      {tooltip&&(
        <div style={{background:"var(--surface2)",border:"1.5px solid var(--border)",borderRadius:12,padding:"10px 14px",marginTop:8,display:"flex",flexWrap:"wrap",gap:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--text)",width:"100%",marginBottom:2}}>{tooltip.pt.label}</div>
          {activeSeries.map(s=>(
            <div key={s.key} style={{display:"flex",alignItems:"center",gap:5}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0,display:"inline-block"}}></span>
              <span style={{fontSize:11,color:"var(--text2)"}}>{s.label}:</span>
              <span style={{fontSize:11,fontWeight:700,color:s.color}}>{s.fmt(tooltip.pt[s.key]||0)}</span>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

function TabDashboard({subs,onFillDueDay}){
  const [dashFilter,setDashFilter]=useState("30d");
  const [customFrom,setCustomFrom]=useState(addDays(today0(),-30).toISOString().split("T")[0]);
  const [customTo,setCustomTo]=useState(todayStr());
  const [churnFilter,setChurnFilter]=useState("mes");

  const now=new Date();
  const total=subs.length;
  const ativos=subs.filter(s=>["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s)));
  const aguardando=subs.filter(s=>computeStatus(s)==="AGUARDANDO PAGAMENTO");
  const mrr=ativos.reduce((a,s)=>a+parseFloat(s.plan_value||0),0);
  const upcoming7=subs.filter(s=>{const nd=getNextDue(s);if(!nd)return false;const d=daysUntil(nd);return d!==null&&d>=-3&&d<=7&&computeStatus(s)==="ATIVO";}).length;

  // Previsão próximo mês
  const nextMonthDate=new Date(now.getFullYear(),now.getMonth()+1,1);
  const nextMonthY=nextMonthDate.getFullYear();const nextMonthM=nextMonthDate.getMonth();
  const forecast=ativos.filter(s=>s.due_day).reduce((a,s)=>{const nd=getNextDue(s);if(!nd)return a;const[ny,nm]=nd.split("-").map(Number);if(ny===nextMonthY&&nm-1===nextMonthM)return a+parseFloat(s.plan_value||0);return a;},0);

  // Reativações este mês
  const reativacoesMes=subs.reduce((a,s)=>{return a+(s.payments||[]).filter(p=>{if(!p.is_reactivation||!p.date)return false;const[y,m]=p.date.split("-").map(Number);return y===now.getFullYear()&&m-1===now.getMonth();}).length;},0);

  // Missing due_day ativos
  const missingDueDay=subs.filter(s=>["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s))&&!s.due_day);

  const allPmts=subs.flatMap(s=>(s.payments||[]).map(p=>({...p,user:s.username,plan:s.plan_name})));
  const filteredPmts=filterByRange(allPmts,dashFilter,customFrom,customTo);
  const totalBruto=filteredPmts.reduce((a,p)=>a+pmtBRL(p),0);
  const totalNet=filteredPmts.reduce((a,p)=>a+pmtNet(p),0);
  const totalTaxas=totalBruto-totalNet;
  const totalDescontos=filteredPmts.reduce((a,p)=>a+pmtDiscount(p),0);
  const recentPmts=[...allPmts].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  const ltv=subs.filter(s=>(s.payments||[]).length>0).reduce((a,s,_,arr)=>a+(s.payments||[]).reduce((x,p)=>x+pmtBRL(p),0)/arr.length,0);
  const cancelledWithPmts=subs.filter(s=>["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"].includes(computeStatus(s))&&(s.payments||[]).length>1);
  const avgDuration=cancelledWithPmts.length>0?cancelledWithPmts.reduce((a,s)=>{const pmts=[...(s.payments||[])].sort((x,y)=>x.date.localeCompare(y.date));const f=parseLocal(pmts[0].date);const l=parseLocal(pmts[pmts.length-1].date);return a+(l-f)/(1000*60*60*24*30);},0)/cancelledWithPmts.length:0;

  // Churn real (Opção A): pagou no período anterior, não pagou no atual, e está cancelado hoje
  const curY=now.getFullYear(),curM=now.getMonth();
  const CANC_ST=["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"];
  const churnBounds=useMemo(()=>{
    const t0=today0();
    if(churnFilter==="mes"){
      const curPeriodStart=new Date(now.getFullYear(),now.getMonth(),1);
      const prevPeriodStart=new Date(now.getFullYear(),now.getMonth()-1,1);
      const prevPeriodEnd=new Date(now.getFullYear(),now.getMonth(),0);
      return{cur:{start:curPeriodStart,end:new Date()},prev:{start:prevPeriodStart,end:prevPeriodEnd}};
    }
    const days=churnFilter==="30d"?30:churnFilter==="60d"?60:90;
    const curStart=addDays(t0,-days+1);const curEnd=new Date();
    const prevStart=addDays(t0,-days*2+1);const prevEnd=addDays(t0,-days);
    return{cur:{start:curStart,end:curEnd},prev:{start:prevStart,end:prevEnd}};
  },[churnFilter]);

  const churnData=useMemo(()=>{
    const inDateRange=(date,start,end)=>{if(!date)return false;const d=parseLocal(date);return d>=start&&d<=end;};
    // pagaram no período anterior
    const paidPrev=subs.filter(s=>(s.payments||[]).some(p=>inDateRange(p.date,churnBounds.prev.start,churnBounds.prev.end)));
    // desse grupo: não pagou no período atual E está cancelado hoje
    const churned=paidPrev.filter(s=>{
      if(!CANC_ST.includes(computeStatus(s)))return false;
      return!(s.payments||[]).some(p=>inDateRange(p.date,churnBounds.cur.start,churnBounds.cur.end));
    });
    const pct=paidPrev.length>0?((churned.length/paidPrev.length)*100).toFixed(1):null;
    return{churned:churned.length,base:paidPrev.length,pct};
  },[subs,churnBounds]);

  // MRR expansão vs contração
  const mrrNovos=subs.filter(s=>{const pmts=s.payments||[];if(!pmts.length)return false;const sorted=[...pmts].sort((a,b)=>a.date.localeCompare(b.date));const[fy,fm]=sorted[0].date.split("-").map(Number);return fy===curY&&fm-1===curM;}).reduce((a,s)=>a+parseFloat(s.plan_value||0),0);
  const mrrReativados=subs.filter(s=>{const pmts=s.payments||[];return pmts.some(p=>{if(!p.is_reactivation||!p.date)return false;const[y,m]=p.date.split("-").map(Number);return y===curY&&m-1===curM;});}).reduce((a,s)=>a+parseFloat(s.plan_value||0),0);
  const mrrPerdido=subs.filter(s=>{if(!["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"].includes(computeStatus(s)))return false;const pmts=s.payments||[];if(!pmts.length)return false;const last=pmts.reduce((a,b)=>a.date>b.date?a:b);const cd=addDays(parseLocal(last.date),33);return cd.getFullYear()===curY&&cd.getMonth()===curM;}).reduce((a,s)=>a+parseFloat(s.plan_value||0),0);
  const mrrExpansao=mrrNovos+mrrReativados;
  const mrrLiquido=mrrExpansao-mrrPerdido;

  // Tempo médio até 1º cancelamento (em meses)
  const tempoAteCancel=cancelledWithPmts.length>0?cancelledWithPmts.reduce((a,s)=>{const pmts=[...(s.payments||[])].sort((x,y)=>x.date.localeCompare(y.date));const first=parseLocal(pmts[0].date);const last=parseLocal(pmts[pmts.length-1].date);return a+(last-first)/(1000*60*60*24*30);},0)/cancelledWithPmts.length:0;

  // Coorte de retenção (últimos 6 meses)
  const cohortMonths=[];
  for(let i=5;i>=0;i--){let m=curM-i;let y=curY;while(m<0){m+=12;y--;}cohortMonths.push({y,m,label:`${MONTHS_PT[m]}/${y}`});}
  const cohortData=cohortMonths.map(({y,m,label})=>{
    const newInMonth=subs.filter(s=>{const pmts=s.payments||[];if(!pmts.length)return false;const sorted=[...pmts].sort((a,b)=>a.date.localeCompare(b.date));const[fy,fm]=sorted[0].date.split("-").map(Number);return fy===y&&fm-1===m;});
    const total=newInMonth.length;
    if(!total)return{label,total,retention:[]};
    const retention=cohortMonths.map(({y:fy,m:fm})=>{
      if(fy<y||(fy===y&&fm<m))return null;
      const paying=newInMonth.filter(s=>(s.payments||[]).some(p=>{if(!p.date)return false;const[py,pm]=p.date.split("-").map(Number);return py===fy&&pm-1===fm;})).length;
      return total>0?Math.round(paying/total*100):0;
    });
    return{label,total,retention};
  });

  // Churn
  const churnByMonth={};
  for(let i=5;i>=0;i--){
    let cm2=now.getMonth()-i,cy2=now.getFullYear();
    while(cm2<0){cm2+=12;cy2--;}
    const key=`${cy2}-${String(cm2+1).padStart(2,"0")}`;
    // período anterior = mês antes
    let pm=cm2-1,py=cy2;if(pm<0){pm=11;py--;}
    const prevStart=new Date(py,pm,1);
    const prevEnd=new Date(py,pm+1,0,23,59,59);
    const curStart=new Date(cy2,cm2,1);
    const curEnd=new Date(cy2,cm2+1,0,23,59,59);
    const inRange=(date,s,e)=>{if(!date)return false;const d=parseLocal(date);return d>=s&&d<=e;};
    // pagaram no mês anterior
    const paidPrev=subs.filter(s=>(s.payments||[]).some(p=>inRange(p.date,prevStart,prevEnd)));
    // desse grupo: não pagou no mês atual E está cancelado hoje
    const churned=paidPrev.filter(s=>{
      if(!["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"].includes(computeStatus(s)))return false;
      return!(s.payments||[]).some(p=>inRange(p.date,curStart,curEnd));
    });
    churnByMonth[key]=churned.length;
  }
  const churnEntries=Object.entries(churnByMonth).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxChurn=Math.max(...Object.values(churnByMonth),1);

  // Receita por dia
  const revByDay={};ativos.filter(s=>s.due_day).forEach(s=>{const d=parseInt(s.due_day);if(!revByDay[d])revByDay[d]={val:0,count:0};revByDay[d].val+=parseFloat(s.plan_value||0);revByDay[d].count++;});
  for(let i=1;i<=31;i++){if(!revByDay[i])revByDay[i]={val:0,count:0};}
  const revDayEntries=Object.entries(revByDay).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  const maxDayRev=Math.max(...Object.values(revByDay).map(x=>x.val),1);

  const statusCount={"ATIVO":subs.filter(s=>computeStatus(s)==="ATIVO").length,"AGUARDANDO":aguardando.length,"CANCELADO 7D":subs.filter(s=>computeStatus(s)==="CANCELADO 7 DIAS").length,"CANCELADO 30D":subs.filter(s=>computeStatus(s)==="CANCELADO 30 DIAS").length,"CANCELADO 60D":subs.filter(s=>computeStatus(s)==="CANCELADO 60 DIAS").length,"CANCELADO 100+":subs.filter(s=>computeStatus(s)==="CANCELADO 100+").length};
  const planMap={};subs.filter(s=>["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s))).forEach(s=>{const k=s.plan_name||"Sem plano";planMap[k]=(planMap[k]||0)+1;});
  const methodMap={};filteredPmts.forEach(p=>{methodMap[p.method||"?"]=(methodMap[p.method||"?"]||0)+1;});
  const totalPmtCount=filteredPmts.length;
  const usdTotal=filteredPmts.filter(p=>p.method==="CARTÃO USD").reduce((a,p)=>a+parseFloat(p.value_usd||0),0);
  const filterOpts=[{id:"hoje",label:"Hoje"},{id:"ontem",label:"Ontem"},{id:"7d",label:"7 dias"},{id:"30d",label:"30 dias"},{id:"mes",label:"Este mês"},{id:"all",label:"Tudo"},{id:"custom",label:"Personalizado"}];
  const C=["var(--purple)","var(--orange)","var(--amber)","var(--red)","var(--blue)"];

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {aguardando.length>0&&<div style={{background:"var(--orange-bg)",border:"1.5px solid var(--orange-dot)",borderRadius:12,padding:"10px 16px",display:"flex",alignItems:"center",gap:10,fontSize:12}}><span style={{fontSize:15}}>⏳</span><span style={{fontWeight:700,color:"var(--orange)"}}>{aguardando.length} aguardando pagamento:</span><span style={{color:"var(--orange)",opacity:.85}}>{aguardando.slice(0,4).map(s=>`@${s.username}`).join(", ")}</span></div>}

      {/* Alerta sem due_day */}
      {missingDueDay.length>0&&(
        <div style={{background:"var(--amber-bg)",border:"1.5px solid var(--amber-border)",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:15}}>⚠️</span>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:"var(--amber)"}}>{missingDueDay.length} assinante{missingDueDay.length>1?"s ativos sem":""} ativo sem dia de vencimento</div>
              <div style={{fontSize:11,color:"var(--amber)",opacity:.8,marginTop:2}}>Isso afeta o cálculo de status. Clique para corrigir automaticamente.</div>
              <div style={{marginTop:6,display:"flex",flexWrap:"wrap",gap:4}}>{missingDueDay.map(s=><span key={s.username} style={{fontSize:11,fontWeight:600,background:"rgba(155,98,8,.12)",borderRadius:6,padding:"2px 7px",color:"var(--amber)"}}>@{s.username}</span>)}</div>
            </div>
          </div>
          <Btn variant="warning" size="sm" onClick={onFillDueDay}>↑ Puxar do último pagamento</Btn>
        </div>
      )}

      {/* Filtro período */}
      <Card style={{padding:"12px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:11,fontWeight:600,color:"var(--text3)",textTransform:"uppercase",letterSpacing:".05em",marginRight:4}}>Período</span>
          {filterOpts.map(f=><button key={f.id} onClick={()=>setDashFilter(f.id)} style={{border:"1.5px solid "+(dashFilter===f.id?"var(--purple)":"var(--border)"),background:dashFilter===f.id?"var(--purple)":"var(--surface)",color:dashFilter===f.id?"#fff":"var(--text2)",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{f.label}</button>)}
          {dashFilter==="custom"&&<div style={{display:"flex",alignItems:"center",gap:8,width:"100%",marginTop:4}}><input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)} style={{padding:"6px 10px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:12,fontFamily:"inherit"}}/><span style={{color:"var(--text3)",fontSize:12}}>até</span><input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)} style={{padding:"6px 10px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text)",fontSize:12,fontFamily:"inherit"}}/></div>}
        </div>
      </Card>

      {/* KPIs */}
      {(()=>{
        const totalAtivos=subs.filter(s=>computeStatus(s)==="ATIVO").length;
        const totalAguardando=aguardando.length;
        const novosEsseMes=subs.filter(s=>{
          const pmts=(s.payments||[]).filter(p=>{if(!p.date)return false;const[y,m]=p.date.split("-").map(Number);return y===now.getFullYear()&&m-1===now.getMonth();});
          if(!pmts.length)return false;
          const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));
          const[fy,fm]=sorted[0].date.split("-").map(Number);
          return fy===now.getFullYear()&&fm-1===now.getMonth();
        }).length;
        const kpis=[
          // Linha 1: visão geral da base
          {label:"Total ativos",val:`${totalAtivos+totalAguardando}`,sub:`${totalAguardando>0?`${totalAtivos} ativos + ${totalAguardando} aguardando · `:""}${total?Math.round(ativos.length/total*100):"0"}% da base · ${total} cadastros`,color:"var(--purple)",info:"Total de assinantes ativos = ATIVO + AGUARDANDO PAGAMENTO. Entre parênteses: breakdown de quantos são ATIVO puro e quantos estão no período de graça de 3 dias (AGUARDANDO)."},
          {label:"Novos este mês",val:novosEsseMes,sub:"primeiro pagamento em "+MONTHS_PT[now.getMonth()],color:"var(--blue)",info:"Assinantes cujo primeiro pagamento de todos os tempos foi registrado neste mês. Só conta se houver pagamento efetivo."},
          {label:"Reativações este mês",val:reativacoesMes,sub:"ex-cancelados que voltaram",color:reativacoesMes>0?"var(--green)":"var(--text2)",info:"Assinantes que estavam cancelados e realizaram um novo pagamento neste mês, voltando a ser ativos."},
          {label:"MRR bruto",val:fmtBRL(mrr),sub:"receita mensal recorrente",color:"var(--green)",info:"MRR (Monthly Recurring Revenue): soma dos valores dos planos de todos os assinantes ativos. Representa a receita que você espera receber todo mês se ninguém cancelar."},
          // Linha 2: financeiro do período
          {label:"Pagamentos no período",val:filteredPmts.length,sub:`Bruto: ${fmtBRL(totalBruto)}`,color:"var(--purple)",info:"Quantidade de pagamentos registrados no período selecionado. O subtítulo mostra o valor bruto total."},
          {label:"Líquido no período",val:fmtBRL(totalNet),sub:`Bruto: ${fmtBRL(totalBruto)} · Taxas: ${fmtBRL(totalTaxas)}${totalDescontos>0?" · Desc.: "+fmtBRL(totalDescontos):""}`,color:"var(--green)",info:"Receita líquida = bruto − taxas de gateway (PIX 1%, Cartão BRL 5%, Cartão USD 6,96%) − descontos aplicados. O que de fato entrou no seu bolso."},
          {label:"Ticket médio",val:filteredPmts.length>0?fmtBRL(totalBruto/filteredPmts.length):"—",sub:"bruto ÷ pagamentos no período",color:"var(--text)",info:"Valor médio por pagamento no período. Bruto total dividido pela quantidade de pagamentos."},
          {label:"Previsão próx. mês",val:fmtBRL(forecast),sub:forecast>0?"baseado nos due_days":"sem due_days suficientes",color:"var(--blue)",info:"Soma dos planos dos assinantes ativos cujo próximo vencimento cai no mês seguinte. Requer due_day preenchido."},
          // Linha 3: crescimento MRR
          {label:"MRR expansão",val:fmtBRL(mrrExpansao),sub:`Novos: ${fmtBRL(mrrNovos)} · Reat.: ${fmtBRL(mrrReativados)}`,color:"var(--green)",info:"MRR de expansão: quanto de receita recorrente nova entrou este mês, somando novos assinantes e reativações."},
          {label:"MRR perdido",val:fmtBRL(mrrPerdido),sub:"cancelamentos deste mês",color:mrrPerdido>0?"var(--red)":"var(--text2)",info:"MRR de contração: quanto de receita recorrente foi perdida este mês com cancelamentos."},
          {label:"MRR líquido",val:fmtBRL(mrrLiquido),sub:mrrLiquido>=0?"crescimento positivo ↑":"contração ↓",color:mrrLiquido>=0?"var(--green)":"var(--red)",info:"MRR líquido = expansão − perdido. Se positivo, você está crescendo. Se negativo, está perdendo mais do que ganhando."},
          {label:"LTV médio",val:fmtBRL(ltv),sub:`Duração média cancelados: ${avgDuration>0?avgDuration.toFixed(1)+" meses":"—"}`,color:"var(--amber)",info:"LTV (Lifetime Value): receita total média gerada por cada assinante durante todo o tempo que ficou ativo. Quanto maior, melhor a saúde do negócio."},
        ];
        return(
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {kpis.map(k=>(
              <Card key={k.label} style={{padding:"14px 16px"}}>
                <div style={{fontSize:20,fontWeight:800,color:k.color,lineHeight:1,letterSpacing:"-.02em"}}>{k.val}</div>
                <div style={{fontSize:10,fontWeight:600,color:"var(--text2)",marginTop:7,letterSpacing:".04em",textTransform:"uppercase",display:"flex",alignItems:"center"}}>
                  {k.label}{k.info&&<InfoTip text={k.info}/>}
                </div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:3}}>{k.sub}</div>
              </Card>
            ))}
          </div>
        );
      })()}

      {/* Churn card standalone */}
      <Card style={{padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".08em",textTransform:"uppercase"}}>Churn Rate</span>
            <InfoTip text={"Churn Rate (Opção A): dos assinantes que pagaram no período ANTERIOR, quantos % não pagaram no período ATUAL e estão cancelados hoje. Sem estimativas — só dados reais.\n\nReferência:\n< 2% → ótimo\n2–5% → aceitável\n> 5% → alerta"}/>
          </div>
          <div style={{display:"flex",gap:5}}>
            {[{id:"mes",label:"Este mês"},{id:"30d",label:"30 dias"},{id:"60d",label:"60 dias"},{id:"90d",label:"90 dias"}].map(o=>(
              <button key={o.id} onClick={()=>setChurnFilter(o.id)} style={{border:"1.5px solid "+(churnFilter===o.id?"var(--purple)":"var(--border)"),background:churnFilter===o.id?"var(--purple)":"var(--surface)",color:churnFilter===o.id?"#fff":"var(--text2)",borderRadius:8,padding:"4px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>{o.label}</button>
            ))}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"flex-end",gap:20,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:36,fontWeight:800,lineHeight:1,color:churnData.pct!==null&&parseFloat(churnData.pct)>5?"var(--red)":churnData.pct!==null&&parseFloat(churnData.pct)>2?"var(--amber)":"var(--green)"}}>{churnData.pct!==null?`${churnData.pct}%`:"—"}</div>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:6}}>{churnData.churned} cancelados de {churnData.base} pagantes do período anterior</div>
          </div>
          <div style={{fontSize:11,color:"var(--text3)",lineHeight:1.7,paddingBottom:4}}>
            <div>Período atual: <strong style={{color:"var(--text2)"}}>{churnFilter==="mes"?`1/${now.getMonth()+1}/${now.getFullYear()} até hoje`:churnFilter==="30d"?"últimos 30 dias":churnFilter==="60d"?"últimos 60 dias":"últimos 90 dias"}</strong></div>
            <div>Período anterior: <strong style={{color:"var(--text2)"}}>{churnFilter==="mes"?"mês anterior":churnFilter==="30d"?"31–60 dias atrás":churnFilter==="60d"?"61–120 dias atrás":"91–180 dias atrás"}</strong></div>
          </div>
        </div>
      </Card>
      <Card>
        <SLabel>Breakdown de taxas (período)</SLabel>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
          {METHODS.map(m=>{const pmts=filteredPmts.filter(p=>p.method===m.id);const bruto=pmts.reduce((a,p)=>a+pmtBRL(p),0);const taxa=pmts.reduce((a,p)=>a+pmtFee(p),0);return(<div key={m.id} style={{background:"var(--surface2)",borderRadius:12,padding:"12px 14px",border:"1px solid var(--border)"}}><div style={{marginBottom:6}}><MethodBadge method={m.id}/></div><div style={{fontSize:12,color:"var(--text2)",marginBottom:2}}>{pmts.length} pag.</div><div style={{fontSize:11,color:"var(--text2)"}}>Bruto: <strong>{fmtBRL(bruto)}</strong></div><div style={{fontSize:11,color:"var(--red)"}}>Taxas: -{fmtBRL(taxa)}</div>{m.id==="CARTÃO USD"&&usdTotal>0&&<div style={{fontSize:11,color:"var(--blue)",marginTop:2}}>{fmtUSD(usdTotal)}</div>}</div>);})}
        </div>
      </Card>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        <Card><SLabel>Status da base</SLabel>{[["ATIVO",statusCount["ATIVO"],"var(--purple)"],["AGUARDANDO",statusCount["AGUARDANDO"],"var(--orange)"],["CANCEL. 7D",statusCount["CANCELADO 7D"],"var(--orange-dot)"],["CANCEL. 30D",statusCount["CANCELADO 30D"],"var(--amber)"],["CANCEL. 60D",statusCount["CANCELADO 60D"],"var(--red)"],["CANCEL. 100+",statusCount["CANCELADO 100+"],"var(--text3)"]].map(([l,c,col])=><div key={l} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}><div style={{fontSize:12,color:"var(--text2)",minWidth:108}}>{l}</div><Bar pct={total?c/total*100:0} color={col}/><div style={{fontSize:12,fontWeight:600,color:"var(--text2)",minWidth:22,textAlign:"right"}}>{c}</div></div>)}</Card>
        <Card><SLabel>Planos (ativos)</SLabel>{Object.entries(planMap).map(([n,c],i)=><div key={n} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}><div style={{fontSize:12,color:"var(--text2)",minWidth:90}}>{n}</div><Bar pct={ativos.length?c/ativos.length*100:0} color={C[i%C.length]}/><div style={{fontSize:12,fontWeight:600,color:"var(--text2)",minWidth:22,textAlign:"right"}}>{c}</div></div>)}{!Object.keys(planMap).length&&<div style={{fontSize:12,color:"var(--text3)"}}>Sem dados</div>}</Card>
        <Card><SLabel>Método (período)</SLabel>{Object.entries(methodMap).map(([m,c],i)=><div key={m} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}><div style={{fontSize:12,color:"var(--text2)",minWidth:100}}>{m}</div><Bar pct={totalPmtCount?c/totalPmtCount*100:0} color={C[i%C.length]}/><div style={{fontSize:12,fontWeight:600,color:"var(--text2)",minWidth:22,textAlign:"right"}}>{c}</div></div>)}{!totalPmtCount&&<div style={{fontSize:12,color:"var(--text3)"}}>Nenhum pagamento</div>}</Card>
        <Card><SLabel>Últimos pagamentos</SLabel>{recentPmts.map((p,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}><div><div style={{fontSize:12,fontWeight:600}}>@{p.user}</div><div style={{fontSize:11,color:"var(--text3)"}}>{fmtDate(p.date)} · {p.method}{p.is_reactivation?<span style={{marginLeft:6,fontSize:10,fontWeight:700,color:"var(--green)"}}>↻</span>:null}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:12,fontWeight:700,color:"var(--green)"}}>{fmtBRL(pmtNet(p))}</div><div style={{fontSize:10,color:"var(--text3)"}}>bruto {fmtBRL(pmtBRL(p))}</div></div></div>)}{!recentPmts.length&&<div style={{fontSize:12,color:"var(--text3)"}}>Nenhum pagamento</div>}</Card>
      </div>

      {/* Tempo até cancelamento + Coorte */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:12}}>
        <Card style={{padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:6}}>
            <SLabel style={{margin:0}}>Tempo médio até cancelar</SLabel>
            <InfoTip text={"Tempo médio (em meses) que um assinante fica ativo antes de cancelar pela primeira vez. Calculado apenas sobre cancelados com mais de 1 pagamento."}/>
          </div>
          <div style={{fontSize:28,fontWeight:800,color:"var(--purple)",lineHeight:1}}>{tempoAteCancel>0?`${tempoAteCancel.toFixed(1)} meses`:"—"}</div>
          <div style={{fontSize:11,color:"var(--text3)",marginTop:6}}>base: {cancelledWithPmts.length} cancelados com histórico</div>
        </Card>
        <Card style={{padding:"14px 16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:10}}>
            <SLabel style={{margin:0}}>Retenção por coorte (6 meses)</SLabel>
            <InfoTip text={"Coorte: grupo de assinantes que entraram no mesmo mês. A tabela mostra quantos % de cada grupo ainda estava pagando nos meses seguintes. Ex: 100% no mês 0 (todos entraram), 80% no mês 1 (80% ainda pagou)."}/>
          </div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",fontSize:11,width:"100%"}}>
              <thead>
                <tr>
                  <th style={{padding:"4px 8px",textAlign:"left",fontSize:10,color:"var(--text3)",fontWeight:600,whiteSpace:"nowrap"}}>Coorte</th>
                  <th style={{padding:"4px 6px",fontSize:10,color:"var(--text3)",fontWeight:600}}>Total</th>
                  {cohortMonths.map((c,i)=><th key={i} style={{padding:"4px 6px",fontSize:10,color:"var(--text3)",fontWeight:600,whiteSpace:"nowrap"}}>M+{i}</th>)}
                </tr>
              </thead>
              <tbody>
                {cohortData.map((row,ri)=>(
                  <tr key={ri}>
                    <td style={{padding:"4px 8px",fontSize:11,fontWeight:600,color:"var(--text2)",whiteSpace:"nowrap"}}>{row.label}</td>
                    <td style={{padding:"4px 6px",textAlign:"center",fontSize:11,color:"var(--text2)"}}>{row.total}</td>
                    {row.retention.map((pct,ci)=>{
                      if(pct===null)return<td key={ci} style={{padding:"4px 6px"}}/>;
                      const bg=pct>=80?"#1B8B5E":pct>=60?"#7447E1":pct>=40?"#9B6208":pct>=20?"#B82828":"var(--surface2)";
                      const fg=pct>=20?"#fff":"var(--text3)";
                      return<td key={ci} style={{padding:"4px 6px",textAlign:"center",background:bg,color:fg,fontWeight:700,borderRadius:4,fontSize:11}}>{pct}%</td>;
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </Card>
      </div>

      <GraficoEvolucao subs={subs}/>

      {revDayEntries.length>0&&<Card><SLabel>Receita esperada por dia do mês (ativos)</SLabel><div style={{display:"flex",flexDirection:"column",gap:6}}>{revDayEntries.map(([day,{val,count}])=><div key={day} style={{display:"flex",alignItems:"center",gap:10}}><div style={{fontSize:12,color:"var(--text2)",minWidth:48,fontWeight:600}}>dia {day}</div><div style={{flex:1,height:18,background:"var(--surface2)",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",width:`${(val/maxDayRev*100).toFixed(1)}%`,background:"var(--purple)",borderRadius:6,display:"flex",alignItems:"center",paddingLeft:8,transition:"width .4s"}}>{val/maxDayRev>.2&&<span style={{fontSize:10,color:"#fff",fontWeight:700,whiteSpace:"nowrap"}}>{fmtBRL(val)}</span>}</div></div>{val/maxDayRev<=.2&&<span style={{fontSize:11,color:"var(--text2)",fontWeight:600,minWidth:70}}>{fmtBRL(val)}</span>}<span style={{fontSize:11,color:"var(--text3)",minWidth:60,whiteSpace:"nowrap",textAlign:"right"}}>{count} cliente{count!==1?"s":""}</span></div>)}</div></Card>}

      {churnEntries.length>0&&<Card><SLabel>Churn mensal (últimos 6 meses)</SLabel><div style={{display:"flex",flexDirection:"column",gap:8}}>{churnEntries.map(([key,count])=>{const[y,m]=key.split("-");const label=`${MONTHS_PT[parseInt(m)-1]}/${y}`;return(<div key={key} style={{display:"flex",alignItems:"center",gap:10}}><div style={{fontSize:12,color:"var(--text2)",minWidth:72,fontWeight:500}}>{label}</div><div style={{flex:1,height:18,background:"var(--surface2)",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",width:`${(count/maxChurn*100).toFixed(1)}%`,background:"var(--red)",borderRadius:6,display:"flex",alignItems:"center",paddingLeft:8,transition:"width .4s"}}>{count/maxChurn>.2&&<span style={{fontSize:10,color:"#fff",fontWeight:700}}>{count}</span>}</div></div>{count/maxChurn<=.2&&<span style={{fontSize:11,color:"var(--red)",fontWeight:700,minWidth:24}}>{count}</span>}<span style={{fontSize:11,color:"var(--text3)",minWidth:80}}>{count} cancel.</span></div>);})}</div></Card>}
    </div>
  );
}

/* Tab Assinantes */
function TabAssinantes({subs,groups,onEdit,onAddPay,onViewPay,onTimeline,defaultSearch}){
  const [search,setSearch]=useState(defaultSearch||"");
  const [filter,setFilter]=useState("TODOS");
  const [planFilter,setPlanFilter]=useState("TODOS");
  const [showCancelled,setShowCancelled]=useState(false);
  const [onlySemPag,setOnlySemPag]=useState(false);
  const [sortBy,setSortBy]=useState("status");
  useEffect(()=>{if(defaultSearch)setSearch(defaultSearch);},[defaultSearch]);
  const CANCELLED_ST=["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"];
  const filtered=subs.filter(s=>{
    const st=computeStatus(s);
    if(onlySemPag)return(s.payments||[]).length===0;
    if(!showCancelled&&CANCELLED_ST.includes(st))return false;
    return(filter==="TODOS"||st===filter)&&(planFilter==="TODOS"||s.plan_name===planFilter)&&s.username.toLowerCase().includes(search.toLowerCase());
  }).sort((a,b)=>{
    if(sortBy==="az")return a.username.localeCompare(b.username);
    if(sortBy==="za")return b.username.localeCompare(a.username);
    if(sortBy==="antigos"){const fa=(a.payments||[]).reduce((x,p)=>!x||p.date<x?p.date:x,null)||"9999";const fb=(b.payments||[]).reduce((x,p)=>!x||p.date<x?p.date:x,null)||"9999";return fa.localeCompare(fb);}
    if(sortBy==="recentes"){const la=(a.payments||[]).reduce((x,p)=>!x||p.date>x?p.date:x,null)||"0000";const lb=(b.payments||[]).reduce((x,p)=>!x||p.date>x?p.date:x,null)||"0000";return lb.localeCompare(la);}
    if(sortBy==="ltv"){const la=(a.payments||[]).reduce((x,p)=>x+pmtNet(p),0);const lb=(b.payments||[]).reduce((x,p)=>x+pmtNet(p),0);return lb-la;}
    if(sortBy==="plano")return(a.plan_name||"").localeCompare(b.plan_name||"");
    // default: status
    const o={"ATIVO":0,"AGUARDANDO PAGAMENTO":1,"SEM PAG.":2,"CANCELADO 7 DIAS":3,"CANCELADO 30 DIAS":4,"CANCELADO 60 DIAS":5,"CANCELADO 100+":6};
    return(o[computeStatus(a)]||0)-(o[computeStatus(b)]||0);
  });
  const cancelledCount=subs.filter(s=>CANCELLED_ST.includes(computeStatus(s))).length;
  const semPagCount=subs.filter(s=>(s.payments||[]).length===0).length;
  return(
    <div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <FInput style={{flex:2,minWidth:140}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar @usuário..."/>
        <FSelect style={{flex:1,minWidth:150}} value={filter} onChange={e=>setFilter(e.target.value)}><option value="TODOS">Todos os status</option>{Object.keys(STATUS_META).filter(s=>showCancelled||!CANCELLED_ST.includes(s)).map(s=><option key={s}>{s}</option>)}</FSelect>
        <FSelect style={{flex:1,minWidth:120}} value={planFilter} onChange={e=>setPlanFilter(e.target.value)}><option value="TODOS">Todos os planos</option>{PLANS.map(p=><option key={p.name}>{p.name}</option>)}</FSelect>
        <FSelect style={{flex:1,minWidth:140}} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
          <option value="status">↕ Por status</option>
          <option value="az">A → Z</option>
          <option value="za">Z → A</option>
          <option value="antigos">Mais antigos primeiro</option>
          <option value="recentes">Pagamento mais recente</option>
          <option value="ltv">Maior LTV</option>
          <option value="plano">Por plano</option>
        </FSelect>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:11,color:"var(--text3)",fontWeight:500}}>{filtered.length} resultado{filtered.length!==1?"s":""}</div>
        {cancelledCount>0&&(
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <button onClick={()=>{setShowCancelled(v=>!v);if(showCancelled)setFilter("TODOS");setOnlySemPag(false);}} style={{border:"none",background:"none",cursor:"pointer",fontSize:11,color:"var(--text2)",fontWeight:600,textDecoration:"underline",fontFamily:"inherit"}}>{showCancelled?`Ocultar ${cancelledCount} cancelado${cancelledCount!==1?"s":""}`:`Mostrar ${cancelledCount} cancelado${cancelledCount!==1?"s":""}`}</button>
            {showCancelled&&["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"].map(st=>{
              const count=subs.filter(s=>computeStatus(s)===st).length;
              if(!count)return null;
              const m=STATUS_META[st];
              return<button key={st} onClick={()=>setFilter(f=>f===st?"TODOS":st)} style={{fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:20,border:`1.5px solid ${m.dot}`,background:filter===st?m.dot:"transparent",color:filter===st?"#fff":m.color,cursor:"pointer",fontFamily:"inherit"}}>{st.replace("CANCELADO ","").replace(" DIAS","d")} ({count})</button>;
            })}
          </div>
        )}
        {semPagCount>0&&<button onClick={()=>{setOnlySemPag(v=>!v);setShowCancelled(false);}} style={{border:"none",background:onlySemPag?"var(--amber-bg)":"none",cursor:"pointer",fontSize:11,color:"var(--amber)",fontWeight:600,textDecoration:"underline",fontFamily:"inherit",borderRadius:6,padding:onlySemPag?"2px 8px":"0"}}>{onlySemPag?`✕ Limpar filtro`:`⚠ ${semPagCount} sem pagamento${semPagCount!==1?"s":""}`}</button>}
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:7}}>
        {filtered.map(s=>{
          const st=computeStatus(s);const pmts=s.payments||[];
          const totalNet=pmts.reduce((a,p)=>a+pmtNet(p),0);const totalBruto=pmts.reduce((a,p)=>a+pmtBRL(p),0);
          const nextDue=getNextDue(s);const days=daysUntil(nextDue);
          const isUrgent=st==="AGUARDANDO PAGAMENTO";const dias=daysAsSubscriber(s);
          const lastPmt=pmts.length?pmts.reduce((a,b)=>a.date>b.date?a:b):null;
          const isReactivated=lastPmt?.is_reactivation;
          return(
            <div key={s.username} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:"var(--surface)",border:"1.5px solid "+(isUrgent?"var(--orange-dot)":"var(--border)"),borderRadius:14,boxShadow:"var(--shadow-sm)"}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontWeight:700}}>@{s.username}</span>
                  <Pill status={st}/>
                  <PlanBadge plan={s.plan_name}/>
                  {isReactivated&&<span style={{fontSize:10,fontWeight:700,color:"var(--green)",background:"var(--green-bg)",padding:"2px 8px",borderRadius:10}}>↻ Reativado</span>}
                  {s.currency==="USD"&&<span style={{fontSize:10,fontWeight:700,color:"var(--blue)",background:"var(--blue-bg)",padding:"2px 7px",borderRadius:8}}>USD</span>}
                  {s.due_day&&<span style={{fontSize:10,color:"var(--text3)",background:"var(--surface2)",padding:"2px 7px",borderRadius:8}}>dia {s.due_day}</span>}
                  {dias!==null&&<span style={{fontSize:10,color:"var(--text3)",background:"var(--surface2)",padding:"2px 7px",borderRadius:8}}>há {dias}d</span>}
                  {CANCELLED_ST.includes(st)&&<CancelTag sub={s}/>}
                  {(groups||[]).filter(g=>g.members.includes(s.username)).map(g=><span key={g.id} style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:8,...(GROUP_TYPE_META[g.type]||GROUP_TYPE_META["Outro"])}}>{g.name}</span>)}
                </div>
                <div style={{fontSize:11,color:"var(--text2)",marginTop:5}}>
                  {fmtBRL(s.plan_value)} · {pmts.length} pag. · Líquido: <span style={{color:"var(--green)",fontWeight:600}}>{fmtBRL(totalNet)}</span> <span style={{color:"var(--text3)"}}>(bruto {fmtBRL(totalBruto)})</span>
                  {s.cancel_reason&&CANCELLED_ST.includes(st)&&<span style={{marginLeft:6,color:"var(--text3)"}}>· {s.cancel_reason}</span>}
                  {nextDue&&(st==="ATIVO"||isUrgent)&&<span style={{marginLeft:6,color:isUrgent?"var(--orange)":days!==null&&days<=5?"var(--amber)":"var(--text3)"}}>· Vence {fmtDate(nextDue)} {days!==null&&(days<0?`(${Math.abs(days)}d atrasado)`:days===0?"(hoje)":`(${days}d)`)}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:5,flexShrink:0}}>
                <Btn variant="primary" size="sm" onClick={()=>onAddPay(s)}>+ Pag.</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>onViewPay(s)}>📋</Btn>
                <Btn variant="ghost" size="sm" title="Linha do tempo" onClick={()=>onTimeline&&onTimeline(s)}>📅</Btn>
                <Btn variant="ghost" size="sm" onClick={()=>onEdit(s)}>Editar</Btn>
              </div>
            </div>
          );
        })}
        {!subs.length&&<div style={{textAlign:"center",padding:"52px 0",color:"var(--text3)",fontSize:13}}>Nenhum assinante. Clique em "+ Novo" para começar.</div>}
        {subs.length>0&&!filtered.length&&<div style={{textAlign:"center",padding:"36px 0",color:"var(--text3)",fontSize:13}}>Nenhum resultado.</div>}
      </div>
    </div>
  );
}

/* Tab Vencimentos */
function TabVencimentos({subs,onAddPay,msgTpl,onShowToast,onMarkReminded}){

  function Group({title,items,accent,note}){
    if(!items.length)return null;
    return(
      <div style={{marginBottom:20}}>

          <div style={{fontSize:11,fontWeight:700,color:accent,letterSpacing:".07em",textTransform:"uppercase"}}>{title} · {items.length}</div>
          {note&&<span style={{fontSize:11,color:accent,opacity:.7}}>{note}</span>}
        </div>
        {items.map(x=>{
          const s=x.sub;const proExp=getProExpiry(s);

            <div key={s.username} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"var(--surface)",border:"1.5px solid "+(x.st==="AGUARDANDO PAGAMENTO"?"var(--orange-dot)":"var(--border)"),borderRadius:13,marginBottom:7,boxShadow:"var(--shadow-sm)",flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:170}}>
                <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                  <span style={{fontSize:13,fontWeight:700}}>@{s.username}</span>
                  <PlanBadge plan={s.plan_name}/>
                  <Pill status={x.st}/>
                </div>
                <div style={{fontSize:11,color:"var(--text2)",marginTop:3}}>
                  Vence {fmtDate(x.nextDue)} {s.due_day&&<span style={{color:"var(--text3)"}}>· dia {s.due_day}</span>} · {fmtBRL(s.plan_value)}
                  {x.st==="AGUARDANDO PAGAMENTO"&&proExp&&<span style={{color:"var(--orange)",fontWeight:600}}> · sai do PRO {fmtDate(proExp.toISOString().split("T")[0])} às 9h</span>}
                </div>
              </div>
              <div style={{fontSize:12,fontWeight:700,color:accent,whiteSpace:"nowrap"}}>{x.days<0?`${Math.abs(x.days)}d atrasado`:x.days===0?"hoje":`${x.days}d`}</div>
              {(x.st==="AGUARDANDO PAGAMENTO"||x.days<=7)&&<CobrancaButtons sub={s} msgTpl={msgTpl} onShowToast={onShowToast} onMarkReminded={onMarkReminded}/>}
              <Btn variant="primary" size="sm" onClick={()=>onAddPay(s)}>+ Pag.</Btn>
            </div>
          );
        })}
      </div>
    );
  }
  return(<div>{!all.length&&<div style={{textAlign:"center",padding:"52px 0",color:"var(--text3)",fontSize:13}}>Nenhum assinante ativo com vencimento.</div>}<Group title="Aguardando pagamento" items={all.filter(x=>x.st==="AGUARDANDO PAGAMENTO")} accent="var(--orange)" note="período de graça — sai do PRO em 3 dias às 9h"/><Group title="Vence hoje" items={all.filter(x=>x.st==="ATIVO"&&x.days===0)} accent="var(--red)"/><Group title="Vence em 7 dias" items={all.filter(x=>x.st==="ATIVO"&&x.days>=1&&x.days<=7)} accent="var(--amber)"/><Group title="Em dia" items={all.filter(x=>x.st==="ATIVO"&&x.days>7)} accent="var(--green)"/></div>);
}

/* Tab Meses */
function TabMeses({subs,onUpdateSubs,onShowToast,onEditPay,onViewSub}){
  const now=new Date();
  const [selYear,setSelYear]=useState(now.getFullYear());const [selMonth,setSelMonth]=useState(now.getMonth());
  const [showImport,setShowImport]=useState(false);const [sortCol,setSortCol]=useState({col:"date",dir:"asc"});
  const years=useMemo(()=>{const ys=new Set([now.getFullYear()]);subs.forEach(s=>(s.payments||[]).forEach(p=>{if(p.date)ys.add(parseInt(p.date.split("-")[0]));}));return[...ys].sort((a,b)=>b-a);},[subs]);
  const rows=useMemo(()=>{const result=[];subs.forEach(s=>{(s.payments||[]).forEach((p,pmtIdx)=>{if(!p.date)return;const[y,m]=p.date.split("-").map(Number);if(y===selYear&&m-1===selMonth)result.push({...p,username:s.username,plan:s.plan_name||"—",pmtIdx,_key:`${s.username}_${pmtIdx}_${p.date}`});});});return result.sort((a,b)=>a.date.localeCompare(b.date));},[subs,selYear,selMonth]);
  const sortedRows=useMemo(()=>{const arr=[...rows];arr.sort((a,b)=>{let va,vb;if(sortCol.col==="date"){va=a.date;vb=b.date;}else if(sortCol.col==="username"){va=a.username.toLowerCase();vb=b.username.toLowerCase();}else if(sortCol.col==="brl"){va=pmtBRL(a);vb=pmtBRL(b);}else if(sortCol.col==="net"){va=pmtNet(a);vb=pmtNet(b);}else{va=a.date;vb=b.date;}if(va<vb)return sortCol.dir==="asc"?-1:1;if(va>vb)return sortCol.dir==="asc"?1:-1;return 0;});return arr;},[rows,sortCol]);
  const totalBruto=rows.reduce((a,r)=>a+pmtBRL(r),0);const totalNet=rows.reduce((a,r)=>a+pmtNet(r),0);const totalTaxas=totalBruto-totalNet;const totalDescontos=rows.reduce((a,r)=>a+pmtDiscount(r),0);const uniqueUsers=new Set(rows.map(r=>r.username)).size;const usdTotal=rows.filter(r=>r.method==="CARTÃO USD").reduce((a,r)=>a+parseFloat(r.value_usd||0),0);
  function prevMonth(){if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);}
  function nextMonth(){if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);}
  function handleDelete(row){if(!window.confirm(`Excluir pagamento de @${row.username} em ${fmtDate(row.date)}?`))return;onUpdateSubs(subs.map(s=>{if(s.username!==row.username)return s;const pmts=[...(s.payments||[])];pmts.splice(row.pmtIdx,1);return{...s,payments:pmts};}));onShowToast("Pagamento excluído");}
  function handleImportPayments(parsed){
    const map={};subs.forEach(s=>{map[s.username]={...s,payments:[...(s.payments||[])]};});
    // valor de tabela de cada plano (p/ ajustar a ficha/MRR sem mexer no valor real do pagamento)
    const planValueOf=name=>{const p=PLANS.find(x=>x.name===name);return p&&p.value?String(p.value.toFixed(2)):null;};
    parsed.forEach(p=>{
      const planName=p.plan||guessPlan(p.value_brl);
      const tableVal=planValueOf(planName);
      if(!map[p.username]){
        // novo assinante: ficha recebe o plano escolhido (valor de tabela, ou o pago se for "Personalizado")
        map[p.username]={username:p.username,plan_name:planName,plan_value:tableVal||String(parseBRL(p.value_brl).toFixed(2)),currency:"BRL",due_day:"",notes:"",cancel_reason:"",status_history:[],payments:[]};
      }else if(p.plan){
        // existente: aplica o plano escolhido na tabela à ficha (corrige MRR no upgrade)
        map[p.username].plan_name=planName;
        if(tableVal)map[p.username].plan_value=tableVal;
      }
      // o PAGAMENTO sempre mantém o valor real (pró-rata), separado do plano
      const keys=new Set(map[p.username].payments.map(x=>x.date+"_"+(x.value_brl||x.value)));
      if(!keys.has(p.date+"_"+p.value_brl)){
        const pmt={date:p.date,value_brl:p.value_brl,method:p.method};
        if(p.method==="CARTÃO USD"){if(p.value_usd)pmt.value_usd=p.value_usd;if(p.exchange_rate&&parseFloat(p.exchange_rate)>0)pmt.exchange_rate=p.exchange_rate;}
        if(p.method==="CARTÃO BRL"&&p.international)pmt.international=true;
        map[p.username].payments.push(pmt);
      }
    });
    Object.values(map).forEach(s=>s.payments.sort((a,b)=>a.date.localeCompare(b.date)));
    onUpdateSubs(Object.values(map));setShowImport(false);onShowToast(`✓ ${parsed.length} pagamentos importados`);
  }
  const thS=(key)=>({padding:"11px 12px",textAlign:"left",fontSize:10,fontWeight:700,color:sortCol.col===key?"var(--purple)":"var(--text3)",letterSpacing:".07em",textTransform:"uppercase",whiteSpace:"nowrap",cursor:key?"pointer":"default",userSelect:"none",background:sortCol.col===key?"var(--purple-light)":"transparent",transition:"background .15s"});
  function toggleSort(key){setSortCol(c=>({col:key,dir:c.col===key&&c.dir==="asc"?"desc":"asc"}));}
  const si=(key)=>sortCol.col===key?(sortCol.dir==="asc"?"↑":"↓"):"↕";
  return(
    <>{showImport&&<ModalImportPayments subs={subs} onImport={handleImportPayments} onClose={()=>setShowImport(false)}/>}
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <Card style={{padding:"14px 18px"}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={prevMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:9,width:34,height:34,cursor:"pointer",fontSize:17,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>‹</button>
          <div style={{background:"var(--purple-light)",borderRadius:12,padding:"8px 22px",fontWeight:800,fontSize:16,color:"var(--purple)",minWidth:148,textAlign:"center"}}>{MONTHS_PT[selMonth]}/{selYear}</div>
          <button onClick={nextMonth} style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:9,width:34,height:34,cursor:"pointer",fontSize:17,color:"var(--text2)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>›</button>
          <select value={selYear} onChange={e=>setSelYear(parseInt(e.target.value))} style={{padding:"7px 10px",borderRadius:9,border:"1.5px solid var(--border)",background:"var(--surface)",color:"var(--text2)",fontSize:12,fontFamily:"inherit",fontWeight:600}}>{years.map(y=><option key={y}>{y}</option>)}</select>
        </div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{MONTHS_PT.map((m,i)=><button key={i} onClick={()=>setSelMonth(i)} style={{border:"1.5px solid "+(selMonth===i?"var(--purple)":"var(--border)"),background:selMonth===i?"var(--purple)":"var(--surface)",color:selMonth===i?"#fff":"var(--text2)",borderRadius:8,padding:"5px 9px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .15s",fontFamily:"inherit"}}>{m}</button>)}</div>
      </div></Card>
      <div style={{display:"flex",alignItems:"stretch",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,flex:1}}>
          <Card style={{padding:"13px 16px"}}><SLabel>Receita do mês</SLabel><div style={{display:"flex",flexDirection:"column",gap:4}}><div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"var(--text2)"}}>Bruto</span><strong>{fmtBRL(totalBruto)}</strong></div>{totalDescontos>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"var(--amber)"}}>Descontos</span><span style={{color:"var(--amber)",fontWeight:600}}>-{fmtBRL(totalDescontos)}</span></div>}<div style={{display:"flex",justifyContent:"space-between",fontSize:12}}><span style={{color:"var(--red)"}}>Taxas</span><span style={{color:"var(--red)",fontWeight:600}}>-{fmtBRL(totalTaxas)}</span></div><div style={{display:"flex",justifyContent:"space-between",fontSize:13,borderTop:"1px solid var(--border)",paddingTop:4,marginTop:2}}><span style={{color:"var(--green)",fontWeight:600}}>Líquido</span><strong style={{color:"var(--green)"}}>{fmtBRL(totalNet)}</strong></div></div></Card>
          <Card style={{padding:"13px 16px"}}><SLabel>Pagamentos</SLabel><div style={{fontSize:22,fontWeight:800,color:"var(--purple)",lineHeight:1}}>{rows.length}</div><div style={{fontSize:11,color:"var(--text3)",marginTop:4}}>{uniqueUsers} usuário{uniqueUsers!==1?"s":""} único{uniqueUsers!==1?"s":""}</div>{usdTotal>0&&<div style={{fontSize:11,color:"var(--blue)",marginTop:4,fontWeight:600}}>{fmtUSD(usdTotal)} em USD</div>}</Card>
        </div>
        <Btn variant="secondary" style={{whiteSpace:"nowrap",alignSelf:"center",padding:"10px 16px"}} onClick={()=>setShowImport(true)}>↑ Importar CSV</Btn>
      </div>
      <Card style={{padding:0}}>
        {rows.length===0?<div style={{textAlign:"center",padding:"52px 0",color:"var(--text3)",fontSize:13}}>Nenhum pagamento em {MONTHS_PT[selMonth]}/{selYear}</div>:(
          <div style={{overflowX:"auto",borderRadius:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:540}}>
              <thead><tr style={{background:"var(--surface2)",borderBottom:"1.5px solid var(--border)"}}>
                <th onClick={()=>toggleSort("date")} style={thS("date")}>Data {si("date")}</th>
                <th onClick={()=>toggleSort("username")} style={thS("username")}>Usuário {si("username")}</th>
                <th style={thS(null)}>Método</th>
                <th onClick={()=>toggleSort("brl")} style={thS("brl")}>Bruto {si("brl")}</th>
                <th style={thS(null)}>Desc.</th>
                <th onClick={()=>toggleSort("net")} style={thS("net")}>Líquido {si("net")}</th>
                <th style={thS(null)}>Ações</th>
              </tr></thead>
              <tbody>{sortedRows.map((r,i)=>{const brl=pmtBRL(r);const net=pmtNet(r);const disc=pmtDiscount(r);return(<tr key={r._key} style={{borderBottom:"1px solid var(--border)",background:i%2===0?"var(--surface)":"var(--surface2)"}}><td style={{padding:"10px 12px",fontSize:12,color:"var(--text2)",whiteSpace:"nowrap",fontWeight:500}}>{fmtDate(r.date)}</td><td style={{padding:"10px 12px"}}><div onClick={()=>onViewSub&&onViewSub(subs.find(s=>s.username===r.username))} style={{fontSize:13,fontWeight:700,color:"var(--purple)",cursor:"pointer",textDecoration:"underline",textDecorationStyle:"dotted",textUnderlineOffset:3}}>@{r.username}</div>{r.is_reactivation&&<span style={{fontSize:10,fontWeight:700,color:"var(--green)"}}>↻ Reativação</span>}{r.value_usd&&<div style={{fontSize:10,color:"var(--blue)"}}>{fmtUSD(r.value_usd)} @ {parseFloat(r.exchange_rate||0).toFixed(2)}</div>}</td><td style={{padding:"10px 12px"}}><MethodBadge method={r.method}/></td><td style={{padding:"10px 12px",fontSize:12,fontWeight:600,color:"var(--text2)",whiteSpace:"nowrap"}}>{fmtBRL(brl)}</td><td style={{padding:"10px 12px",fontSize:12,color:"var(--amber)",fontWeight:600,whiteSpace:"nowrap"}}>{disc>0?`-${fmtBRL(disc)}`:"—"}</td><td style={{padding:"10px 12px",whiteSpace:"nowrap"}}><span style={{fontSize:13,fontWeight:700,color:"var(--green)"}}>{fmtBRL(net)}</span></td><td style={{padding:"10px 10px",whiteSpace:"nowrap"}}><div style={{display:"flex",gap:4}}><button onClick={()=>onEditPay(r)} title="Editar" style={{border:"1.5px solid var(--border)",background:"var(--surface)",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:13,color:"var(--purple)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>✎</button><button onClick={()=>handleDelete(r)} title="Excluir" style={{border:"1.5px solid var(--red-bg)",background:"var(--red-bg)",borderRadius:8,width:30,height:30,cursor:"pointer",fontSize:13,color:"var(--red)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"inherit"}}>✕</button></div></td></tr>);})}</tbody>
              <tfoot><tr style={{background:"var(--purple-light)",borderTop:"1.5px solid var(--border2)"}}><td colSpan={3} style={{padding:"11px 12px",fontSize:11,fontWeight:700,color:"var(--purple)",textTransform:"uppercase",letterSpacing:".05em"}}>Total · {rows.length} pag.</td><td style={{padding:"11px 12px",fontSize:12,fontWeight:600,color:"var(--text2)",whiteSpace:"nowrap"}}>{fmtBRL(totalBruto)}</td><td style={{padding:"11px 12px",fontSize:12,color:"var(--amber)",fontWeight:600,whiteSpace:"nowrap"}}>{totalDescontos>0?`-${fmtBRL(totalDescontos)}`:"—"}</td><td style={{padding:"11px 12px",whiteSpace:"nowrap"}}><span style={{fontSize:14,fontWeight:800,color:"var(--green)"}}>{fmtBRL(totalNet)}</span></td><td style={{padding:"11px 12px",fontSize:11,color:"var(--red)",fontWeight:600,whiteSpace:"nowrap"}}>-{fmtBRL(totalTaxas)} taxas</td></tr></tfoot>
            </table>
          </div>
        )}
      </Card>
    </div></>
  );
}

/* Tab Comparativo */
function TabComparativo({subs}){
  const now=new Date();
  const currentY=now.getFullYear();const currentM=now.getMonth();

  // gera lista de até 12 meses disponíveis (retroativos)
  const availableMonths=[];
  for(let i=0;i<12;i++){let m=currentM-i;let y=currentY;while(m<0){m+=12;y--;}availableMonths.push({year:y,month:m,label:`${MONTHS_PT[m]}/${y}`,key:`${y}-${String(m+1).padStart(2,"0")}`});}

  const [selected,setSelected]=useState([availableMonths[0].key,availableMonths[1].key]);
  const [partial,setPartial]=useState(false);
  const [fromDay,setFromDay]=useState("1");
  const [toDay,setToDay]=useState(String(now.getDate()));

  function toggleMonth(key){setSelected(prev=>{if(prev.includes(key)){if(prev.length<=1)return prev;return prev.filter(k=>k!==key);}if(prev.length>=6)return prev;return[...prev,key];});}

  // ordena selecionados do mais recente ao mais antigo
  const selectedSorted=[...selected].sort((a,b)=>b.localeCompare(a));

  const metricsMap={};
  selectedSorted.forEach(key=>{const mo=availableMonths.find(m=>m.key===key);if(!mo)return;const fd=partial?parseInt(fromDay)||1:1;const td=partial?parseInt(toDay)||31:31;metricsMap[key]=getMonthMetrics(subs,mo.year,mo.month,fd,td);});

  const METRICS=[
    {key:"bruto",label:"Receita bruta",fmt:fmtBRL,isBad:false,type:"brl"},
    {key:"liquido",label:"Receita líquida",fmt:fmtBRL,isBad:false,type:"brl"},
    {key:"taxas",label:"Taxas pagas",fmt:fmtBRL,isBad:true,type:"brl"},
    {key:"qtdPag",label:"Pagamentos (qtd)",fmt:v=>v,isBad:false,type:"count"},
    {key:"ticketMedio",label:"Ticket médio",fmt:fmtBRL,isBad:false,type:"brl"},
    {key:"newSubs",label:"Novos assinantes",fmt:v=>v,isBad:false,type:"count"},
    {key:"reativacoes",label:"Reativações",fmt:v=>v,isBad:false,type:"count"},
    {key:"cancelamentos",label:"Cancelamentos",fmt:v=>v,isBad:true,type:"count"},
  ];

  const getLabel=(key)=>{const mo=availableMonths.find(m=>m.key===key);if(!mo)return key;if(partial)return`${MONTHS_PT[mo.month]}/${mo.year}\n(dia ${fromDay}–${toDay})`;return mo.label;};

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Seletor de meses */}
      <Card style={{padding:"14px 18px"}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:".06em",textTransform:"uppercase",marginBottom:10}}>Selecione até 6 meses para comparar</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
          {availableMonths.map(m=>{const sel=selected.includes(m.key);return(<button key={m.key} onClick={()=>toggleMonth(m.key)} style={{border:"1.5px solid "+(sel?"var(--purple)":"var(--border)"),background:sel?"var(--purple)":"var(--surface)",color:sel?"#fff":"var(--text2)",borderRadius:9,padding:"6px 12px",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all .15s",fontFamily:"inherit",opacity:!sel&&selected.length>=6?.4:1}}>{m.label}</button>);})}
        </div>

        {/* Toggle período parcial */}
        <div style={{borderTop:"1px solid var(--border)",paddingTop:14}}>
          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"var(--text2)",fontWeight:500,marginBottom:partial?10:0}}>
            <input type="checkbox" checked={partial} onChange={e=>setPartial(e.target.checked)} style={{accentColor:"var(--purple)",width:15,height:15}}/>
            Comparar período específico (ex: dia 1 ao 19 de cada mês selecionado)
          </label>
          {partial&&<div style={{display:"flex",alignItems:"center",gap:12}}>
            <FInput label="Do dia" type="number" min="1" max="31" value={fromDay} onChange={e=>setFromDay(e.target.value)} style={{width:80}}/>
            <FInput label="Ao dia" type="number" min="1" max="31" value={toDay} onChange={e=>setToDay(e.target.value)} style={{width:80}}/>
            <div style={{fontSize:12,color:"var(--text3)",marginTop:18}}>de cada mês selecionado</div>
          </div>}
        </div>
      </Card>

      {/* Tabela comparativa */}
      {selectedSorted.length>0&&(
        <Card style={{padding:0,overflow:"hidden"}}>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:400}}>
              <thead>
                <tr style={{background:"var(--surface2)",borderBottom:"1.5px solid var(--border)"}}>
                  <th style={{padding:"12px 16px",textAlign:"left",fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:".07em",textTransform:"uppercase",minWidth:160}}>Métrica</th>
                  {selectedSorted.map((key,i)=>{
                    const mo=availableMonths.find(m=>m.key===key);
                    return(<th key={key} style={{padding:"12px 16px",textAlign:"right",fontSize:11,fontWeight:700,color:i===0?"var(--purple)":"var(--text2)",letterSpacing:"-.01em",whiteSpace:"nowrap",background:i===0?"var(--purple-light)":"transparent"}}>
                      <div>{mo?.label||key}</div>
                      {partial&&<div style={{fontSize:10,color:"var(--text3)",fontWeight:500,marginTop:2}}>dia {fromDay}–{toDay}</div>}
                      {i===0&&<div style={{fontSize:9,color:"var(--purple)",fontWeight:600,marginTop:2,textTransform:"uppercase",letterSpacing:".04em"}}>Mais recente</div>}
                    </th>);
                  })}
                </tr>
              </thead>
              <tbody>
                {METRICS.map((metric,mi)=>{
                  return(
                    <tr key={metric.key} style={{borderBottom:"1px solid var(--border)",background:mi%2===0?"var(--surface)":"var(--surface2)"}}>
                      <td style={{padding:"12px 16px",fontSize:13,fontWeight:600,color:"var(--text)",whiteSpace:"nowrap"}}>{metric.label}</td>
                      {selectedSorted.map((key,i)=>{
                        const cur=metricsMap[key]?.[metric.key]||0;
                        const prevKey=selectedSorted[i+1];
                        const prev=prevKey&&metricsMap[prevKey]?metricsMap[prevKey][metric.key]||0:null;
                        return(
                          <td key={key} style={{padding:"12px 16px",textAlign:"right",background:i===0?"rgba(116,71,225,.04)":"transparent"}}>
                            <div style={{fontSize:13,fontWeight:700,color:i===0?"var(--text)":"var(--text2)"}}>{metric.fmt(cur)}</div>
                            {prev!==null&&i<selectedSorted.length-1&&(
                              <div style={{marginTop:3}}>
                                {metric.type==="brl"?<Delta cur={cur} prev={prev} isBad={metric.isBad}/>:<DeltaCount cur={cur} prev={prev} isBad={metric.isBad}/>}
                              </div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <div style={{padding:"10px 16px",fontSize:11,color:"var(--text3)",borderTop:"1px solid var(--border)"}}>↑ positivo · ↓ negativo · A variação é sempre do mês da coluna em relação ao mês seguinte (mais antigo) na seleção.</div>
        </Card>
      )}
    </div>
  );
}

/* ── Group helpers ── */
function makeGroupId(){return"g_"+Math.random().toString(36).substring(2,10);}
function getGroupMembers(group,subs){return subs.filter(s=>group.members.includes(s.username));}
function getGroupMetrics(group,subs,year,month){
  const members=getGroupMembers(group,subs);
  const now=new Date();const cy=now.getFullYear();const cm=now.getMonth();
  const isCurrentMonth=year===cy&&month===cm;
  const allPmts=members.flatMap(s=>(s.payments||[]).map(p=>({...p,_sub:s})));
  const monthPmts=allPmts.filter(p=>{if(!p.date)return false;const[y,m]=p.date.split("-").map(Number);return y===year&&m-1===month;});
  const bruto=monthPmts.reduce((a,p)=>a+pmtBRL(p),0);
  const liquido=monthPmts.reduce((a,p)=>a+pmtNet(p),0);
  const taxas=bruto-liquido;
  const qtdPag=monthPmts.length;
  const ticketMedio=qtdPag>0?bruto/qtdPag:0;
  const ativos=members.filter(s=>["ATIVO","AGUARDANDO PAGAMENTO"].includes(computeStatus(s)));
  const mrr=ativos.reduce((a,s)=>a+parseFloat(s.plan_value||0),0);
  const ltv=members.length>0?members.reduce((a,s)=>a+(s.payments||[]).reduce((x,p)=>x+pmtBRL(p),0),0)/members.length:0;
  // entradas no mês = primeiro pagamento no mês
  const entradas=members.filter(s=>{const sorted=[...(s.payments||[])].sort((a,b)=>a.date.localeCompare(b.date));if(!sorted.length)return false;const[y,m]=sorted[0].date.split("-").map(Number);return y===year&&m-1===month;}).length;
  // saídas = cancelamentos estimados no mês
  // saídas = membros CANCELADOS cujo cancelamento estimado cai no mês selecionado
  const CANCELLED_ST=["CANCELADO 7 DIAS","CANCELADO 30 DIAS","CANCELADO 60 DIAS","CANCELADO 100+"];
  const saidas=members.filter(s=>{
    if(!CANCELLED_ST.includes(computeStatus(s)))return false; // só cancelados
    const pmts=s.payments||[];if(!pmts.length)return false;
    const last=pmts.reduce((a,b)=>a.date>b.date?a:b);
    const cd=addDays(parseLocal(last.date),33);
    return cd.getFullYear()===year&&cd.getMonth()===month;
  }).length;
  // retenção = ativos / total com pelo menos 1 pagamento
  const withPmts=members.filter(s=>(s.payments||[]).length>0);
  const retencao=withPmts.length>0?Math.round(ativos.length/withPmts.length*100):0;
  return{bruto,liquido,taxas,qtdPag,ticketMedio,mrr,ltv,entradas,saidas,retencao,ativosCount:ativos.length,totalMembers:members.length};
}

function ModalGrupo({data,subs,groups,onSave,onDelete,onClose}){

  );
